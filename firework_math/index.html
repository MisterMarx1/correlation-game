<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Number Cruncher — Math Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0e1a;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100%;
  }
  #game-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas { display: block; }
</style>
</head>
<body>
<div id="game-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
<script>
(async () => {
  const app = new PIXI.Application({
    width: Math.min(window.innerWidth, 800),
    height: Math.min(window.innerHeight, 900),
    backgroundColor: 0x0a0e1a,
    antialias: true,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
  });
  document.getElementById('game-container').appendChild(app.view);

  const W = app.screen.width;
  const H = app.screen.height;

  // --- Game state ---
  let score = 0;
  let lives = 3;
  let level = 1;
  let combo = 0;
  let bestCombo = 0;
  let gameOver = false;
  let bubbles = [];
  let particles = [];
  let currentProblem = null;
  let timeSinceSpawn = 0;
  let spawnInterval = 2.2;
  let speedMultiplier = 1;

  // --- UI Layer ---
  const uiLayer = new PIXI.Container();
  const gameLayer = new PIXI.Container();
  const fxLayer = new PIXI.Container();
  app.stage.addChild(gameLayer);
  app.stage.addChild(fxLayer);
  app.stage.addChild(uiLayer);

  // Background stars
  const starsGfx = new PIXI.Graphics();
  for (let i = 0; i < 80; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = Math.random() * 1.5 + 0.3;
    const a = Math.random() * 0.5 + 0.2;
    starsGfx.beginFill(0xffffff, a);
    starsGfx.drawCircle(x, y, r);
    starsGfx.endFill();
  }
  app.stage.addChildAt(starsGfx, 0);

  // Top bar
  const topBar = new PIXI.Graphics();
  topBar.beginFill(0x141a2e, 0.8);
  topBar.drawRect(0, 0, W, 80);
  topBar.endFill();
  uiLayer.addChild(topBar);

  const scoreText = new PIXI.Text('Score: 0', {
    fontFamily: 'Arial', fontSize: 22, fill: 0xffffff, fontWeight: 'bold'
  });
  scoreText.position.set(20, 15);
  uiLayer.addChild(scoreText);

  const livesText = new PIXI.Text('♥ ♥ ♥', {
    fontFamily: 'Arial', fontSize: 24, fill: 0xff4d6d, fontWeight: 'bold'
  });
  livesText.position.set(20, 45);
  uiLayer.addChild(livesText);

  const levelText = new PIXI.Text('Level 1', {
    fontFamily: 'Arial', fontSize: 20, fill: 0x6ee7ff
  });
  levelText.anchor.set(1, 0);
  levelText.position.set(W - 20, 15);
  uiLayer.addChild(levelText);

  const comboText = new PIXI.Text('', {
    fontFamily: 'Arial', fontSize: 18, fill: 0xffd166
  });
  comboText.anchor.set(1, 0);
  comboText.position.set(W - 20, 45);
  uiLayer.addChild(comboText);

  // Problem display (center top)
  const problemBg = new PIXI.Graphics();
  problemBg.beginFill(0x1e2744, 0.95);
  problemBg.lineStyle(3, 0x6ee7ff, 1);
  problemBg.drawRoundedRect(-120, 0, 240, 70, 16);
  problemBg.endFill();
  problemBg.position.set(W / 2, 95);
  uiLayer.addChild(problemBg);

  const problemText = new PIXI.Text('', {
    fontFamily: 'Arial', fontSize: 34, fill: 0xffffff, fontWeight: 'bold'
  });
  problemText.anchor.set(0.5);
  problemText.position.set(W / 2, 130);
  uiLayer.addChild(problemText);

  const hintText = new PIXI.Text('Light up the rocket with the correct answer!', {
    fontFamily: 'Arial', fontSize: 14, fill: 0x8fa3c9
  });
  hintText.anchor.set(0.5);
  hintText.position.set(W / 2, 180);
  uiLayer.addChild(hintText);

  // --- Problem generator ---
  function makeProblem() {
    const ops = level < 2 ? ['+', '-'] : level < 4 ? ['+', '-', '×'] : ['+', '-', '×', '÷'];
    const op = ops[Math.floor(Math.random() * ops.length)];
    let a, b, answer;
    const range = Math.min(8 + level * 3, 30);

    if (op === '+') {
      a = Math.floor(Math.random() * range) + 1;
      b = Math.floor(Math.random() * range) + 1;
      answer = a + b;
    } else if (op === '-') {
      a = Math.floor(Math.random() * range) + 5;
      b = Math.floor(Math.random() * a) + 1;
      answer = a - b;
    } else if (op === '×') {
      a = Math.floor(Math.random() * 9) + 2;
      b = Math.floor(Math.random() * 9) + 2;
      answer = a * b;
    } else {
      b = Math.floor(Math.random() * 8) + 2;
      answer = Math.floor(Math.random() * 9) + 2;
      a = b * answer;
    }
    return { text: `${a} ${op} ${b} = ?`, answer };
  }

  function loadNewProblem() {
    currentProblem = makeProblem();
    problemText.text = currentProblem.text;
    // Flash the problem box
    problemBg.alpha = 0;
    const flash = () => {
      problemBg.alpha += 0.1;
      if (problemBg.alpha < 1) requestAnimationFrame(flash);
    };
    flash();
  }

  // --- Firework Rocket ---
  function spawnBubble(forceCorrect = false) {
    if (!currentProblem) return;

    // Decide if this rocket carries the correct answer
    const hasCorrect = bubbles.some(b => b.value === currentProblem.answer);
    let value;
    if (forceCorrect || (!hasCorrect && Math.random() < 0.45)) {
      value = currentProblem.answer;
    } else {
      const delta = (Math.floor(Math.random() * 9) + 1) * (Math.random() < 0.5 ? 1 : -1);
      value = Math.max(0, currentProblem.answer + delta);
      if (value === currentProblem.answer) value += 1;
    }

    const radius = 22;
    const rocket = new PIXI.Container();
    const colors = [0x6ee7ff, 0xffd166, 0xff6b9d, 0x95d5b2, 0xc77dff, 0xffb4a2, 0xff9f1c];
    const color = colors[Math.floor(Math.random() * colors.length)];

    // Glowing core
    const glow = new PIXI.Graphics();
    glow.beginFill(color, 0.25);
    glow.drawCircle(0, 0, radius + 10);
    glow.endFill();
    glow.beginFill(color, 0.5);
    glow.drawCircle(0, 0, radius + 4);
    glow.endFill();
    glow.beginFill(0xffffff, 0.9);
    glow.drawCircle(0, 0, radius);
    glow.endFill();
    glow.beginFill(color, 1);
    glow.drawCircle(0, 0, radius - 4);
    glow.endFill();
    rocket.addChild(glow);

    const txt = new PIXI.Text(value.toString(), {
      fontFamily: 'Arial', fontSize: 20, fill: 0xffffff, fontWeight: 'bold',
      stroke: 0x000000, strokeThickness: 3
    });
    txt.anchor.set(0.5);
    rocket.addChild(txt);

    rocket.x = Math.random() * (W - radius * 2) + radius;
    rocket.y = H + radius;
    rocket.value = value;
    rocket.radius = radius;
    rocket.vy = -(120 + Math.random() * 40) * speedMultiplier;
    rocket.vx = (Math.random() - 0.5) * 30;
    rocket.wobble = Math.random() * Math.PI * 2;
    rocket.color = color;
    rocket.trailTimer = 0;
    rocket.pulse = 0;
    rocket.eventMode = 'static';
    rocket.cursor = 'pointer';
    // Bigger hit area so it's tappable despite small visual
    rocket.hitArea = new PIXI.Circle(0, 0, radius + 14);

    rocket.on('pointerdown', () => handleBubbleTap(rocket));

    gameLayer.addChild(rocket);
    bubbles.push(rocket);
  }

  // --- Trail sparks ---
  function spawnTrail(x, y, color) {
    const p = new PIXI.Graphics();
    p.beginFill(color, 0.9);
    p.drawCircle(0, 0, Math.random() * 2 + 1.5);
    p.endFill();
    p.x = x + (Math.random() - 0.5) * 6;
    p.y = y + (Math.random() - 0.5) * 4;
    p.vx = (Math.random() - 0.5) * 20;
    p.vy = Math.random() * 30 + 10; // drift downward
    p.life = 0.8;
    p.isTrail = true;
    fxLayer.addChild(p);
    particles.push(p);
  }

  function handleBubbleTap(bubble) {
    if (gameOver) return;
    if (bubble.value === currentProblem.answer) {
      // Correct!
      combo++;
      if (combo > bestCombo) bestCombo = combo;
      const gained = 10 + combo * 2;
      score += gained;
      spawnParticles(bubble.x, bubble.y, bubble.color, 24);
      spawnFloatText(bubble.x, bubble.y, `+${gained}`, 0x95d5b2);
      destroyBubble(bubble);
      updateUI();
      // Level up every 50 points
      const newLevel = Math.floor(score / 50) + 1;
      if (newLevel > level) {
        level = newLevel;
        speedMultiplier = 1 + (level - 1) * 0.15;
        spawnInterval = Math.max(0.8, 2.2 - (level - 1) * 0.15);
        spawnFloatText(W / 2, H / 2, `LEVEL ${level}!`, 0xffd166, 42);
      }
      loadNewProblem();
    } else {
      // Wrong
      combo = 0;
      lives--;
      spawnParticles(bubble.x, bubble.y, 0xff4d6d, 16);
      spawnFloatText(bubble.x, bubble.y, 'WRONG', 0xff4d6d);
      destroyBubble(bubble);
      updateUI();
      shakeScreen();
      if (lives <= 0) endGame();
    }
  }

  function destroyBubble(bubble) {
    const idx = bubbles.indexOf(bubble);
    if (idx > -1) bubbles.splice(idx, 1);
    gameLayer.removeChild(bubble);
    bubble.destroy({ children: true });
  }

  // --- Firework explosion ---
  function spawnParticles(x, y, color, count) {
    // Bright flash
    const flash = new PIXI.Graphics();
    flash.beginFill(0xffffff, 0.9);
    flash.drawCircle(0, 0, 30);
    flash.endFill();
    flash.x = x; flash.y = y;
    flash.life = 0.4;
    flash.isFlash = true;
    fxLayer.addChild(flash);
    particles.push(flash);

    // Multi-ring firework burst
    const rings = 2;
    const perRing = Math.max(count, 28);
    for (let r = 0; r < rings; r++) {
      const ringSpeed = r === 0 ? 260 : 180;
      const ringColor = r === 0 ? color : 0xffffff;
      for (let i = 0; i < perRing; i++) {
        const p = new PIXI.Graphics();
        p.beginFill(ringColor);
        p.drawCircle(0, 0, Math.random() * 2.5 + 2);
        p.endFill();
        p.x = x;
        p.y = y;
        const angle = (i / perRing) * Math.PI * 2 + Math.random() * 0.15;
        const speed = ringSpeed + Math.random() * 80;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.life = 1.2 + Math.random() * 0.6;
        p.gravity = true;
        p.twinkle = Math.random() * Math.PI * 2;
        fxLayer.addChild(p);
        particles.push(p);
      }
    }
    // Extra random sparks
    for (let i = 0; i < 20; i++) {
      const p = new PIXI.Graphics();
      p.beginFill(color);
      p.drawCircle(0, 0, 1.5);
      p.endFill();
      p.x = x; p.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 150 + 40;
      p.vx = Math.cos(angle) * speed;
      p.vy = Math.sin(angle) * speed;
      p.life = 0.8 + Math.random() * 0.6;
      p.gravity = true;
      fxLayer.addChild(p);
      particles.push(p);
    }
  }

  function spawnFloatText(x, y, text, color, size = 22) {
    const t = new PIXI.Text(text, {
      fontFamily: 'Arial', fontSize: size, fill: color, fontWeight: 'bold',
      stroke: 0x000000, strokeThickness: 3
    });
    t.anchor.set(0.5);
    t.x = x;
    t.y = y;
    t.life = 1;
    t.vy = -60;
    fxLayer.addChild(t);
    particles.push(t);
  }

  // --- Screen shake ---
  let shake = 0;
  function shakeScreen() { shake = 12; }

  // --- UI ---
  function updateUI() {
    scoreText.text = `Score: ${score}`;
    livesText.text = '♥ '.repeat(lives).trim() || '—';
    levelText.text = `Level ${level}`;
    comboText.text = combo > 1 ? `Combo x${combo}` : '';
  }

  // --- Game over ---
  let overScreen = null;
  function endGame() {
    gameOver = true;
    overScreen = new PIXI.Container();
    const bg = new PIXI.Graphics();
    bg.beginFill(0x000000, 0.75);
    bg.drawRect(0, 0, W, H);
    bg.endFill();
    overScreen.addChild(bg);

    const panel = new PIXI.Graphics();
    panel.beginFill(0x1e2744);
    panel.lineStyle(3, 0x6ee7ff);
    panel.drawRoundedRect(-180, -140, 360, 280, 20);
    panel.endFill();
    panel.position.set(W / 2, H / 2);
    overScreen.addChild(panel);

    const over = new PIXI.Text('GAME OVER', {
      fontFamily: 'Arial', fontSize: 36, fill: 0xff4d6d, fontWeight: 'bold'
    });
    over.anchor.set(0.5);
    over.position.set(W / 2, H / 2 - 80);
    overScreen.addChild(over);

    const finalScore = new PIXI.Text(`Final Score: ${score}`, {
      fontFamily: 'Arial', fontSize: 24, fill: 0xffffff
    });
    finalScore.anchor.set(0.5);
    finalScore.position.set(W / 2, H / 2 - 30);
    overScreen.addChild(finalScore);

    const bestC = new PIXI.Text(`Best Combo: x${bestCombo}`, {
      fontFamily: 'Arial', fontSize: 18, fill: 0xffd166
    });
    bestC.anchor.set(0.5);
    bestC.position.set(W / 2, H / 2 + 5);
    overScreen.addChild(bestC);

    const btn = new PIXI.Graphics();
    btn.beginFill(0x6ee7ff);
    btn.drawRoundedRect(-80, -20, 160, 40, 10);
    btn.endFill();
    btn.position.set(W / 2, H / 2 + 70);
    btn.eventMode = 'static';
    btn.cursor = 'pointer';
    overScreen.addChild(btn);

    const btnText = new PIXI.Text('Play Again', {
      fontFamily: 'Arial', fontSize: 20, fill: 0x0a0e1a, fontWeight: 'bold'
    });
    btnText.anchor.set(0.5);
    btnText.position.set(W / 2, H / 2 + 70);
    overScreen.addChild(btnText);

    btn.on('pointerdown', resetGame);

    app.stage.addChild(overScreen);
  }

  function resetGame() {
    score = 0;
    lives = 3;
    level = 1;
    combo = 0;
    bestCombo = 0;
    gameOver = false;
    speedMultiplier = 1;
    spawnInterval = 2.2;
    bubbles.forEach(b => gameLayer.removeChild(b));
    bubbles = [];
    particles.forEach(p => fxLayer.removeChild(p));
    particles = [];
    if (overScreen) {
      app.stage.removeChild(overScreen);
      overScreen.destroy({ children: true });
      overScreen = null;
    }
    loadNewProblem();
    updateUI();
  }

  // --- Main loop ---
  app.ticker.add((delta) => {
    const dt = delta / 60;
    if (gameOver) return;

    // Spawn bubbles
    timeSinceSpawn += dt;
    if (timeSinceSpawn >= spawnInterval) {
      timeSinceSpawn = 0;
      spawnBubble();
      // Occasionally make sure the correct answer is available
      if (!bubbles.some(b => b.value === currentProblem.answer) && Math.random() < 0.5) {
        spawnBubble(true);
      }
    }

    // Update rockets
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.wobble += dt * 2;
      b.pulse += dt * 8;
      b.x += (b.vx + Math.sin(b.wobble) * 20) * dt;
      b.y += b.vy * dt;

      // Pulsing glow
      b.scale.set(1 + Math.sin(b.pulse) * 0.08);

      // Emit trail sparks
      b.trailTimer += dt;
      if (b.trailTimer >= 0.02) {
        b.trailTimer = 0;
        spawnTrail(b.x, b.y + b.radius * 0.5, b.color);
        if (Math.random() < 0.4) {
          spawnTrail(b.x, b.y + b.radius * 0.5, 0xffffff);
        }
      }

      if (b.x < b.radius) { b.x = b.radius; b.vx *= -1; }
      if (b.x > W - b.radius) { b.x = W - b.radius; b.vx *= -1; }

      if (b.y < -b.radius) {
        // Missed! If it was the correct answer, lose a life
        if (b.value === currentProblem.answer) {
          lives--;
          combo = 0;
          spawnFloatText(b.x, 100, 'MISSED!', 0xff4d6d);
          shakeScreen();
          updateUI();
          if (lives <= 0) endGame();
          loadNewProblem();
        }
        destroyBubble(b);
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += (p.vx || 0) * dt;
      p.y += (p.vy || 0) * dt;
      if (p.gravity) {
        p.vy += 220 * dt;
        p.vx *= 0.985;
      } else if (p.isTrail) {
        p.vy += 40 * dt;
      } else if (p.isFlash) {
        p.scale.set(1 + (0.4 - p.life) * 3);
      } else if (p instanceof PIXI.Text) {
        // float text: rise
      } else if (p.vy !== undefined) {
        p.vy += 300 * dt;
      }
      p.life -= dt * (p.isFlash ? 3 : 1);
      // Twinkle effect for firework sparks
      if (p.twinkle !== undefined) {
        p.twinkle += dt * 20;
        p.alpha = Math.max(0, p.life) * (0.7 + Math.sin(p.twinkle) * 0.3);
      } else {
        p.alpha = Math.max(0, p.life);
      }
      if (p.life <= 0) {
        fxLayer.removeChild(p);
        p.destroy();
        particles.splice(i, 1);
      }
    }

    // Screen shake
    if (shake > 0) {
      gameLayer.x = (Math.random() - 0.5) * shake;
      gameLayer.y = (Math.random() - 0.5) * shake;
      shake *= 0.85;
      if (shake < 0.5) { shake = 0; gameLayer.x = 0; gameLayer.y = 0; }
    }
  });

  // Start
  loadNewProblem();
  updateUI();
})();
</script>
</body>
</html>

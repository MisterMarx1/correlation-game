    <style>
        /* Safe Area CSS Variables - injected by @capacitor-community/safe-area */
        :root {
            --safe-area-inset-top: 0px;
            --safe-area-inset-right: 0px;
            --safe-area-inset-bottom: 0px;
            --safe-area-inset-left: 0px;
        }

        /* Remove default browser margins and white border */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* iOS tap highlight fix */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            border: none;
            overflow: hidden;
            width: 100%;
            height: 100%;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Allow text selection for inputs and buttons */
        input, textarea, button, select {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        /* Keep pointer cursor for interactive elements */
        button, [role="button"], a {
            cursor: pointer;
        }

        /* --- Base Container --- */
        .math-in-space-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            width: 100%;
            height: calc(100vh - 100px - var(--safe-area-inset-bottom));
            padding-top: max(24px, var(--safe-area-inset-top));
            padding-left: var(--safe-area-inset-left);
            padding-right: var(--safe-area-inset-right);
            color: #e0e0e0;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
            font-family: 'Orbitron', sans-serif;
        }

        /* Default background for setup/results */
        .math-in-space-container:not(.playing-screen) {
            background: linear-gradient(to bottom, #000428, #004e92);
        }

        /* Remove background for playing state since canvas handles it */
        .math-in-space-container.playing-screen {
            background: none;
            padding: 10px;
        }

        /* --- Setup Screen --- */
        .setup-content {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .setup-content h1 {
            color: #00ccff;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0 0 0em;
            padding: 0em 0;
        }
        .setup-content h2 {
            color: #ff9900;
            font-size: 1.1em;
            margin: 0 2em;
            padding: 0 1em;
        }
        .settings-grid {
            display: grid;
            gap: 10px;
            margin-bottom: 10px;
            width: 70%;
            max-width: 600px;
            grid-template-columns: 1fr;
        }

        @media (min-width: 400px) {
            .settings-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 825px) {
            .settings-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #ccc;
        }
        .setting-group select {
            width: 100%;
            padding: 8px 10px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid #00ccff;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
        }
        .setting-group select option {
            background-color: #001f3f;
            color: #e0e0e0;
        }
        .start-button {
            font-size: 1.2em;
            padding: 8px 20px;
            cursor: pointer;
            background: linear-gradient(145deg, #ff9900, #cc7a00);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 153, 0, 0.4);
        }
        .start-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 153, 0, 0.6);
        }

        /* --- Playing Screen --- */
        .game-hud {
            display: flex;
            justify-content: space-between;
            width: 95%;
            max-width: 500px;
            font-size: clamp(1.1em, 1.5vw, 1.3em);
            padding: 5px 10px;
            margin-bottom: 10px;
            color: #00ccff;
            font-weight: 700;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            z-index: 10;
            position: relative;
        }
        .question-area {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
            position: relative;
        }
        .question {
            font-size: clamp(2.2em, 2.5vw, 2.5em);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 8px #00ccff;
        }

        .answer-options-container {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            height: 65%;
            overflow: visible;
            padding: 10px;
            box-sizing: border-box;
        }

        .answer-ship-wrapper {
            position: absolute;
            width: 105px;
            height: 105px;
            padding: 8px 4px;
            transform: translate(-50%, -50%);
            border-radius: 50px;
            z-index: 5;
            user-select: none;
            animation:
              shipAnimation 5s infinite ease-in-out,
              shipPopIn 0.3s ease-out;
        }

        .answer-ship-inner {
            background-color: rgba(0, 204, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height:40px;
            color: #001f3f;
            border: 2px solid #00ccff;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 700;
            text-align: center;
            transition:
                background-color 0.3s ease,
                border-color 0.3s ease,
                box-shadow 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
            padding: 0px 10px;
            user-select: none;
        }

        .answer-ship-inner:hover {
            outline: 3px solid #ff9900;
            outline-offset: 2px;
        }

        /* Force clear hover state on iPhone */
        .answer-ship-inner.no-hover:hover {
            outline: none !important;
            outline-offset: 0 !important;
        }

        .answer-ship-inner.correct {
            outline: 4px solid #00ff00 !important;
            outline-offset: 2px;
        }

        .answer-ship-inner.incorrect {
            outline: 4px solid #ff0000 !important;
            outline-offset: 2px;
        }

        .answer-ship.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .answer-ship-inner.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .player-ship-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            z-index: 1;
        }

        /* --- Ship Animation --- */
        @keyframes shipAnimation {
            0% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            25% {
                transform: translate(-50%, -50%) translateY(-5px) rotate(5deg) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            75% {
                transform: translate(-50%, -50%) translateY(5px) rotate(-5deg) scale(1);
            }
            100% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
        }

        @keyframes shipPopIn {
            0% {
              transform: translate(-50%, -50%) scale(0.6);
              opacity: 0;
            }
            100% {
              transform: translate(-50%, -50%) scale(1);
              opacity: 1;
            }
        }

        /* --- Feedback Flash --- */
        @keyframes flash-effect {
            0% { opacity: 0.4; }
            50% { opacity: 0; }
            100% { opacity: 0.4; }
        }
        .flash-correct::before, .flash-incorrect::before, .flash-timeout::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
            animation: flash-effect 0.4s linear;
        }
        .flash-correct::before { background-color: rgba(40, 167, 69, 0.4); }
        .flash-incorrect::before { background-color: rgba(255, 69, 69, 0.4); }
        .flash-timeout::before { background-color: rgba(255, 193, 7, 0.4); }

        /* --- Progress Bars --- */
        .progress-bar-container {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            display: flex;
            overflow: hidden;
            z-index: 15;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%;
            transition: width 0.3s ease-in-out;
        }
        .progress-bar.correct { background-color: #28a745; }
        .progress-bar.incorrect { background-color: #dc3545; }
        .progress-bar.timeout { background-color: #ffc107; }

        /* --- Results Screen --- */
        .math-in-space-container.results-screen {
            justify-content: center;
            gap: 20px;
        }

        .results-content {
            background-color: transparent;
            padding: 25px 25px 25px 25px;
            border: none;
            max-width: 600px;
            width: 90%;
            flex-direction: column;
            height: calc(100vh - 100px - 50px);
            max-height: calc(100vh - 100px - 50px);
            overflow-y: auto;
        }
        .results-ops {
            font-size: 1.2em;
            margin: 0px 0 10px 0;
        }
        .results-content h1 {
            color: #00ccff;
            margin: -0.5em 0em 0em;
            padding: 0em 0;
            font-size: clamp(1.4em, 7vw, 2em);
        }

        .results-content h2 {
            color: #ff9900;
            font-size: 1.5em;
            margin: 10px 0 10px 0;
        }
        .results-bars {
            position: relative;
            bottom: auto;
            left: auto;
            transform: none;
            margin: 15px auto;
            height: 15px;
        }
        .results-summary {
            font-size: 1em;
            color: #ccc;
            margin-bottom: 25px;
        }
        .play-again-button {
            font-size: 1.2em;
            padding: 10px 25px;
            cursor: pointer;
            background: linear-gradient(145deg, #00ccff, #007bff);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.4);
        }
        .play-again-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 204, 255, 0.6);
        }
        .log-output {
            margin-top: 10px;
        }
        .log-output h3 {
            color: #ccc;
            margin-top: -5px;
            margin-bottom: 10px;
        }
        .log-output textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(0, 204, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.3);
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8em;
            padding: 10px;
            border-radius: 4px;
            height: 100px;
            min-height: 100px;
            resize: vertical;
            overflow: auto;
        }

        /* --- Ship Feedback Colors --- */
        .answer-ship-inner.clicked-correct {
            background-color: rgba(40, 167, 69, 0.8);
            border-color: #28a745;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.7);
            z-index: 6;
        }

        .answer-ship-inner.clicked-incorrect {
            background-color: rgba(220, 53, 69, 0.8);
            border-color: #dc3545;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.7);
            z-index: 6;
        }

        .answer-ship-inner.show-correct {
            background-color: rgba(40, 167, 69, 0.8);
            border-color: #28a745;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.7);
            z-index: 6;
        }

        .quit-button {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: #fff;
            padding: 4px 4px;
            border: none;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
        }
        .quit-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 68, 68, 0.6);
        }

        .setting-group .operation-toggles {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .setting-group .op-button {
            flex: 1;
            padding: 8px 10px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid #00ccff;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .setting-group .op-button:hover {
            background-color: rgba(0, 204, 255, 0.1);
        }

        .setting-group .op-button.active {
            background-color: #00ccff;
            color: #001f3f;
            box-shadow: 0 0 8px rgba(0, 204, 255, 0.5);
        }

        .start-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .question-timer-container {
            position: absolute;
            bottom: 5px;
            width: 100px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
            z-index: 20;
        }
        .question-timer-bar {
            height: 100%;
            background: #ff9900;
            transition: width 0.1s linear;
        }

        @keyframes floatUpFade {
            0% {
              opacity: 1;
              transform: translate(-50%, -50%) scale(1);
            }
            50% {
              transform: translate(-50%, -80%) scale(1.2);
            }
            100% {
              opacity: 0;
              transform: translate(-50%, -120%) scale(0.9);
            }
        }

        .start-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: .5rem;
        }

        .multiplier-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .difficulty-multiplier-display {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: #ff0000;
            user-select: none;
        }

        .multiplier-label {
            font-size: 0.5rem;
            color: #ffffff;
            margin-bottom: 0.25rem;
        }

        .results-divider {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
            margin: 20px;
        }

        /* --- Sound Toggle Base Styles --- */
        .sound-toggle {
            background: none;
            border: none;
            color: rgba(0, 100, 150, 0.7);
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            opacity: 0.8;
        }

        .sound-toggle:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .sound-toggle.muted {
            color: rgba(100, 100, 100, 0.5);
        }

        /* Music button strikethrough when muted - thin diagonal line top-left to bottom-right */
        .music-toggle.muted {
            position: relative;
        }

        .music-toggle.muted::after {
            content: '';
            position: absolute;
            top: 48%;
            left: 30%;
            width: 22px;
            height: 1px;
            background-color: rgba(255, 0, 0, 0.7);
            transform: rotate(45deg);
        }

        .sound-toggle.muted:hover {
            color: rgba(150, 150, 150, 0.8);
        }

        /* --- Credits Toggle Base Styles --- */
        .credits-toggle {
            background: transparent;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: #00ccff;
            opacity: 0.8;
        }

        .credits-toggle:hover {
            color: #fff;
            transform: scale(1.1);
        }

        
        /* --- Credits Popup --- */
        .credits-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background-color: rgba(0, 31, 63, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 2000;
        }

        .credits-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 0.3em;
            color: #f8fafc;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        .credits-content {
            font-size: 16px;
            color: #94a3b8;
            font-family: 'IBM Plex Mono', monospace;
            text-align: center;
            max-width: 320px;
            line-height: 1.5;
        }

        .credits-close-button {
            padding: 12px 32px;
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .credits-close-button:hover {
            background-color: rgba(0, 204, 255, 0.1);
            color: #fff;
            border-color: rgba(0, 204, 255, 0.3);
        }

        /* --- Glow Pulse Animation --- */
        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 5px rgba(103, 232, 249, 0.8), 0 0 10px rgba(103, 232, 249, 0.6);
            }
            50% {
                text-shadow: 0 0 10px rgba(103, 232, 249, 1), 0 0 20px rgba(103, 232, 249, 0.8);
            }
        }

        .paused-game * {
            animation-play-state: paused !important;
        }

        /* Smokey Fog Overlay */
        .fog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100vh - 100px);
            background: radial-gradient(ellipse at center, 
                rgba(20, 25, 40, 0.95) 0%, 
                rgba(10, 15, 30, 0.98) 40%, 
                rgba(5, 10, 20, 1) 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fogDrift 8s ease-in-out infinite;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fog-overlay.disappearing {
            opacity: 0;
            transform: scale(1.1) rotate(2deg);
            pointer-events: none;
        }

        @keyframes fogDrift {
            0%, 100% { 
                background: radial-gradient(ellipse at center, 
                    rgba(20, 25, 40, 0.95) 0%, 
                    rgba(10, 15, 30, 0.98) 40%, 
                    rgba(5, 10, 20, 1) 100%);
            }
            25% { 
                background: radial-gradient(ellipse at 30% 40%, 
                    rgba(25, 30, 45, 0.93) 0%, 
                    rgba(12, 18, 35, 0.97) 40%, 
                    rgba(6, 12, 25, 1) 100%);
            }
            50% { 
                background: radial-gradient(ellipse at 70% 60%, 
                    rgba(22, 28, 42, 0.94) 0%, 
                    rgba(11, 17, 32, 0.98) 40%, 
                    rgba(5, 11, 22, 1) 100%);
            }
            75% { 
                background: radial-gradient(ellipse at 40% 30%, 
                    rgba(23, 29, 43, 0.92) 0%, 
                    rgba(13, 19, 33, 0.97) 40%, 
                    rgba(7, 13, 24, 1) 100%);
            }
        }

        .fog-text {
            font-family: 'Orbitron', monospace;

        /* --- Bottom Left Controls Stack --- */

<body>
    <div id="root"></div>
    
        
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { useSelector, useDispatch } = ReactRedux;
        const { createStore } = RTK;

        // --- Safe Area Plugin ---
        // @capacitor-community/safe-area automatically injects CSS variables
        // No JS API calls needed - plugin handles it all
        console.log("✓ Safe-area plugin CSS variables ready (injected by @capacitor-community/safe-area)");

        // --- Sound Management System ---
        const SoundRoles = {
            // Background music track (will loop and overlap with itself)
            BACKGROUND_MUSIC: 'mixkit-dark-space-motion-3026.wav',
            
            // UI Sounds
            BUTTON_CLICK: 'mixkit-cinematic-impact-waves-781.wav',
            QUIT_BUTTON: 'mixkit-futuristic-robotic-fast-sweep-171.wav',
            DROPDOWN_SELECT: 'mixkit-space-impact-774.wav',
            CONFIRMATION: 'mixkit-sci-fi-confirmation-914.wav',
            ERROR: 'mixkit-long-arcade-synth-fart-3043.wav',
            OPERATION_TOGGLE: 'mixkit-space-impact-774.wav',
            SPEED_BONUS: 'mixkit-correct-answer-fast-notification-953.wav',
            
            // Game Sounds
            LASER_SHOT: 'mixkit-space-impact-774.wav',
            CORRECT_ANSWER: 'mixkit-positive-interface-beep-221.wav',
            INCORRECT_ANSWER: 'mixkit-arcade-game-over-1949.wav',
            GAME_OVER: 'mixkit-melodic-game-over-956.wav',
            STOMP_IMPACT: 'mixkit-apocalyptic-stomp-impact-3057.wav',
            FAST_SWEEP: 'mixkit-futuristic-robotic-fast-sweep-171.wav'
        };

        class SoundManager {
            constructor() {
                this.sounds = {};
                this.musicStarted = false;
                this.userInteracted = false;
                this.isMusicMuted = false;
                this.isEffectsMuted = false;
                this.isPaused = false;
                this.basePath = './sfx/';
                this.loopTimer = null;
                
                // Web Audio API setup
                this.audioContext = null;
                this.musicBuffer = null;
                this.soundBuffers = {};
                this.nextStartTime = 0;
                this.gainNode = null;
                this.musicGainNode = null;
                this.effectsGainNode = null;
                this.effectsVolume = 0.5;
                
                this.initAudioContext();
                this.loadAllSounds();
            }

            initAudioContext() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Main gain node for all audio (music + effects)
                    this.gainNode = this.audioContext.createGain();
                    this.gainNode.connect(this.audioContext.destination);
                    
                    // Separate gain node for music volume control
                    this.musicGainNode = this.audioContext.createGain();
                    this.musicGainNode.connect(this.gainNode);
                } catch (e) {
                    console.log('Web Audio API not supported');
                }
            }

            async loadAllSounds() {
                // Load music buffer for Web Audio API
                try {
                    const response = await fetch(this.basePath + SoundRoles.BACKGROUND_MUSIC);
                    const arrayBuffer = await response.arrayBuffer();
                    this.musicBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                } catch (e) {
                    console.log('Failed to load music buffer:', e);
                }

                // Load all sound effects as Web Audio buffers
                const soundPromises = Object.entries(SoundRoles).map(async ([role, filename]) => {
                    if (role !== 'BACKGROUND_MUSIC') {
                        try {
                            const response = await fetch(this.basePath + filename);
                            const arrayBuffer = await response.arrayBuffer();
                            const buffer = await this.audioContext.decodeAudioData(arrayBuffer);
                            this.soundBuffers[role] = buffer;
                        } catch (e) {
                            console.log(`Failed to load sound ${role}:`, e);
                        }
                    }
                });

                await Promise.all(soundPromises);
            }

            toggleMusicMute() {
                this.isMusicMuted = !this.isMusicMuted;
                
                if (this.musicGainNode) {
                    this.musicGainNode.gain.value = this.isMusicMuted ? 0 : 0.3;
                }
                
                return this.isMusicMuted;
            }

            toggleEffectsMute() {
                this.isEffectsMuted = !this.isEffectsMuted;
                
                if (this.effectsGainNode) {
                    this.effectsGainNode.gain.value = this.isEffectsMuted ? 0 : 1;
                }
                
                return this.isEffectsMuted;
            }

            startBackgroundMusic() {
                if (this.musicStarted || !this.musicBuffer) return;
                
                this.musicStarted = true;
                
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
                
                this.nextStartTime = this.audioContext.currentTime;
                this.scheduleLoop();
            }

            playBufferedTrack(startTime) {
                if (!this.musicBuffer || !this.audioContext) return;
                
                const source = this.audioContext.createBufferSource();
                source.buffer = this.musicBuffer;

                const gain = this.audioContext.createGain();

                source.connect(gain);
                gain.connect(this.musicGainNode);

                const fadeTime = 2.0; // seconds

                // Smooth crossfade
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(1, startTime + 0.5);
                gain.gain.setValueAtTime(1, startTime + this.musicBuffer.duration - fadeTime);
                gain.gain.linearRampToValueAtTime(0, startTime + this.musicBuffer.duration);

                source.start(startTime);
            }
            
            scheduleLoop() {
                if (!this.musicStarted || this.isPaused) return;
                
                const now = this.audioContext.currentTime;

                if (this.nextStartTime < now) {
                    this.nextStartTime = now;
                }

                const overlapOffset = this.musicBuffer.duration - 10; // Your 22s overlap idea

                this.playBufferedTrack(this.nextStartTime);

                this.nextStartTime += overlapOffset;

                this.loopTimer = setTimeout(() => this.scheduleLoop(), 1000);
            }

            play(role) {
                if (!this.audioContext || this.isEffectsMuted) return;
                
                const buffer = this.soundBuffers[role];
                if (!buffer) return;
                
                const source = this.audioContext.createBufferSource();
                source.buffer = buffer;
                
                const gain = this.audioContext.createGain();
                gain.gain.value = this.effectsVolume || 0.5;
                
                source.connect(gain);
                gain.connect(this.gainNode);
                
                source.start(0);
            }

            stopBackgroundMusic() {
                // Clear the loop timer
                if (this.loopTimer) {
                    clearTimeout(this.loopTimer);
                    this.loopTimer = null;
                }
                
                this.musicStarted = false;
            }

            pause() {
                this.isPaused = true;
                
                // Clear the loop timer to prevent scheduled tracks from playing
                if (this.loopTimer) {
                    clearTimeout(this.loopTimer);
                    this.loopTimer = null;
                }
                
                // Suspend audio context to stop all Web Audio playback
                if (this.audioContext && this.audioContext.state === 'running') {
                    this.audioContext.suspend();
                }
            }

            resume() {
                this.isPaused = false;
                
                if (this.musicStarted) {
                    // Resume audio context first
                    if (this.audioContext && this.audioContext.state === 'suspended') {
                        this.audioContext.resume().then(() => {
                            this.scheduleLoop();
                        });
                    } else {
                        this.scheduleLoop();
                    }
                }
            }
        }

        // Initialize sound manager
        const soundManager = new SoundManager();

        // --- Configuration ---
        const DEFAULT_DURATION = 60;
        const DEFAULT_MAX_DIGITS = 1;
        const DEFAULT_NUM_OPTIONS = 4;
        const POINTS_CORRECT_PER_DIGIT = 25;
        const POINTS_INCORRECT_PENALTY_PER_DIGIT = 25;
        const POINTS_TIMEOUT_PER_DIGIT = 50;
        const SPEED_BONUS_THRESHOLD_MS = 2000;
        const SPEED_BONUS_POINTS_BASE = 10;
        const QUESTION_TIMEOUT = 10;

        // --- Helper Functions ---
        function getRandomInt(min, max) {
            min = Math.ceil(min);
            max = Math.floor(max);
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function clamp(val, min, max) {
            return Math.min(Math.max(val, min), max);
        }

        // --- Smart Incorrect Answer Generation ---
        function generateIncorrectAnswers(correctAnswer, num1, num2, operation, numOptions, maxDigits) {
            const incorrectAnswers = new Set();
            const maxPossibleValue = Math.pow(10, maxDigits) * 2;

            // 1. Off-by-one errors
            if (correctAnswer > 0) incorrectAnswers.add(correctAnswer - 1);
            incorrectAnswers.add(correctAnswer + 1);

            // 2. Operation mistakes
            if (operation === '+') incorrectAnswers.add(Math.abs(num1 - num2));
            if (operation === '-') incorrectAnswers.add(num1 + num2);
            if (operation === '*') {
                incorrectAnswers.add(num1 + num2);
                if (num2 !== 0) incorrectAnswers.add(Math.floor(num1 / num2));
            }
            if (operation === '/') {
                incorrectAnswers.add(num1 * num2);
                if (num2 !== 0) incorrectAnswers.add(num1 + num2);
            }

            // 3. Fill remaining slots with random numbers near the answer
            const randomRange = Math.max(5, Math.pow(10, maxDigits - 1 || 1));
            while (incorrectAnswers.size < numOptions - 1) {
                let randomAnswer = getRandomInt(
                    Math.max(0, correctAnswer - randomRange),
                    Math.min(maxPossibleValue, correctAnswer + randomRange)
                );
                if (randomAnswer !== correctAnswer && !incorrectAnswers.has(randomAnswer)) {
                    incorrectAnswers.add(randomAnswer);
                }
                if (incorrectAnswers.size >= numOptions * 3) break;
            }

            let finalIncorrect = Array.from(incorrectAnswers);
            finalIncorrect = finalIncorrect.filter((ans) => ans !== correctAnswer);

            if (finalIncorrect.length > numOptions - 1) {
                finalIncorrect = finalIncorrect.slice(0, numOptions - 1);
            }
            while (finalIncorrect.length < numOptions - 1) {
                let randomAnswer = getRandomInt(0, maxPossibleValue);
                if (randomAnswer !== correctAnswer && !finalIncorrect.includes(randomAnswer)) {
                    finalIncorrect.push(randomAnswer);
                }
                if (finalIncorrect.length >= numOptions * 3) break;
            }

            return finalIncorrect;
        }

        // --- Problem Generation ---
        function generateProblem(maxDigits, selectedOperations) {
            const maxVal = Math.pow(10, maxDigits) - 1;
            const minVal = maxDigits > 1 ? Math.pow(10, maxDigits - 1) : 0;

            let num1 = getRandomInt(minVal, maxVal);
            let num2 = getRandomInt(minVal, maxVal);
            const operation = selectedOperations[getRandomInt(0, selectedOperations.length - 1)];
            let question = '';
            let answer = 0;

            switch (operation) {
                case '+':
                    answer = num1 + num2;
                    question = `${num1} + ${num2} = ?`;
                    break;
                case '-':
                    if (num1 < num2) {
                        [num1, num2] = [num2, num1];
                    }
                    answer = num1 - num2;
                    question = `${num1} - ${num2} = ?`;
                    break;
                case '*':
                    num1 = getRandomInt(minVal, Math.max(minVal + 1, Math.floor(maxVal * 0.7)));
                    num2 = getRandomInt(minVal, Math.max(minVal + 1, Math.floor(maxVal * 0.7)));
                    answer = num1 * num2;
                    question = `${num1} × ${num2} = ?`;
                    break;
                case '/':
                    if (num2 === 0) num2 = getRandomInt(1, maxVal);
                    answer = getRandomInt(minVal, maxVal);
                    num1 = answer * num2;
                    if (num1 > maxVal * maxVal || (num1 > 144 && maxDigits <= 1)) {
                        return generateProblem(maxDigits, selectedOperations);
                    }
                    question = `${num1} ÷ ${num2} = ?`;
                    break;
                default:
                    return generateProblem(maxDigits, selectedOperations);
            }
            return { num1, num2, operation, question, answer };
        }

        function generateShipPositions(numShips) {
            const gridCols = 6;
            const gridRows = 4;
            const cellWidth = 100 / gridCols;
            const cellHeight = 100 / gridRows;

            const allCells = [];
            for (let row = 0; row < gridRows; row++) {
                for (let col = 0; col < gridCols; col++) {
                    allCells.push({ row, col });
                }
            }

            const shuffled = shuffleArray(allCells);
            const used = new Set();
            const chosen = [];

            for (const cell of shuffled) {
                const key = `${cell.row},${cell.col}`;
                if (used.has(key)) continue;

                chosen.push({
                    x: (cell.col + 0.5) * cellWidth,
                    y: (cell.row + 0.5) * cellHeight,
                });

                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const nr = cell.row + dy;
                        const nc = cell.col + dx;
                        if (nr >= 0 && nr < gridRows && nc >= 0 && nc < gridCols) {
                            used.add(`${nr},${nc}`);
                        }
                    }
                }

                if (chosen.length >= numShips) break;
            }

            return chosen;
        }

        // --- Starfield Background Component ---
        const StarfieldBackground = () => {
            const canvasRef = useRef(null);
            const starsRef = useRef([]);
            const animationFrameRef = useRef(null);

            const config = useMemo(() => ({
                numStarsPer100kPixels: 70,
                minStarSize: 0.5,
                maxStarSize: 2.0,
                minOpacity: 0.2,
                maxOpacity: 0.9,
                flickerChance: 0.02,
                flickerAmount: 0.3,
                backgroundColor: '#000428',
            }), []);

            const generateStars = useCallback((canvas) => {
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const width = canvas.offsetWidth * dpr;
                const height = canvas.offsetHeight * dpr;
                canvas.width = width;
                canvas.height = height;

                const numPixels = width * height;
                const numStars = Math.floor((numPixels / 100000) * config.numStarsPer100kPixels);
                const newStars = [];

                for (let i = 0; i < numStars; i++) {
                    const size = Math.random() * (config.maxStarSize - config.minStarSize) + config.minStarSize;
                    const baseOpacity = Math.random() * (config.maxOpacity - config.minOpacity) + config.minOpacity;
                    newStars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: size * dpr,
                        baseOpacity: baseOpacity,
                        currentOpacity: baseOpacity,
                        flicker: false,
                    });
                }
                starsRef.current = newStars;
            }, [config]);

            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                ctx.fillStyle = config.backgroundColor;
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = 'white';
                starsRef.current.forEach(star => {
                    if (star.flicker) {
                        star.currentOpacity = star.baseOpacity * (1 - config.flickerAmount * Math.random());
                        if (Math.random() > 0.8) {
                            star.flicker = false;
                            star.currentOpacity = star.baseOpacity;
                        }
                    } else if (Math.random() < config.flickerChance) {
                        star.flicker = true;
                    }

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size / 2, 0, Math.PI * 2);
                    ctx.globalAlpha = star.currentOpacity;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                });

                animationFrameRef.current = requestAnimationFrame(draw);
            }, [config]);

            const handleResize = useCallback(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    generateStars(canvas);
                }
            }, [generateStars]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                generateStars(canvas);
                animationFrameRef.current = requestAnimationFrame(draw);

                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationFrameRef.current);
                    window.removeEventListener('resize', handleResize);
                };
            }, [generateStars, draw, handleResize]);

            return (
                <canvas
                    ref={canvasRef}
                    style={{
                        position: 'absolute',
                        top: 0,
                        left: 0,
                        width: '100%',
                        height: '100%',
                        zIndex: -1,
                        pointerEvents: 'none',
                        display: 'block',
                    }}
                />
            );
        };

        // --- Music Toggle Component ---
        const MusicToggle = () => {
            const [isMusicMuted, setIsMusicMuted] = useState(soundManager.isMusicMuted);

            const toggleMusic = () => {
                const newMutedState = soundManager.toggleMusicMute();
                setIsMusicMuted(newMutedState);
            };

            return (
                <button 
                    className={`sound-toggle music-toggle ${isMusicMuted ? 'muted' : ''}`}
                    onClick={toggleMusic}
                    title={isMusicMuted ? 'Unmute music' : 'Mute music'}
                >
                    🎵
                </button>
            );
        };

        // --- Effects Toggle Component ---
        const EffectsToggle = () => {
            const [isEffectsMuted, setIsEffectsMuted] = useState(soundManager.isEffectsMuted);

            const toggleEffects = () => {
                const newMutedState = soundManager.toggleEffectsMute();
                setIsEffectsMuted(newMutedState);
            };

            return (
                <button 
                    className={`sound-toggle ${isEffectsMuted ? 'muted' : ''}`}
                    onClick={toggleEffects}
                    title={isEffectsMuted ? 'Unmute effects' : 'Mute effects'}
                >
                    {isEffectsMuted ? '🔇' : '🔊'}
                </button>
            );
        };

        // --- Credits Toggle Component ---
        const CreditsToggle = () => {
            const [showCredits, setShowCredits] = useState(false);

            const showCreditsPopup = () => {
                setShowCredits(true);
                soundManager.play('OPERATION_TOGGLE');
                // Pause the game
                document.body.classList.add('paused-game');

                const canvas = document.createElement('canvas');

                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.zIndex = '1';
                canvas.style.pointerEvents = 'none';
                document.body.appendChild(canvas);

                const ctx = canvas.getContext('2d');
                let width, height;
                let time = 0;
                let animationId;
                
                // SPEED MULTIPLIER - Adjust this to control animation speed:
                // > 1.0 = faster (1.1, 1.2, 1.5, etc.)
                // < 1.0 = slower (0.8, 0.6, 0.4, etc.)
                // 1.0 = normal speed
                const SPEED_MULTIPLIER = 0.3;

                function resizeCanvas() {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                }

                function drawWaveField() {
                    const gridSize = 50;
                    const waveAmplitude = 20;
                    const waveFrequency = 0.01;
                    
ctx.strokeStyle = 'rgba(255, 255, 255, 0.01)';  // Pure white
                    ctx.lineWidth = 12;
                    
                    for (let x = 0; x < width; x += gridSize) {
                        ctx.beginPath();
                        for (let y = 0; y < height; y += 10) {
                            const waveOffset = Math.sin(y * waveFrequency + time * 0.02 * SPEED_MULTIPLIER) * waveAmplitude;
                            const xPos = x + waveOffset;
                            
                            if (y === 0) {
                                ctx.moveTo(xPos, y);
                            } else {
                                ctx.lineTo(xPos, y);
                            }
                        }
                        ctx.stroke();
                    }
                }

                function animate() {
                    ctx.clearRect(0, 0, width, height);
                    drawWaveField();
                    time += 1 * SPEED_MULTIPLIER;
                    animationId = requestAnimationFrame(animate);
                }

                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
                animate();

                return () => {
                    window.removeEventListener('resize', resizeCanvas);
                    cancelAnimationFrame(animationId);
                    if (canvas.parentNode) {

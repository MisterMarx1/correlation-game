        * {

            padding: 0;

            -webkit-touch-callout: none;

            position: absolute;
            width: 105px;
            height: 105px;
            padding: 8px 4px;
            transform: translate(-50%, -50%);

            justify-content: center;

            border: 2px solid #00ccff;
            border-radius: 50px;

            font-weight: 700;
            text-align: center;

            outline: 3px solid #ff9900;
            outline-offset: 2px;

        .answer-ship-inner.no-hover:hover {
            outline: none !important;
            outline-offset: 0 !important;
        }

        .answer-ship-inner.correct {
            outline: 4px solid #00ff00 !important;
            outline-offset: 2px;
        }

        .answer-ship-inner.incorrect {
            outline: 4px solid #ff0000 !important;
            outline-offset: 2px;
        }

        .answer-ship.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .answer-ship-inner.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .player-ship-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;

            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            z-index: 1;
        }

        /* --- Ship Animation --- */
        @keyframes shipAnimation {
            0% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            25% {
                transform: translate(-50%, -50%) translateY(-5px) rotate(5deg) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            75% {
                transform: translate(-50%, -50%) translateY(5px) rotate(-5deg) scale(1);
            }
            100% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
        }

        @keyframes shipPopIn {
            0% {
              transform: translate(-50%, -50%) scale(0.6);
              opacity: 0;
            }
            100% {
              transform: translate(-50%, -50%) scale(1);
              opacity: 1;
            }
        }

        /* --- Feedback Flash --- */
        @keyframes flash-effect {
            0% { opacity: 0.4; }
            50% { opacity: 0; }
            100% { opacity: 0.4; }
        }
        .flash-correct::before, .flash-incorrect::before, .flash-timeout::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            pointer-events: none;
            animation: flash-effect 0.4s linear;
        }
        .flash-correct::before { background-color: rgba(40, 167, 69, 0.4); }
        .flash-incorrect::before { background-color: rgba(255, 69, 69, 0.4); }
        .flash-timeout::before { background-color: rgba(255, 193, 7, 0.4); }

        .progress-bar-container {

            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            display: flex;
            overflow: hidden;
            z-index: 15;
            margin-bottom: 10px;

        .progress-bar {
            height: 100%;
            transition: width 0.3s ease-in-out;
        }
        .progress-bar.correct { background-color: #28a745; }
        .progress-bar.incorrect { background-color: #dc3545; }
        .progress-bar.timeout { background-color: #ffc107; }

<body>
    <div id="root"></div>

    <script>
    /* ================================================================
       DebriefViewer — drop-in, size-agnostic, data-driven component.
       ================================================================ */
    class DebriefViewer {
      constructor(host, data) {
        this.host = host;
        this.data = Array.isArray(data) ? data : [];
        this.filter = 'all';
        this.headerStats = { username: '', finalScore: 0, timeoutCount: 0, speedBonusCount: 0, gameSettings: null };
        this._render();
      }

      setData(data) {
        this.data = Array.isArray(data) ? data : [];
        this._render();
      }

      setHeaderStats(username, finalScore, timeoutCount, speedBonusCount, gameSettings) {
        this.headerStats = { username, finalScore, timeoutCount, speedBonusCount, gameSettings };
        this._render();
      }

      destroy() {
        this.host.innerHTML = '';
      }

      _splitData() {
        const summary = this.data.find(x => x && x.type === 'summary') || null;
        const questions = this.data.filter(x => x && x.type !== 'summary');
        return { summary, questions };
      }

      _opSymbol(op) {
        if (op === '*' || op === '×') return '×';
        if (op === '/' || op === '÷') return '÷';
        return op;
      }

      _fmtMs(ms) {
        if (typeof ms !== 'number') return '—';
        if (ms < 1000) return `${Math.round(ms)} ms`;
        return `${(ms / 1000).toFixed(2)} s`;
      }

      _fmtTimestamp(iso) {
        if (!iso) return '—';
        try {
          const d = new Date(iso);
          return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        } catch (e) { return iso; }
      }

      _fmtFullTimestamp(iso) {
        if (!iso) return '—';
        try {
          return new Date(iso).toLocaleString();
        } catch (e) { return iso; }
      }

      _classify(q) {
        if (q.timedOut === true || q.userAnswer === 'TIMEOUT' || q.submittedAnswerParsed === 'TIMEOUT') return 'timeout';
        if (q.isCorrect) return 'correct';
        return 'incorrect';
      }

      _escape(s) {
        if (s === null || s === undefined) return '';
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }

      _render() {
        const { summary, questions } = this._splitData();

        this.host.innerHTML = '';
        const root = document.createElement('div');
        root.className = 'debrief-viewer';

        root.appendChild(this._renderHeader(summary, questions, this.headerStats.username, this.headerStats.finalScore, this.headerStats.timeoutCount, this.headerStats.speedBonusCount, this.headerStats.gameSettings));
        root.appendChild(this._renderFilters(questions));
        root.appendChild(this._renderList(questions));
        root.appendChild(this._renderFooter());

        this.host.appendChild(root);
        this._root = root;
      }

      _renderHeader(summary, questions, username, finalScore, timeoutCount, speedBonusCount, gameSettings) {
        const h = document.createElement('div');
        h.className = 'dv-header';

        let choicesHtml = '';
        if (gameSettings) {
          const opsStr = (gameSettings.operations || [])
            .map(sym => sym === '+' ? '+' : sym === '-' ? '-' : sym === '*' ? '×' : '÷')
            .join('  ');
          choicesHtml = `
            <div class="dv-divider"></div>
            <div class="dv-choices-label">CHOICES:</div>
            <div class="dv-choices-row">
              <span class="dv-choice-item">Max Digits: ${this._escape(gameSettings.maxDigits)}</span>
              <span class="dv-choice-item">Max Options: ${this._escape(gameSettings.maxOptions)}</span>
            </div>
            <div class="dv-choices-row">
              <span class="dv-choice-item">Duration: ${this._escape(gameSettings.duration)}s</span>
              <span class="dv-choice-item">Operations: ${this._escape(opsStr)}</span>
            </div>
          `;
        }

        h.innerHTML = `
          <div class="dv-title">Mission Debrief, ${this._escape(username)}!</div>
          <div class="dv-final-score">Final Score: ${this._escape(finalScore)}</div>
          <div class="dv-stats-row">
            <span class="dv-stat-item">Timeouts: ${this._escape(timeoutCount)}</span>
            <span class="dv-stat-item">Speed Bonuses: ${this._escape(speedBonusCount)}</span>
          </div>
          ${choicesHtml}
        `;
        return h;
      }

      _renderFilters(questions) {
        const wrap = document.createElement('div');
        wrap.className = 'dv-filters';

        const counts = {
          all: questions.length,
          correct: questions.filter(q => q.isCorrect).length,
          incorrect: questions.filter(q => !q.isCorrect && !(q.timedOut || q.userAnswer === 'TIMEOUT')).length,
          timeout: questions.filter(q => q.timedOut || q.userAnswer === 'TIMEOUT').length,
        };

        const buttons = [
          { key: 'all',       label: 'All' },
          { key: 'correct',   label: 'Correct' },
          { key: 'incorrect', label: 'Incorrect' },
          { key: 'timeout',   label: 'Timeouts' },
        ];

        buttons.forEach(b => {
          const btn = document.createElement('button');
          btn.className = 'dv-filter-btn' + (this.filter === b.key ? ' active' : '');
          btn.innerHTML = `${b.label}<span class="count">${counts[b.key]}</span>`;
          btn.addEventListener('click', () => {
            this.filter = b.key;
            this._render();
          });
          wrap.appendChild(btn);
        });

        return wrap;
      }

      _renderList(questions) {
        const list = document.createElement('div');
        list.className = 'dv-list';

        const filtered = questions.filter((q, i) => {
          const cls = this._classify(q);
          if (this.filter === 'all') return true;
          return cls === this.filter;
        });

        if (filtered.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'dv-empty';
          empty.textContent = 'No entries match this filter.';
          list.appendChild(empty);
          return list;
        }

        filtered.forEach((q) => {
          const originalIndex = questions.indexOf(q) + 1;
          list.appendChild(this._renderCard(q, originalIndex));
        });

        return list;
      }

      _renderCard(q, qNum) {
        const cls = this._classify(q);
        const card = document.createElement('div');
        card.className = `dv-card ${cls}`;

        const icon = cls === 'correct' ? '✓' : cls === 'timeout' ? '⏱' : '✗';
        const pts = q.pointsChange;
        const ptsCls = pts > 0 ? 'pos' : pts < 0 ? 'neg' : 'zero';
        const ptsStr = pts > 0 ? `+${pts}` : `${pts ?? 0}`;

        const questionText = q.problem?.question
          ?? `${q.problem?.num1 ?? '?'} ${this._opSymbol(q.problem?.operation)} ${q.problem?.num2 ?? '?'}`;

        const head = document.createElement('div');
        head.className = 'dv-card-head';
        head.innerHTML = `
          <div
            style="display: flex; align-items: center; gap: 4px;"
          >
            <span class="dv-icon">${icon}</span>
            <span class="dv-q-num">Q${qNum}</span>
          </div>
          <span class="dv-q-text">${this._escape(questionText)}</span>
          <span class="dv-q-points ${ptsCls}">${this._escape(ptsStr)} pts</span>
          <span class="dv-caret">▶</span>
        `;
        head.addEventListener('click', () => card.classList.toggle('open'));

        const body = document.createElement('div');
        body.className = 'dv-card-body';
        const inner = document.createElement('div');
        inner.className = 'dv-card-body-inner';

        const userAns = q.userAnswer;
        const parsedAns = q.submittedAnswerParsed;

        // Options Presented - at top
        if (Array.isArray(q.optionsPresented) && q.optionsPresented.length) {
          const optsWrap = document.createElement('div');
          optsWrap.style.display = 'flex';
          optsWrap.style.flexDirection = 'column';
          optsWrap.style.gap = '4px';

          const fk = document.createElement('span');
          fk.className = 'fk';
          fk.textContent = 'Options Presented';

          const optsRow = document.createElement('div');
          optsRow.className = 'dv-options';
          q.optionsPresented.forEach(opt => {
            const chip = document.createElement('span');
            chip.className = 'dv-opt';
            const isCorrectOpt = opt === q.problem?.answer;
            const isUserPick = opt === userAns || opt === parsedAns;
            if (isCorrectOpt) chip.classList.add('is-correct');
            if (isUserPick && !q.isCorrect) chip.classList.add('is-user-wrong');
            if (isUserPick && q.isCorrect) chip.classList.add('is-user-right');
            chip.textContent = opt;
            optsRow.appendChild(chip);
          });
          optsWrap.appendChild(fk);
          optsWrap.appendChild(optsRow);
          inner.appendChild(optsWrap);
        }

        // Regular fields (middle)
        const fields = [
          { k: 'Your Answer',      v: userAns === 'TIMEOUT' ? 'TIMED OUT' : this._escape(userAns) },
          { k: 'Correct Answer',   v: this._escape(q.problem?.answer) },
          { k: 'Parsed Answer',    v: parsedAns === 'TIMEOUT' ? 'TIMED OUT' : this._escape(parsedAns) },
          { k: 'Operation',        v: this._escape(this._opSymbol(q.problem?.operation)) },
          { k: 'Operand 1',        v: this._escape(q.problem?.num1) },
          { k: 'Operand 2',        v: this._escape(q.problem?.num2) },
          { k: 'Time Taken',       v: this._fmtMs(q.timeTakenMs) },
          { k: 'Speed Bonus',      v: this._escape(q.awardedSpeedBonus === false ? 0 : (q.awardedSpeedBonus ?? 0)) },
          { k: 'Points Change',    v: ptsStr },
          { k: 'Score After',      v: this._escape(q.scoreAfter ?? '—') },
          { k: 'Is Correct',       v: q.isCorrect ? 'Yes' : 'No' },
          { k: 'Timed Out',        v: (q.timedOut === true || userAns === 'TIMEOUT') ? 'Yes' : 'No' },
        ];

        fields.forEach(f => {
          const el = document.createElement('div');
          el.className = 'dv-field';
          el.innerHTML = `<span class="fk">${f.k}</span><span class="fv">${f.v}</span>`;
          inner.appendChild(el);

        // Timestamp - at bottom
        const timestampEl = document.createElement('div');
        timestampEl.className = 'dv-field';
        timestampEl.style.flexDirection = 'column';
        timestampEl.style.alignItems = 'center';
        timestampEl.style.textAlign = 'center';
        timestampEl.innerHTML = `<span class="fk">Timestamp</span><span class="fv">${this._escape(this._fmtFullTimestamp(q.timestamp))}</span>`;
        inner.appendChild(timestampEl);

        body.appendChild(inner);
        card.appendChild(head);
        card.appendChild(body);
        return card;
      }

      _renderFooter() {
        const f = document.createElement('div');
        f.className = 'dv-footer';
        f.innerHTML = `
          <div class="dv-legend">
            <span class="dv-legend-item"><span class="dv-legend-dot" style="background:#4ade80"></span>Correct</span>
            <span class="dv-legend-item"><span class="dv-legend-dot" style="background:#f87171"></span>Incorrect</span>
            <span class="dv-legend-item"><span class="dv-legend-dot" style="background:#fbbf24"></span>Timeout</span>
          </div>
          <div>Tap any question to expand details</div>
        `;
        return f;
      }
    }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { useSelector, useDispatch } = ReactRedux;
        const { createStore } = RTK;

        // --- Safe Area Plugin ---
        // @capacitor-community/safe-area automatically injects CSS variables
        // No JS API calls needed - plugin handles it all
        console.log("✓ Safe-area plugin CSS variables ready (injected by @capacitor-community/safe-area)");

        // --- Sound Management System ---
        const SoundRoles = {
            // Background music track (will loop and overlap with itself)
            BACKGROUND_MUSIC: 'Pinball Spring.mp3',
            
            // UI Sounds
            BUTTON_CLICK: 'mixkit-cinematic-impact-waves-781.wav',
            QUIT_BUTTON: 'mixkit-futuristic-robotic-fast-sweep-171.wav',
            DROPDOWN_SELECT: 'mixkit-space-impact-774.wav',
            CONFIRMATION: 'mixkit-sci-fi-confirmation-914.wav',
            ERROR: 'mixkit-long-arcade-synth-fart-3043.wav',
            OPERATION_TOGGLE: 'mixkit-space-impact-774.wav',
            SPEED_BONUS: 'mixkit-correct-answer-fast-notification-953.wav',
            
            // Game Sounds
            LASER_SHOT: 'mixkit-space-impact-774.wav',
            CORRECT_ANSWER: 'mixkit-positive-interface-beep-221.wav',
            INCORRECT_ANSWER: 'mixkit-arcade-game-over-1949.wav',
            GAME_OVER: 'mixkit-melodic-game-over-956.wav',
            STOMP_IMPACT: 'mixkit-apocalyptic-stomp-impact-3057.wav',
            FAST_SWEEP: 'mixkit-futuristic-robotic-fast-sweep-171.wav'
        };

        class SoundManager {
            constructor() {
                this.sounds = {};
                this.musicStarted = false;
                this.userInteracted = false;
                this.isMusicMuted = false;
                this.isEffectsMuted = false;
                this.isPaused = false;
                this.basePath = './sfx/';
                this.loopTimer = null;
                
                // Web Audio API setup
                this.audioContext = null;
                this.musicBuffer = null;
                this.soundBuffers = {};
                this.nextStartTime = 0;
                this.gainNode = null;
                this.musicGainNode = null;
                this.effectsGainNode = null;
                this.effectsVolume = 0.5;
                
                // Music loading state
                this.isMusicReady = false;
                this.musicLoadingPromise = null;
                
                this.initAudioContext();
                this.musicLoadingPromise = this.loadAllSounds();
            }

            initAudioContext() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Main gain node for all audio (music + effects)
                    this.gainNode = this.audioContext.createGain();
                    this.gainNode.connect(this.audioContext.destination);
                    
                    // Separate gain node for music volume control
                    this.musicGainNode = this.audioContext.createGain();
                    this.musicGainNode.connect(this.gainNode);
                } catch (e) {
                    console.log('Web Audio API not supported');
                }
            }

            async loadAllSounds() {
                // Load music buffer for Web Audio API
                try {
                    const response = await fetch(this.basePath + SoundRoles.BACKGROUND_MUSIC);
                    const arrayBuffer = await response.arrayBuffer();
                    this.musicBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                    this.isMusicReady = true;
                } catch (e) {
                    console.log('Failed to load music buffer:', e);
                    this.isMusicReady = false;
                }

                // Load all sound effects as Web Audio buffers
                const soundPromises = Object.entries(SoundRoles).map(async ([role, filename]) => {
                    if (role !== 'BACKGROUND_MUSIC') {
                        try {
                            const response = await fetch(this.basePath + filename);
                            const arrayBuffer = await response.arrayBuffer();
                            const buffer = await this.audioContext.decodeAudioData(arrayBuffer);
                            this.soundBuffers[role] = buffer;
                        } catch (e) {
                            console.log(`Failed to load sound ${role}:`, e);
                        }
                    }
                });

                await Promise.all(soundPromises);
            }

            toggleMusicMute() {
                this.isMusicMuted = !this.isMusicMuted;
                
                if (this.musicGainNode) {
                    const newGainValue = this.isMusicMuted ? 0 : 1;
                    this.musicGainNode.gain.value = newGainValue;
                }
                
                return this.isMusicMuted;
            }

            toggleEffectsMute() {
                this.isEffectsMuted = !this.isEffectsMuted;
                
                if (this.effectsGainNode) {
                    this.effectsGainNode.gain.value = this.isEffectsMuted ? 0 : 1;
                }
                
                return this.isEffectsMuted;
            }

            startBackgroundMusic() {
                if (this.musicStarted || !this.musicBuffer) return;
                
                this.musicStarted = true;
                
                if (this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
                
                this.nextStartTime = this.audioContext.currentTime;
                this.scheduleLoop();
            }

            playBufferedTrack(startTime) {
                if (!this.musicBuffer || !this.audioContext) return;
                
                const source = this.audioContext.createBufferSource();
                source.buffer = this.musicBuffer;

                const gain = this.audioContext.createGain();

                source.connect(gain);
                gain.connect(this.musicGainNode);

                const fadeTime = 2.0; // seconds

                // Smooth crossfade - fade in, then fade out last 2 seconds
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.2, startTime + 0.5);
                gain.gain.setValueAtTime(0.2, startTime + this.musicBuffer.duration - fadeTime);
                gain.gain.linearRampToValueAtTime(0, startTime + this.musicBuffer.duration);

                source.start(startTime);
            }
            
            scheduleLoop() {
                if (!this.musicStarted || this.isPaused) return;
                
                const now = this.audioContext.currentTime;

                if (this.nextStartTime < now) {
                    this.nextStartTime = now;
                }

                const overlapOffset = this.musicBuffer.duration - 2; // 2-second crossfade

                this.playBufferedTrack(this.nextStartTime);

                this.nextStartTime += overlapOffset;

                this.loopTimer = setTimeout(() => this.scheduleLoop(), 1000);
            }

            play(role) {
                if (!this.audioContext || this.isEffectsMuted) return;
                
                const buffer = this.soundBuffers[role];
                if (!buffer) return;
                
                const source = this.audioContext.createBufferSource();
                source.buffer = buffer;
                
                const gain = this.audioContext.createGain();
                gain.gain.value = this.effectsVolume || 0.5;
                
                source.connect(gain);
                gain.connect(this.gainNode);
                
                source.start(0);
            }

            stopBackgroundMusic() {
                // Clear the loop timer
                if (this.loopTimer) {
                    clearTimeout(this.loopTimer);
                    this.loopTimer = null;
                }
                
                this.musicStarted = false;
            }

            pause() {
                this.isPaused = true;
                
                // Clear the loop timer to prevent scheduled tracks from playing
                if (this.loopTimer) {
                    clearTimeout(this.loopTimer);
                    this.loopTimer = null;
                }
                
                // Suspend audio context to stop all Web Audio playback
                if (this.audioContext && this.audioContext.state === 'running') {
                    this.audioContext.suspend();
                }
            }

            resume() {
                this.isPaused = false;
                
                if (this.musicStarted) {
                    // Resume audio context first
                    if (this.audioContext && this.audioContext.state === 'suspended') {
                        this.audioContext.resume().then(() => {
                            this.scheduleLoop();
                        });
                    } else {
                        this.scheduleLoop();
                    }
                }
            }
        }

        // Initialize sound manager
        const soundManager = new SoundManager();

        // --- Configuration ---
        const DEFAULT_DURATION = 60;
        const DEFAULT_MAX_DIGITS = 1;
        const DEFAULT_NUM_OPTIONS = 4;
        const POINTS_CORRECT_PER_DIGIT = 25;
        const POINTS_INCORRECT_PENALTY_PER_DIGIT = 25;
        const POINTS_TIMEOUT_PER_DIGIT = 50;
        const SPEED_BONUS_THRESHOLD_MS = 2000;
        const SPEED_BONUS_POINTS_BASE = 10;
        const QUESTION_TIMEOUT = 10;

        // --- Helper Functions ---
        function getRandomInt(min, max) {
            min = Math.ceil(min);
            max = Math.floor(max);
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function clamp(val, min, max) {
            return Math.min(Math.max(val, min), max);
        }

        // --- Smart Incorrect Answer Generation ---
        function generateIncorrectAnswers(correctAnswer, num1, num2, operation, numOptions, maxDigits) {
            const incorrectAnswers = new Set();
            const maxPossibleValue = Math.pow(10, maxDigits) * 2;

            // 1. Off-by-one errors
            if (correctAnswer > 0) incorrectAnswers.add(correctAnswer - 1);
            incorrectAnswers.add(correctAnswer + 1);

            // 2. Operation mistakes
            if (operation === '+') incorrectAnswers.add(Math.abs(num1 - num2));
            if (operation === '-') incorrectAnswers.add(num1 + num2);
            if (operation === '*') {
                incorrectAnswers.add(num1 + num2);
                if (num2 !== 0) incorrectAnswers.add(Math.floor(num1 / num2));
            }
            if (operation === '/') {
                incorrectAnswers.add(num1 * num2);
                if (num2 !== 0) incorrectAnswers.add(num1 + num2);
            }

            // 3. Fill remaining slots with random numbers near the answer
            const randomRange = Math.max(5, Math.pow(10, maxDigits - 1 || 1));
            while (incorrectAnswers.size < numOptions - 1) {
                let randomAnswer = getRandomInt(
                    Math.max(0, correctAnswer - randomRange),
                    Math.min(maxPossibleValue, correctAnswer + randomRange)
                );
                if (randomAnswer !== correctAnswer && !incorrectAnswers.has(randomAnswer)) {
                    incorrectAnswers.add(randomAnswer);
                }
                if (incorrectAnswers.size >= numOptions * 3) break;
            }

            let finalIncorrect = Array.from(incorrectAnswers);
            finalIncorrect = finalIncorrect.filter((ans) => ans !== correctAnswer);

            if (finalIncorrect.length > numOptions - 1) {
                finalIncorrect = finalIncorrect.slice(0, numOptions - 1);
            }
            while (finalIncorrect.length < numOptions - 1) {
                let randomAnswer = getRandomInt(0, maxPossibleValue);
                if (randomAnswer !== correctAnswer && !finalIncorrect.includes(randomAnswer)) {
                    finalIncorrect.push(randomAnswer);
                }
                if (finalIncorrect.length >= numOptions * 3) break;
            }

            return finalIncorrect;
        }

        // --- Problem Generation ---
        function generateProblem(maxDigits, selectedOperations) {
            const maxVal = Math.pow(10, maxDigits) - 1;
            const minVal = maxDigits > 1 ? Math.pow(10, maxDigits - 1) : 0;

            let num1 = getRandomInt(minVal, maxVal);
            let num2 = getRandomInt(minVal, maxVal);
            const operation = selectedOperations[getRandomInt(0, selectedOperations.length - 1)];
            let question = '';
            let answer = 0;

            switch (operation) {
                case '+':
                    answer = num1 + num2;
                    question = `${num1} + ${num2} = ?`;
                    break;
                case '-':
                    if (num1 < num2) {
                        [num1, num2] = [num2, num1];
                    }
                    answer = num1 - num2;
                    question = `${num1} - ${num2} = ?`;
                    break;
                case '*':
                    num1 = getRandomInt(minVal, Math.max(minVal + 1, Math.floor(maxVal * 0.7)));
                    num2 = getRandomInt(minVal, Math.max(minVal + 1, Math.floor(maxVal * 0.7)));
                    answer = num1 * num2;
                    question = `${num1} × ${num2} = ?`;
                    break;
                case '/':
                    if (num2 === 0) num2 = getRandomInt(1, maxVal);
                    answer = getRandomInt(minVal, maxVal);
                    num1 = answer * num2;
                    if (num1 > maxVal * maxVal || (num1 > 144 && maxDigits <= 1)) {
                        return generateProblem(maxDigits, selectedOperations);
                    }
                    question = `${num1} ÷ ${num2} = ?`;
                    break;
                default:
                    return generateProblem(maxDigits, selectedOperations);
            }
            return { num1, num2, operation, question, answer };
        }

        function generateShipPositions(numShips) {
            const gridCols = 6;
            const gridRows = 4;
            const cellWidth = 100 / gridCols;
            const cellHeight = 100 / gridRows;

            const allCells = [];
            for (let row = 0; row < gridRows; row++) {
                for (let col = 0; col < gridCols; col++) {
                    allCells.push({ row, col });
                }
            }

            const shuffled = shuffleArray(allCells);
            const used = new Set();
            const chosen = [];

            for (const cell of shuffled) {
                const key = `${cell.row},${cell.col}`;
                if (used.has(key)) continue;

                chosen.push({
                    x: (cell.col + 0.5) * cellWidth,
                    y: (cell.row + 0.5) * cellHeight,
                });

                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const nr = cell.row + dy;
                        const nc = cell.col + dx;
                        if (nr >= 0 && nr < gridRows && nc >= 0 && nc < gridCols) {
                            used.add(`${nr},${nc}`);
                        }
                    }
                }

                if (chosen.length >= numShips) break;
            }

            return chosen;
        }

        // --- Starfield Background Component ---
        const StarfieldBackground = () => {
            const canvasRef = useRef(null);
            const starsRef = useRef([]);
            const animationFrameRef = useRef(null);

            const config = useMemo(() => ({
                numStarsPer100kPixels: 70,
                minStarSize: 0.5,
                maxStarSize: 2.0,
                minOpacity: 0.2,
                maxOpacity: 0.9,
                flickerChance: 0.02,
                flickerAmount: 0.3,
                backgroundColor: '#000428',
            }), []);

            const generateStars = useCallback((canvas) => {
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const width = canvas.offsetWidth * dpr;
                const height = canvas.offsetHeight * dpr;
                canvas.width = width;
                canvas.height = height;

                const numPixels = width * height;
                const numStars = Math.floor((numPixels / 100000) * config.numStarsPer100kPixels);
                const newStars = [];

                for (let i = 0; i < numStars; i++) {
                    const size = Math.random() * (config.maxStarSize - config.minStarSize) + config.minStarSize;
                    const baseOpacity = Math.random() * (config.maxOpacity - config.minOpacity) + config.minOpacity;
                    newStars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        size: size * dpr,
                        baseOpacity: baseOpacity,
                        currentOpacity: baseOpacity,
                        flicker: false,
                    });
                }
                starsRef.current = newStars;
            }, [config]);

            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                ctx.fillStyle = config.backgroundColor;
                ctx.fillRect(0, 0, width, height);

                ctx.fillStyle = 'white';
                starsRef.current.forEach(star => {
                    if (star.flicker) {
                        star.currentOpacity = star.baseOpacity * (1 - config.flickerAmount * Math.random());
                        if (Math.random() > 0.8) {
                            star.flicker = false;
                            star.currentOpacity = star.baseOpacity;
                        }
                    } else if (Math.random() < config.flickerChance) {
                        star.flicker = true;
                    }

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size / 2, 0, Math.PI * 2);
                    ctx.globalAlpha = star.currentOpacity;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                });

                animationFrameRef.current = requestAnimationFrame(draw);
            }, [config]);

            const handleResize = useCallback(() => {
                const canvas = canvasRef.current;
                if (canvas) {
                    generateStars(canvas);
                }
            }, [generateStars]);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                generateStars(canvas);
                animationFrameRef.current = requestAnimationFrame(draw);

                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationFrameRef.current);
                    window.removeEventListener('resize', handleResize);
                };
            }, [generateStars, draw, handleResize]);

            return (
                <canvas
                    ref={canvasRef}
                    style={{
                        position: 'absolute',
                        top: 0,
                        left: 0,
                        width: '100%',
                        height: '100%',
                        zIndex: -1,
                        pointerEvents: 'none',
                        display: 'block',
                    }}
                />
            );
        };

        // --- Music Toggle Component ---
        const MusicToggle = () => {
            const [isMusicMuted, setIsMusicMuted] = useState(soundManager.isMusicMuted);

            const toggleMusic = () => {
                const newMutedState = soundManager.toggleMusicMute();
                setIsMusicMuted(newMutedState);
            };

            return (
                <button 
                    className={`sound-toggle music-toggle ${isMusicMuted ? 'muted' : ''}`}
                    onClick={toggleMusic}
                    title={isMusicMuted ? 'Unmute music' : 'Mute music'}

        // --- Effects Toggle Component ---
        const EffectsToggle = () => {

            const toggleEffects = () => {

                setIsEffectsMuted(newMutedState);

            return (

        // --- Credits Toggle Component ---
        const CreditsToggle = () => {
            const [showCredits, setShowCredits] = useState(false);

            const showCreditsPopup = () => {
                setShowCredits(true);
                soundManager.play('OPERATION_TOGGLE');

            const hideCreditsPopup = () => {

                soundManager.play('OPERATION_TOGGLE');

            };

            return (
                <>
                    <button 
                        className="credits-toggle"

                    >
                        ℹ️
                    </button>
                    
                    {showCredits && (
                        <div className="credits-popup">
                            <div className="credits-title">Credits</div>
                                Licensed under Creative Commons: By Attribution 4.0 License<br/>
                            <div className="credits-content">
                                http://creativecommons.org/licenses/by/4.0/<br/>
                                <br/>
                            </div>
                            <div className="credits-content">
                                Music "Pinball Spring" by Kevin MacLeod (incompetech.com)<br/>
                                <hr className="results-divider" style={{width: "100%"}}/>
                                Sound Effects by Mixkit<br/>
                                https://mixkit.co
                            </div>
                            <button 
                                className="credits-close-button"
                                onClick={hideCreditsPopup}
                            >
                                Close
                            </button>
                        </div>
                    )}
                </>
            );
        };

        // --- Companion Page Component ---
        const CompanionPage = () => {
            const [showCompanionPage, setShowCompanionPage] = useState(false);

            // Listen for companion page events
            useEffect(() => {
                const handleShowCompanionPage = () => setShowCompanionPage(true);
                const handleHideCompanionPage = () => setShowCompanionPage(false);
                
                window.addEventListener('showCompanionPage', handleShowCompanionPage);
                window.addEventListener('hideCompanionPage', handleHideCompanionPage);
                
                return () => {
                    window.removeEventListener('showCompanionPage', handleShowCompanionPage);
                    window.removeEventListener('hideCompanionPage', handleHideCompanionPage);
                };
            }, []);

                const ctx = canvas.getContext('2d');
                let width, height;
                let time = 0;
                let animationId;
                
                // SPEED MULTIPLIER - Adjust this to control animation speed:
                // > 1.0 = faster (1.1, 1.2, 1.5, etc.)
                // < 1.0 = slower (0.8, 0.6, 0.4, etc.)
                // 1.0 = normal speed
                const SPEED_MULTIPLIER = 0.3;

                function resizeCanvas() {
                    width = canvas.width = window.innerWidth;
                    const viewportHeight = window.innerHeight;
                    const safeAreaBottom = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--safe-area-inset-bottom')) || 0;

                    const gridSize = 50;

ctx.strokeStyle = 'rgba(255, 255, 255, 0.01)';  // Pure white
                    ctx.lineWidth = 12;
                    
                    for (let x = 0; x < width; x += gridSize) {

                        for (let y = 0; y < height; y += 10) {
                            const waveOffset = Math.sin(y * waveFrequency + time * 0.02 * SPEED_MULTIPLIER) * waveAmplitude;

                            }

                animate();

                selectedOperations: 1.06131204,
                oldDifficulty: 1,
                newDifficulty: 1.015 * 1 * 1.01 * 1.06131204,
            });

            // --- Game State ---
            const [gameState, setGameState] = useState('setup');
            const [isPaused, setIsPaused] = useState(false);
            const [pauseTime, setPauseTime] = useState(null);
            const [isWaitingForNextProblem, setIsWaitingForNextProblem] = useState(false);
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(DEFAULT_DURATION);
            const [currentProblem, setCurrentProblem] = useState(null);
            const [answerOptions, setAnswerOptions] = useState([]);
            const [gameLog, setGameLog] = useState([]);
            const [questionTimeLeft, setQuestionTimeLeft] = useState(QUESTION_TIMEOUT);

            // --- Feedback & Progress State ---
            const [feedbackType, setFeedbackType] = useState(null);
            const [showFeedbackFlash, setShowFeedbackFlash] = useState(false);
            const [correctCount, setCorrectCount] = useState(0);
            const [incorrectCount, setIncorrectCount] = useState(0);
            const [timeoutCount, setTimeoutCount] = useState(0);
            const [speedBonusDisplay, setSpeedBonusDisplay] = useState(null);
            const [shipSize, setShipSize] = useState({ widthPercent: 10, heightPercent: 6 });

            // --- Ship Interaction State ---
            const [clickedShipId, setClickedShipId] = useState(null);
            const [clickedShipFeedback, setClickedShipFeedback] = useState(null);
            const [correctShipId, setCorrectShipId] = useState(null);

            // --- Fog Overlay State ---
            const [showFogOverlay, setShowFogOverlay] = useState(true);
            const [isFogDisappearing, setIsFogDisappearing] = useState(false);
            const [isPageLoaded, setIsPageLoaded] = useState(false);

            // --- Refs ---
            const gameAreaRef = useRef(null);
            const playerShipRef = useRef(null);
            const timerRef = useRef(null);
            const problemStartTimeRef = useRef(null);
            const feedbackTimerRef = useRef(null);
            const laserTimeoutRef = useRef(null);
            const answerOptionRefs = useRef({});

            // --- Handle page load ---
            useEffect(() => {
                const handleLoad = async () => {
                    // Wait for music loading to complete
                    if (soundManager.musicLoadingPromise) {
                        try {
                            await soundManager.musicLoadingPromise;
                        } catch (e) {
                            console.log('Music loading failed:', e);
                        }
                    }
                    setIsPageLoaded(true);
                };
                
                if (document.readyState === 'complete') {
                    handleLoad();
                } else {
                    window.addEventListener('load', handleLoad);
                    return () => window.removeEventListener('load', handleLoad);
                }
            }, []);

            // --- Dynamic Background Color Toggle ---
            useEffect(() => {
                if (gameState === 'playing') {
                    document.documentElement.style.backgroundColor = 'transparent';
                } else {
                    document.documentElement.style.backgroundColor = '#001f3f';
                }
            }, [gameState]);

            
            // --- Memos ---
            const totalQuestionsAnswered = useMemo(() => correctCount + incorrectCount + timeoutCount, [correctCount, incorrectCount, timeoutCount]);
            const speedBonusCount = useMemo(() => {
                return gameLog.filter(entry => entry.isCorrect && entry.awardedSpeedBonus > 0).length;
            }, [gameLog]);

            const operationMultipliers = useMemo(() => ({
                '+': 1.01,
                '-': 1.01,
                '*': 1.02,
                '/': 1.02,
            }), []);

            const toggleOperation = useCallback((op) => {
                setSelectedOperations((prev) => {
                    const updated = prev.includes(op) ? prev.filter((o) => o !== op) : [...prev, op];

                    const opMultiplier =
                        updated.length === 1 && (updated[0] === '+' || updated[0] === '-')
                            ? 1
                            : updated.reduce((prod, o) => prod * operationMultipliers[o], 1);

                    setDifficultyMultiplier((prevDM) => ({
                        ...prevDM,
                        selectedOperations: opMultiplier,
                        oldDifficulty: prevDM.newDifficulty,
                        newDifficulty: prevDM.newDifficulty * (opMultiplier / (prevDM.selectedOperations || 1)),
                    }));

                    return updated;
                });
            }, [operationMultipliers]);

            // --- Ship Size Measurement ---
            useEffect(() => {
                const measure = () => {
                    const sample = document.querySelector('.answer-ship-wrapper');
                    if (sample) {
                        const rect = sample.getBoundingClientRect();
                        const w = (rect.width / window.innerWidth) * 100;
                        const h = (rect.height / window.innerHeight) * 100;
                        setShipSize({ widthPercent: w, heightPercent: h });
                    }
                };
                setTimeout(measure, 100);
                window.addEventListener('resize', measure);
                return () => {
                    window.removeEventListener('resize', measure);
                };
            }, []);

            // --- Game Logic Functions ---
            const generateAndSetProblem = useCallback(() => {
                setQuestionTimeLeft(QUESTION_TIMEOUT);
                
                // Reset selection state immediately to prevent stuck borders
                setClickedShipId(null);
                setClickedShipFeedback(null);
                setCorrectShipId(null);
                setShowFeedbackFlash(false);

                const problem = generateProblem(selectedMaxDigits, selectedOperations);
                const incorrect = generateIncorrectAnswers(
                    problem.answer,
                    problem.num1,
                    problem.num2,
                    problem.operation,
                    selectedNumOptions,
                    selectedMaxDigits
                );
                const options = shuffleArray([
                    { value: problem.answer, isCorrect: true },
                    ...incorrect.map(v => ({ value: v, isCorrect: false }))
                ]);

                const positions = generateShipPositions(options.length);

                const positionedOptions = options.map((opt, index) => ({
                    ...opt,
                    id: Date.now() + index,
                    position: positions[index] || { x: 50, y: 50 },
                    noHover: true // Add flag to prevent stuck hover on iPhone
                }));

                setCurrentProblem(problem);
                setAnswerOptions(positionedOptions);
                problemStartTimeRef.current = performance.now();

                // Remove no-hover flag after a short delay to allow normal hover
                setTimeout(() => {
                    setAnswerOptions(prev => prev.map(opt => ({ ...opt, noHover: false })));
                }, 100);
            }, [selectedMaxDigits, selectedNumOptions, selectedOperations, shipSize]);

            const triggerFeedback = useCallback((type) => {
                setFeedbackType(type);
                setShowFeedbackFlash(true);
                clearTimeout(feedbackTimerRef.current);
                feedbackTimerRef.current = setTimeout(() => {
                    setShowFeedbackFlash(false);
                    setFeedbackType(null);
                    if (type !== 'timeout' && gameState === 'playing') {
                        generateAndSetProblem();
                    }
                }, type === 'incorrect' ? 600 : 400);
            }, [gameState, generateAndSetProblem]);

            const startGame = useCallback(() => {
                setScore(0);
                setTimeLeft(selectedDuration);
                setGameLog([]);
                setCorrectCount(0);
                setIncorrectCount(0);
                setTimeoutCount(0);
                setFeedbackType(null);
                setShowFeedbackFlash(false);
                setGameState('playing');
                generateAndSetProblem();
            }, [selectedDuration, generateAndSetProblem]);

            // --- Main Game Timer Management ---
            useEffect(() => {
                if (gameState !== 'playing') return;

                if (timerRef.current) clearInterval(timerRef.current);

                timerRef.current = setInterval(() => {
                    if (!isPaused) {
                        setTimeLeft((prevTime) => {
                            if (prevTime <= 1) {
                                clearInterval(timerRef.current);
                                if (currentProblem && gameState === 'playing') {
                                    setTimeoutCount(c => c + 1);
                                    setGameLog(prevLog => [
                                        ...prevLog, {
                                            timestamp: new Date().toISOString(),
                                            problem: { ...currentProblem },
                                            userAnswer: 'TIMEOUT',
                                            submittedAnswerParsed: 'TIMEOUT',
                                            isCorrect: false,
                                            timeTakenMs: selectedDuration * 1000 - (performance.now() - problemStartTimeRef.current),
                                            awardedSpeedBonus: false,
                                            pointsChange: 0,
                                            scoreAfter: score,
                                            timedOut: true,
                                        },
                                    ]);
                                    triggerFeedback('timeout');
                                }
                                soundManager.play('GAME_OVER');
                                setGameState('results');
                                return 0;
                            }
                            return prevTime - 1;
                        });
                    }
                }, 1000);

                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                };
            }, [gameState, isPaused, selectedDuration, currentProblem, score, triggerFeedback]);

            const handleAnswerSelect = useCallback((selectedOption) => {
                if (gameState !== 'playing' || !currentProblem || isWaitingForNextProblem || isPaused) return;

                const selectedValue = selectedOption.value;
                const timeTakenMs = performance.now() - problemStartTimeRef.current;
                const isCorrect = selectedValue === currentProblem.answer;
                let pointsChange = 0;
                let awardedSpeedBonus = 0;

                const correctOption = answerOptions.find(opt => opt.value === currentProblem.answer);
                setCorrectShipId(correctOption?.id);

                setClickedShipId(selectedOption.id);
                setClickedShipFeedback(isCorrect ? 'correct' : 'incorrect');

                if (isCorrect) {
                    pointsChange = Math.round(POINTS_CORRECT_PER_DIGIT * difficultyMultiplier.newDifficulty);
                    if (timeTakenMs <= SPEED_BONUS_THRESHOLD_MS) {
                        awardedSpeedBonus = Math.round(SPEED_BONUS_POINTS_BASE * difficultyMultiplier.newDifficulty);
                        pointsChange += awardedSpeedBonus;
                        soundManager.play('SPEED_BONUS');

                        const shipEl = answerOptionRefs.current[selectedOption.id];
                        if (shipEl) {
                            const rect = shipEl.getBoundingClientRect();
                            const x = rect.left + rect.width / 2;
                            const y = rect.top + rect.height / 2;
                            setSpeedBonusDisplay({ x, y, value: `+${awardedSpeedBonus}\nSpeed\nBonus!` });
                            setTimeout(() => setSpeedBonusDisplay(null), 1000);
                        }
                    }
                    soundManager.play('CORRECT_ANSWER');
                    triggerFeedback('correct');
                } else if (selectedValue === 'TIMEOUT') {
                    pointsChange = -POINTS_TIMEOUT_PER_DIGIT * selectedMaxDigits;
                    soundManager.play('ERROR');
                    triggerFeedback('timeout');
                } else {
                    pointsChange = -POINTS_INCORRECT_PENALTY_PER_DIGIT * selectedMaxDigits;
                    soundManager.play('INCORRECT_ANSWER');
                    triggerFeedback('incorrect');
                }

                setScore(prevScore => Math.max(0, prevScore + pointsChange));
                if (selectedValue === 'TIMEOUT') {
                    setTimeoutCount(prev => prev + 1);
                } else {
                    setCorrectCount(prev => isCorrect ? prev + 1 : prev);
                    setIncorrectCount(prev => isCorrect ? prev : prev + 1);
                }
 
                setGameLog(prevLog => [
                    ...prevLog,
                    {
                        timestamp: new Date().toISOString(),
                        problem: { ...currentProblem },
                        userAnswer: selectedValue,
                        submittedAnswerParsed: selectedValue,
                        isCorrect: isCorrect,
                        timeTakenMs: Math.round(timeTakenMs),
                        awardedSpeedBonus: awardedSpeedBonus,
                        pointsChange: pointsChange,
                        scoreAfter: score,
                        optionsPresented: answerOptions.map(opt => opt.value)
                    },
                ]);

                clearTimeout(laserTimeoutRef.current);
                laserTimeoutRef.current = setTimeout(() => {
                    setClickedShipId(null);
                    setClickedShipFeedback(null);
                    setCorrectShipId(null);
                    setShowFeedbackFlash(false);
                }, isCorrect ? 400 : 400);

                setIsWaitingForNextProblem(true);
                clearTimeout(feedbackTimerRef.current);
                feedbackTimerRef.current = setTimeout(() => {
                    setIsWaitingForNextProblem(false);
                    if (gameState === 'playing') {
                        generateAndSetProblem();
                    }
                }, isCorrect ? 400 : 600);
            }, [gameState, currentProblem, selectedMaxDigits, answerOptions, score, triggerFeedback, generateAndSetProblem, setShowFeedbackFlash, isWaitingForNextProblem, difficultyMultiplier]);

            const playAgain = () => {
                setGameState('setup');
                setCurrentProblem(null);
                setAnswerOptions([]);
                if (timerRef.current) clearInterval(timerRef.current);
                clearTimeout(feedbackTimerRef.current);
                clearTimeout(laserTimeoutRef.current);
            };

            const handleQuit = () => {
                setGameState('setup');
                setScore(0);
                setTimeLeft(DEFAULT_DURATION);
                setCorrectCount(0);
                setIncorrectCount(0);
                setTimeoutCount(0);
                setFeedbackType(null);
                setShowFeedbackFlash(false);
                setCurrentProblem(null);
                setAnswerOptions([]);
                clearInterval(timerRef.current);
                clearTimeout(feedbackTimerRef.current);
                clearTimeout(laserTimeoutRef.current);
            };

            // --- Effects ---
            useEffect(() => {
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                    clearTimeout(feedbackTimerRef.current);
                    clearTimeout(laserTimeoutRef.current);
                };
            }, []);

            useEffect(() => {
                if (gameState !== 'playing') return;

                const qTimer = setInterval(() => {
                    if (!isPaused) {
                        setQuestionTimeLeft(t => {
                            if (t <= 0) {
                                clearInterval(qTimer);
                                handleAnswerSelect({ value: 'TIMEOUT', id: null });
                                return 0;
                            }
                            return t - 0.1;
                        });
                    }
                }, 100);

                return () => clearInterval(qTimer);
            }, [gameState, currentProblem, handleAnswerSelect, isPaused]);

            useEffect(() => {
                if (gameState === 'results') {
                    setGameLog(prev => [
                        ...prev,
                        {
                            type: 'summary',
                            timestamp: new Date().toISOString(),
                            finalScore: score,
                            operationsUsed: selectedOperations.map(op =>
                                op === '+' ? '+'
                                    : op === '-' ? '-'
                                    : op === '*' ? '×'
                                    : '÷'),
                            duration: selectedDuration,
                            maxDigits: selectedMaxDigits,
                            numOptions: selectedNumOptions,
                            difficultyMultiplier: difficultyMultiplier.newDifficulty,
                            totalQuestions: totalQuestionsAnswered,
                            correct: correctCount,
                            incorrect: incorrectCount,
                            timeouts: timeoutCount,
                        },
                    ]);
                }
            }, [
                gameState,
                score,
                selectedOperations,
                totalQuestionsAnswered,
                correctCount,
                incorrectCount,
                timeoutCount,
                difficultyMultiplier,
                selectedDuration,
                selectedMaxDigits,
                selectedNumOptions,
            ]);

            // --- Tab Visibility Detection ---
            useEffect(() => {
                // Detect if running in Android Capacitor app
                const isAndroidApp = window.Capacitor && window.Capacitor.platform === 'android';
                
                const handleVisibilityChange = () => {
                    if (document.hidden) {
                        // Page is hidden - pause background music
                        if (!isPaused) setPauseTime(Date.now());
                        setIsPaused(true);
                        soundManager.pause();
                    } else {
                        // Page is visible again - resume background music
                        setIsPaused(false);
                        soundManager.resume();
                    }
                };

                // ALWAYS add visibilitychange (needed for both web and Android)
                window.addEventListener('visibilitychange', handleVisibilityChange);

                // ONLY add these for web/desktop, NOT for Android
                if (!isAndroidApp) {
                    const handleBlur = () => {
                        if (!isPaused) setPauseTime(Date.now());
                        setIsPaused(true);
                        soundManager.pause();
                    };

                    const handleFocus = () => {
                        setIsPaused(false);
                        soundManager.resume();
                    };

                    const handlePageHide = () => {
                        if (!isPaused) setPauseTime(Date.now());
                        setIsPaused(true);
                        soundManager.pause();
                    };

                    const handlePageShow = () => {
                        setIsPaused(false);
                        soundManager.resume();
                    };

                    window.addEventListener('blur', handleBlur);
                    window.addEventListener('focus', handleFocus);
                    window.addEventListener('pagehide', handlePageHide);
                    window.addEventListener('pageshow', handlePageShow);

                    return () => {
                        window.removeEventListener('blur', handleBlur);
                        window.removeEventListener('focus', handleFocus);
                        window.removeEventListener('pagehide', handlePageHide);
                        window.removeEventListener('pageshow', handlePageShow);
                    };
                }

                return () => {
                    window.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }, [isPaused]);

            // --- Calculate Progress Bar Widths ---
            const totalAttempts = correctCount + incorrectCount + timeoutCount;
            const correctWidth = totalAttempts > 0 ? (correctCount / totalAttempts) * 100 : 0;
            const incorrectWidth = totalAttempts > 0 ? (incorrectCount / totalAttempts) * 100 : 0;
            const timeoutWidth = totalAttempts > 0 ? (timeoutCount / totalAttempts) * 100 : 0;

            const username = 'Cadet'; // Default username for standalone version

            return (
                <>
                    {/* Ad Overlay - transparent full-screen overlay - OUTSIDE container */}
                    <AdOverlay />

                    <div
                        className={`math-in-space-container ${gameState}-screen ${showFeedbackFlash ? `flash-${feedbackType}` : ''}`}
                        ref={gameAreaRef}
                    >
                        {/* Smokey Fog Overlay */}
                        {showFogOverlay && (
                            <div className={`fog-overlay ${isFogDisappearing ? 'disappearing' : ''}`} onClick={() => {
                                if (!isFogDisappearing && isPageLoaded) {
                                    setIsFogDisappearing(true);
                                    // Initialize audio on user interaction
                                    soundManager.startBackgroundMusic();
                                    setTimeout(() => {
                                        setShowFogOverlay(false);
                                        setIsFogDisappearing(false);
                                    }, 800);
                                }
                            }}>
                                <div className="fog-particles">
                                    {(() => {
                                        const particles = [];
                                        for (let i = 0; i < 5; i++) {
                                            const left = Math.random() * 90 + 5; // 5% to 95% to stay on screen
                                            const top = Math.random() * 80 + 10; // 10% to 90% to stay on screen
                                            particles.push(
                                                <div 
                                                    key={i}
                                                    className={`fog-particle ${isFogDisappearing ? 'disappearing' : ''}`} 
                                                    style={{left: `${left}%`, top: `${top}%`, animationDelay: '0s'}}
                                                />
                                            );
                                        }
                                        return particles;
                                    })()}
                                </div>
                                <div className={`fog-text ${isFogDisappearing ? 'disappearing' : ''} ${isPageLoaded ? 'loaded' : ''}`}>
                                    PRESS ANYWHERE TO BEGIN<br/>MATH IN SPACE
                                </div>
                                
                                {/* Circular Progress Spinner */}
                                {!isPageLoaded && (
                                    <div className="fog-progress-container">
                                        <div className="fog-progress-spinner">
                                            <div className="fog-progress-circle"></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        {gameState === 'playing' && <StarfieldBackground />}

                        {gameState === 'setup' && (
                            <SetupScreen
                                username={username}
                                selectedDuration={selectedDuration}
                                setSelectedDuration={setSelectedDuration}
                                selectedMaxDigits={selectedMaxDigits}
                                setSelectedMaxDigits={setSelectedMaxDigits}
                                selectedNumOptions={selectedNumOptions}
                                setSelectedNumOptions={setSelectedNumOptions}
                                selectedOperations={selectedOperations}
                                toggleOperation={toggleOperation}
                                difficultyMultiplier={difficultyMultiplier}
                                setDifficultyMultiplier={setDifficultyMultiplier}
                                onStart={startGame}
                                setGameLog={setGameLog}
                                setScore={setScore}
                                setCorrectCount={setCorrectCount}
                                setIncorrectCount={setIncorrectCount}
                                setTimeoutCount={setTimeoutCount}
                                setGameState={setGameState}
                            />
                        )}

                        {gameState === 'playing' && currentProblem && (
                            <PlayingScreen
                                score={score}
                                timeLeft={timeLeft}
                                handleQuit={handleQuit}
                                currentProblem={currentProblem}
                                answerOptions={answerOptions}
                                clamp={clamp}
                                clickedShipId={clickedShipId}
                                clickedShipFeedback={clickedShipFeedback}
                                correctShipId={correctShipId}
                                isWaitingForNextProblem={isWaitingForNextProblem}
                                handleAnswerSelect={handleAnswerSelect}
                                answerOptionRefs={answerOptionRefs}
                                playerShipRef={playerShipRef}
                                correctWidth={correctWidth}
                                timeoutWidth={timeoutWidth}
                                incorrectWidth={incorrectWidth}
                                correctCount={correctCount}
                                timeoutCount={timeoutCount}
                                incorrectCount={incorrectCount}
                                questionTimeLeft={questionTimeLeft}
                                speedBonusDisplay={speedBonusDisplay}
                            />
                        )}

                        {gameState === 'results' && (
                            <ResultsScreen
                                username={username}
                                score={score}
                                selectedMaxDigits={selectedMaxDigits}
                                selectedNumOptions={selectedNumOptions}
                                selectedDuration={selectedDuration}
                                selectedOperations={selectedOperations}
                                correctWidth={correctWidth}
                                timeoutWidth={timeoutWidth}
                                incorrectWidth={incorrectWidth}
                                totalQuestionsAnswered={totalQuestionsAnswered}
                                correctCount={correctCount}
                                incorrectCount={incorrectCount}
                                timeoutCount={timeoutCount}
                                speedBonusCount={speedBonusCount}
                                playAgain={playAgain}
                                gameLog={gameLog}
                            />
                        )}

                        {/* Bottom left stacked controls */}
                        <div className="bottom-controls-stack">
                            <EffectsToggle />
                            <MusicToggle />
                            <CreditsToggle />
                        </div>
                        
                        {/* Bottom right copyright */}
                        <div className="copyright-text">© 2026 Mister Marx LLC</div>
                        
                        {/* Companion Page popup */}
                        <CompanionPage />
                    </div>
                    
                </>
            );
        }

        // --- Redux Store Setup (simplified for standalone) ---
        const initialState = {
            auth: {
                user: {
                    username: 'Cadet'
                },
                userProfile: null
            }
        };

        const store = createStore((state = initialState, action) => {
            switch (action.type) {
                default:
                    return state;
            }
        });

        // --- App Rendering ---
        const { Provider } = ReactRedux;
        const root = ReactDOM.createRoot(document.getElementById('root'));
        
        // Version console log - update this on each deploy
        // IMPORTANT: Before you git push origin main you MUST update this timestamp
        // Format: YYYY-MM-DDTHH:MM:SSZ (UTC)
        // This ensures you know if you need to hard refresh to see the latest version
        console.log("=== MATH IN SPACE v1.816 [2026-04-16T22:25:00Z] DEPLOYED ===");
        
        root.render(
            <Provider store={store}>
                <MathInSpace />
            </Provider>
        );
        
    </script>
    </script>

    <!-- Landscape Orientation Warning -->
    <div id="landscape-warning" class="landscape-warning">
        <div class="landscape-warning-icon">📱</div>
        <h1>Please Rotate Device</h1>
        <p>This game requires portrait mode</p>
    </div>

    <script>
        // Landscape Orientation Detection
        (function() {
            const landscapeWarning = document.getElementById('landscape-warning');
            
            function isMobileDevice() {
                // Check for touch support or small screen width
                return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 1024);
            }
            
            function checkOrientation() {
                if (isMobileDevice() && window.innerHeight < window.innerWidth) {
                    landscapeWarning.classList.add('visible');
                } else {
                    landscapeWarning.classList.remove('visible');
                }
            }
            
            // Wait for fonts to load before checking orientation
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(() => {
                    // Check on load and resize
                    window.addEventListener('resize', checkOrientation);
                    window.addEventListener('orientationchange', checkOrientation);
                    checkOrientation();
                });
            } else {
                // Fallback if fonts API not available
                window.addEventListener('resize', checkOrientation);
                window.addEventListener('orientationchange', checkOrientation);
                checkOrientation();
            }
        })();
    </script>
</body>
</html>

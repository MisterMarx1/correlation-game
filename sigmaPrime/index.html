<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="A strategic puzzle game where you draw paths to satisfy mathematical conditions involving prime numbers and sums.">

    <style>

            padding: 0;

            -moz-osx-font-smoothing: grayscale;

            overflow: hidden;
            transition: background-color 0.2s ease-in-out;
            /* iOS tap highlight fix */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;

        }

        /* Reserve space for game grid to prevent layout shift */
        #root {
            width: 100%;
            height: var(--app-height, 100dvh);
            min-height: var(--app-height, 100dvh);
            max-height: var(--app-height, 100dvh);

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            visibility: hidden;
            position: absolute;
            height: 0;
            overflow: hidden;
        }

        /* Allow text selection for inputs and buttons */
        input, textarea, button, select {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        /* iOS-specific touch improvements */
        @supports (-webkit-touch-callout: none) {
            .interactive-cell {
                -webkit-transform: translateZ(0);
                transform: translateZ(0);
                -webkit-backface-visibility: hidden;
                backface-visibility: hidden;
                -webkit-perspective: 1000;
                perspective: 1000;
            }
            
            .interactive-cell:active {

                transform: scale(0.95) translateZ(0);
            }

        /* Smokey Fog Overlay */

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fogDrift 8s ease-in-out infinite;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fog-overlay.disappearing {
            opacity: 0;
            transform: scale(1.1) rotate(2deg);
            pointer-events: none;
        }

        @keyframes fogDrift {
            0%, 100% { 
                background: radial-gradient(ellipse at center, 
                    rgba(20, 25, 40, 0.95) 0%, 
                    rgba(10, 15, 30, 0.98) 40%, 
                    rgba(5, 10, 20, 1) 100%);
            }
            25% { 
                background: radial-gradient(ellipse at 30% 40%, 
                    rgba(25, 30, 45, 0.93) 0%, 
                    rgba(12, 18, 35, 0.97) 40%, 
                    rgba(6, 12, 25, 1) 100%);
            }
            50% { 
                background: radial-gradient(ellipse at 70% 60%, 
                    rgba(22, 28, 42, 0.94) 0%, 
                    rgba(11, 17, 32, 0.98) 40%, 
                    rgba(5, 11, 22, 1) 100%);
            }
            75% { 
                background: radial-gradient(ellipse at 40% 30%, 
                    rgba(23, 29, 43, 0.92) 0%, 
                    rgba(13, 19, 33, 0.97) 40%, 
                    rgba(7, 13, 24, 1) 100%);

        .fog-text {

        .fog-text.disappearing {

        .blob3 {

        .bg-particles {

        @keyframes blob1 {

        @keyframes blob3 {

        @keyframes float0 {

        @keyframes float1 {
            0%, 100% { transform: translateY(0) translateX(0); }

        @keyframes float2 {

        /* --- Circular Progress Spinner --- */
        .fog-progress-container {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
        }

        .fog-progress-spinner {
            width: 60px;

        }

        .fog-progress-circle {
            width: 100%;

        @keyframes spin {

        @keyframes marquee {

        @keyframes blink {

        .marquee {
            position: absolute;

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Viewport Sync Script -->
    <script>
      function syncAppHeight() {
        const vv = window.visualViewport;
        const h = vv ? vv.height : window.innerHeight;
        const top = vv ? vv.offsetTop : 0;

        document.documentElement.style.setProperty('--app-height', `${h}px`);
        document.documentElement.style.setProperty('--app-top', `${top}px`);
      }

      syncAppHeight();

      window.addEventListener('resize', syncAppHeight);
      window.addEventListener('orientationchange', syncAppHeight);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncAppHeight);
        window.visualViewport.addEventListener('scroll', syncAppHeight);
      }
      
      // Generate floating particles for dynamic background
      const particlesEl = document.getElementById('bg-particles');
      for(let i = 0; i < 20; i++){
        const p = document.createElement('div');
        p.className = 'bg-particle';
        const s = 2 + Math.random() * 3;
        Object.assign(p.style, {
          width: s + 'px', 
          height: s + 'px', 
          opacity: 0.15 + Math.random() * 0.2, 
          left: Math.random() * 100 + '%', 
          top: Math.random() * 100 + '%', 
          animation: 'float' + (i % 3) + ' ' + (6 + Math.random() * 8) + 's ease-in-out infinite', 
          animationDelay: Math.random() * 5 + 's',
          background: '#9b5de5'
        });
        particlesEl.appendChild(p);
      }
    </script>
    
    <script type="text/babel">
        const W = 8;
        const H = 8;
        const MAX_LIFE = 10;
        const ROUNDS = 10;
        const BASE_TURN = 11000;

        const ALL_PRIMES = [2, 3, 5, 7];

        // Sound Management System
        const SoundManager = {
            sounds: {},
            audioContext: null,
            volume: 0.5,
            musicVolume: 0.3,
            enabled: true,
            backgroundMusic: null,
            activeSounds: new Set(),
            weldingSound: null,
            weldingPlayers: [],
            weldingCrossfadeTimer: null,
            weldingCrossfadeMs: 1000,
            
            // Electric humming sound system
            electricHumPlayers: [],
            electricHumCrossfadeTimer: null,
            electricHumCrossfadeMs: 3500, // 3.5 second overlap
            
            // Audio object pooling for performance
            audioPool: {},
            maxPoolSize: 5,
            
            async init() {
                // Initialize Web Audio API
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Initialize background music with overlapping tracks
                this.backgroundMusic = new Audio('sfx/mixkit-asteroid-space-atmosphere-2004.wav');
                this.backgroundMusic.loop = true;
                this.backgroundMusic.volume = this.musicVolume;
                this.backgroundMusic.preload = 'auto';
                
                this.backgroundMusic2 = new Audio('sfx/mixkit-asteroid-space-atmosphere-2004.wav');
                this.backgroundMusic2.loop = true;
                this.backgroundMusic2.volume = this.musicVolume;
                this.backgroundMusic2.preload = 'auto';
                
                this.musicOverlapTimer = null;
                this.musicOverlapMs = 3000; // 3 second overlap
                
                // Predefined sound file paths
                this.soundFiles = {
                    'mixkit-record-player-needle-drop-on-vinyl-701.wav': 'sfx/mixkit-record-player-needle-drop-on-vinyl-701.wav',
                    'mixkit-mouse-squeak-1019.wav': 'sfx/mixkit-mouse-squeak-1019.wav',
                    'mixkit-laser-game-over-1946.wav': 'sfx/mixkit-laser-game-over-1946.wav',
                    'mixkit-low-electricity-humming-2132.wav': 'sfx/mixkit-low-electricity-humming-2132.wav',
                    'mixkit-melodic-bonus-collect-1938.wav': 'sfx/mixkit-melodic-bonus-collect-1938.wav',
                    'mixkit-game-user-interface-tone-2570.wav': 'sfx/mixkit-game-user-interface-tone-2570.wav',
                    'mixkit-explainer-video-game-reveal-235 (1).wav': 'sfx/mixkit-explainer-video-game-reveal-235 (1).wav'
                };
                
                // Initialize audio pools
                Object.keys(this.soundFiles).forEach(key => {
                    this.audioPool[key] = [];
                    for (let i = 0; i < this.maxPoolSize; i++) {
                        const audio = new Audio(this.soundFiles[key]);
                        audio.preload = 'auto';
                        audio.volume = this.volume;
                        this.audioPool[key].push(audio);
                    }
                    // Keep one for compatibility
                    this.sounds[key] = this.audioPool[key][0];
                });
                
                            },
            
            play(soundName, volume = 1.0, options = {}) {
                if (!this.enabled || !this.audioPool[soundName]) return null;
                
                const { loop = false } = options;
                
                try {
                    // Get audio from pool
                    let audio = this.audioPool[soundName].find(a => a.paused || a.ended);
                    
                    // If no available audio, use the first one (fallback)
                    if (!audio) {
                        audio = this.audioPool[soundName][0];
                        // Stop any current playback
                        audio.pause();
                        audio.currentTime = 0;
                    }
                    
                    audio.volume = this.volume * volume;
                    audio.loop = loop;
                    audio.currentTime = 0;
                    
                    // CRITICAL INP FIX: Defer sound play to next frame to avoid blocking interaction
                    const playSound = () => {
                        const playPromise = audio.play();
                        if (playPromise) {
                            playPromise.catch(e => console.log('Sound play failed:', e));
                        }
                    };
                    
                    // Use requestAnimationFrame for non-blocking playback
                    requestAnimationFrame(playSound);
                    
                    // Track the sound for stopping later
                    if (loop) {
                        this.activeSounds.add(audio);
                    }
                    
                    return audio;
                } catch (error) {
                    console.log('Sound system error:', error);
                    return null;
                }
            },
            
            stopSound(sound) {
                if (sound) {
                    sound.pause();
                    sound.currentTime = 0;
                    this.activeSounds.delete(sound);
                }
            },
            
            stopAllSounds() {
                this.activeSounds.forEach(sound => {
                    sound.pause();
                    sound.currentTime = 0;
                });
                this.activeSounds.clear();
            },
            
            startWeldingLoop(volume = 0.25) {
                if (!this.enabled || !this.sounds.welding) return;

                this.stopWeldingLoop();

                // Use pooled audio objects instead of cloning
                const a = this.audioPool.welding?.[0];
                const b = this.audioPool.welding?.[1];

                if (!a || !b) return; // Fallback if pool not ready

                a.volume = this.volume * volume;
                b.volume = this.volume * volume;

                a.currentTime = 0;
                b.currentTime = 0;

                this.weldingPlayers = [a, b];

                // INP FIX: Defer welding loop start to avoid blocking interaction
                const startPlayer = (player) => {
                    player.currentTime = 0;
                    // Use requestAnimationFrame to defer playback
                    requestAnimationFrame(() => {
                        player.play().catch(e => console.log('Welding play failed:', e));
                    });
                    this.activeSounds.add(player);
                };

                const scheduleNext = (currentIndex) => {
                    const current = this.weldingPlayers[currentIndex];
                    const nextIndex = currentIndex === 0 ? 1 : 0;
                    const next = this.weldingPlayers[nextIndex];

                    const loopOnceReady = () => {
                        if (!current.duration || !isFinite(current.duration)) {
                            this.weldingCrossfadeTimer = setTimeout(() => loopOnceReady(), 50);
                            return;

        function isPrime(n) {
          n = Math.abs(n);
          if (n < 2) return false;
          if (n < 4) return true;
          if (n % 2 === 0 || n % 3 === 0) return false;
          for (let i = 5; i * i <= n; i += 6) if (n % i === 0 || n % (i + 2) === 0) return false;
          return true;
        }
        function randVal(maxPrime = 23) { 
          const primes = ALL_PRIMES.filter(p => p <= maxPrime || (maxPrime === 3 && p === 2));

          const primes = ALL_PRIMES.filter(p => p <= maxPrime || (maxPrime === 3 && p === 2));
          const availablePrimes = primes.filter(p => p !== currentVal);

        function canAchieveTarget(board, target, maxPrime) {
          const availablePrimes = ALL_PRIMES.filter(p => p <= maxPrime);
          const aliveCells = Object.values(board).filter(c => !c.dead);
          
          if (aliveCells.length < (target.min || 3)) return false;
          
          // For sum targets, do a quick mathematical check first
          if (target.type === "sum") {
            // Check if target sum can be achieved with available primes in any combination
            const minPossible = (target.min || 3) * Math.min(...availablePrimes);
            const maxPossible = Math.min(8, aliveCells.length) * Math.max(...availablePrimes);
            
            if (target.val < minPossible || target.val > maxPossible) {
              return false;
            }
            
            // For small targets, do a more thorough check
            if (target.val <= 50) {
              return canSumToTarget(availablePrimes, target.val, target.min || 3, Math.min(8, aliveCells.length));
            }
          }
          
          // For other target types, assume they're achievable if we have enough cells
          return true;
        }

        function canSumToTarget(primes, target, minLength, maxLength) {
          // Dynamic programming to check if we can sum to target with given constraints
          function canMakeSum(remaining, lengthLeft, startIndex) {
            if (lengthLeft === 0) {
              return remaining === 0;
            }
            if (remaining < 0) return false;
            
            for (let i = startIndex; i < primes.length; i++) {
              if (canMakeSum(remaining - primes[i], lengthLeft - 1, 0)) {
                return true;
              }
            }
            return false;
          }
          
          // Try all possible lengths from minLength to maxLength
          for (let len = minLength; len <= maxLength; len++) {
            if (canMakeSum(target, len, 0)) {
              return true;
            }
          }
          return false;
        }

        function randAchievableSum(maxPrime, maxValue) {
          const availablePrimes = ALL_PRIMES.filter(p => p <= maxPrime);
          let attempts = 0;
          while (attempts < 50) {
            // Generate a random sum that could be achieved with available primes
            const targetSum = Math.floor(Math.random() * maxValue) + 2;
            // Quick check: can this sum be made with available primes?
            if (canSumToTarget(availablePrimes, targetSum, 2, 8)) {

            }
            attempts++;
          }
          return Math.min(maxValue, maxPrime * 2); // Fallback
        }

        function randComposite(maxValue) {

          while (attempts < 50) {

            if (isComposite(num)) return num;
            attempts++;

        function genTargets(maxPrime = 23, board = null) {
          const t = [];

              },

                return { label: `Σ = ${sum}`, type: "sum", val: sum };
              },
              () => {
                const sum = randAchievableSum(maxPrime, Math.min(60, maxPrime * 4));
                return { label: `Σ = ${sum}`, type: "sum", val: sum };
              },
            ];
            
            let attempts = 0;
            let validTarget = null;
            
            // Try to find a valid target (max 20 attempts to avoid infinite loop)
            while (attempts < 20 && !validTarget) {
              const pick = diff < 2 ? types[Math.floor(Math.random() * 2)]()
                : diff < 5 ? types[Math.floor(Math.random() * 3)]()
                : types[Math.floor(Math.random() * types.length)]();
              
              // Check if this target is identical to the previous one
              const isIdenticalToPrevious = t.length > 0 && t[t.length - 1].val === pick.val;
              
              // If we have a board, validate the target is achievable and not identical to previous
              if (!board || (canAchieveTarget(board, pick, maxPrime) && !isIdenticalToPrevious)) {
                validTarget = pick;
              }
              attempts++;
            }
            
            // Fallback to a simple composite target if validation fails
            if (!validTarget) {
              let fallbackAttempts = 0;
              while (fallbackAttempts < 10) {
                const sum = randAchievableSum(maxPrime, 20);
                const fallbackTarget = { label: `Σ = ${sum}`, type: "sum", val: sum };
                const isIdenticalToPrevious = t.length > 0 && t[t.length - 1].val === fallbackTarget.val;
                
                if (!isIdenticalToPrevious && (!board || canAchieveTarget(board, fallbackTarget, maxPrime))) {
                  validTarget = fallbackTarget;
                  break;
                }
                fallbackAttempts++;
              }
            }
            
            t.push(validTarget);
          }
          return t;
        }

        function doTurn() {
            if (g.turnInProgress) return; // Prevent double execution
            g.turnInProgress = true;
            
            let died = 0;

            for (const ky in g.board) {
              const c = g.board[ky];
              if (!c.dead) { 
                const oldLife = c.life;
                c.life -= 1; 
                if (c.life <= 0) {

                  c.life = 0;

                  // Track cells that lost life for damage animation - show the circle that disappeared
                  const [x, y] = ky.split(',').map(Number);
                  damageAnimations.push({ x, y, lostLifeIndex: oldLife - 1, t: Date.now() });
                }
              }
            }
            g.damageAnim = (g.damageAnim || []).concat(damageAnimations);
            setTimeout(() => { g.damageAnim = []; re(); }, 800); // Clear damage animations after turn
            g.deadCount += died;
            g.turn += 1; g.sel = []; g.dragging = false;
            let alive = false;
            for (const ky in g.board) if (!g.board[ky].dead) { alive = true; break; }
            if (!alive) { g.gameOver = true; stopTimer(); }
            
            // Timer runs out - advance to next target in queue

            if (g.round < ROUNDS && g.targets[g.round]) {

              if (!canAchieveTarget(g.board, g.targets[g.round], g.maxPrime)) {

                const remainingTargets = genTargets(g.maxPrime, g.board);
                newTargets.push(...remainingTargets.slice(0, ROUNDS - g.round));

            g.turnInProgress = false; // Reset flag

                  } else if (oldLife > cell.life) {

                      {g.sel.length > 0 && Array.from({ length: g.sel.length }, (_, i) => {
                        const time = Date.now() / 1000;
                        const delay = (i / g.sel.length) * 3; // Distribute balls evenly around the rectangle
                        const progress = (time + delay) % 3; // 3-second orbit cycle
                        const rectWidth = 56 * 1.05;
                        const rectHeight = 32 * 1.05 + 2;
                        const totalPerimeter = 2 * (rectWidth + rectHeight);
                        const distance = (progress / 3) * totalPerimeter;
                        
                        let x, y;
                        if (distance < rectWidth) { // Top edge
                          const t = distance / rectWidth;
                          x = -rectWidth/2 + t * rectWidth;
                          y = -rectHeight/2;
                        } else if (distance < rectWidth + rectHeight) { // Right edge
                          const t = (distance - rectWidth) / rectHeight;
                          x = rectWidth/2;
                          y = -rectHeight/2 + t * rectHeight;
                        } else if (distance < 2 * rectWidth + rectHeight) { // Bottom edge
                          const t = (distance - rectWidth - rectHeight) / rectWidth;
                          x = rectWidth/2 - t * rectWidth;
                          y = rectHeight/2;
                        } else { // Left edge
                          const t = (distance - 2 * rectWidth - rectHeight) / rectHeight;
                          x = -rectWidth/2;
                          y = rectHeight/2 - t * rectHeight;
                        }
                        
                        const colors = ["#9b5de5"];
                        const color = colors[i % colors.length];
                        
                        return (

                            key={i}
                            style={{

                              width: 4,
                              height: 4,
                              backgroundColor: color,
                              borderRadius: "50%",

                  onMouseLeave={() => { 
                    if (g.dragging) {
                      // Apply damage to first selected cell before reset (consistent with other invalid drags)
                      if (g.sel.length > 0) {
                        const firstCell = g.sel[0];
                        const cell = g.board[k(firstCell.x, firstCell.y)];
                        if (cell && !cell.dead) {
                          const oldLife = cell.life;
                          cell.life -= 1;
                          if (cell.life <= 0) {
                            cell.dead = true;
                            cell.life = 0;
                            g.deadCount += 1;
                          } else if (oldLife > cell.life) {
                            // Add damage animation for the lost life circle
                            const damageAnimations = [{ x: firstCell.x, y: firstCell.y, lostLifeIndex: oldLife - 1, t: Date.now() }];
                            g.damageAnim = (g.damageAnim || []).concat(damageAnimations);
                            setTimeout(() => { g.damageAnim = []; re(); }, 800);
                          }

                        }

                      g.sel = [];

                      // Stop electric humming sound when selection is cancelled
                      SoundManager.stopElectricHumLoop();
                      // Add red background flash for invalid drag
                      g.flash = { text: "INVALID DRAG", bad: true };
                      g.shakeUntil = Date.now() + 400;
                      setTimeout(() => { g.flash = null; re(); }, 400);

                              const dx = nextCell.x - x;
                              const dy = nextCell.y - y;
                              const angle = Math.atan2(dy, dx) * (180 / Math.PI);
                              return (
                                <>
                                  {/* Black arrow background */}
                                  <div style={{
                                    position: "absolute",
                                    top: "50%",
                                    left: "50%",
                                    transform: `translate(-50%, -50%) rotate(${angle}deg) translateX(-2px)`,
                                    fontSize: "clamp(32px, 4vw, 36px)",
                                    color: "#000000",
                                    fontWeight: "900",
                                    pointerEvents: "none",
                                    zIndex: 10,
                                    opacity: 0.9,
                                    lineHeight: 1
                                  }}>➤</div>
                                  {/* Number on top */}
                                  <div style={{
                                    position: "absolute",
                                    top: "50%",
                                    left: "50%",
                                    transform: "translate(-50%, -50%)",
                                    fontSize: "clamp(14px, 1.8vw, 16px)",
                                    color: "#ffffff",
                                    fontWeight: "bold",
                                    textShadow: "0 0 4px #000000, 0 0 8px #000000",
                                    pointerEvents: "none",
                                    zIndex: 11,
                                    opacity: 1
                                  }}>{cell.val}</div>
                                </>
                              );
                            }
                            return null;
                          })()}

                              : (() => {
                                // Dim unselected cells unless adjacent (cardinal only) to current selected cell
                                if (g.dragging && g.sel.length > 0) {
                                  const currentCell = g.sel[g.sel.length - 1];
                                  const dx = x - currentCell.x;
                                  const dy = y - currentCell.y;
                                  const isCardinalAdjacent = (dx === 0 && Math.abs(dy) === 1) || (dy === 0 && Math.abs(dx) === 1);
                                  if (!isCardinalAdjacent) {
                                    return "rgba(12,12,25,0.08)"; // Even more dimmed
                                  }

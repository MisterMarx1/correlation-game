<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGMA PRIME - Prime Number Math Game</title>
    <meta name="description" content="A strategic puzzle game where you draw paths to satisfy mathematical conditions involving prime numbers and sums.">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #04040c;
            overflow: hidden;
            transition: background-color 0.2s ease-in-out;
        }
        
        #root {
            width: 100vw;
            height: 100vh;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #c8c8e0;
            font-family: 'Georgia', serif;
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            25%, 75% { opacity: 0.3; }
        }
        
        @keyframes colorShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .marquee {
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            overflow: hidden;
            white-space: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f5d4, #9b5de5, #f15bb5, #00f5d4, #9b5de5, #f15bb5);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: marquee 8s linear infinite, colorShift 8s ease-in-out infinite;
        }
        
        .marquee.success {
            font-size: 18px;
            letter-spacing: 4px;
        }
        
        .marquee.flash {
            font-size: clamp(8px, 2vw, 16px);
            letter-spacing: clamp(0px, 0.5vw, 3px);
            white-space: nowrap;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">Loading Σ PRIME</div>
    </div>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const W = 8;
        const H = 8;
        const MAX_LIFE = 10;
        const ROUNDS = 10;
        const BASE_TURN = 11000;

        const ALL_PRIMES = [2, 3, 5, 7, 11, 13, 17, 19, 23];

        function k(x, y) { return `${x},${y}`; }
        function isPrime(n) {
          n = Math.abs(n);
          if (n < 2) return false;
          if (n < 4) return true;
          if (n % 2 === 0 || n % 3 === 0) return false;
          for (let i = 5; i * i <= n; i += 6) if (n % i === 0 || n % (i + 2) === 0) return false;
          return true;
        }
        function randVal(maxPrime = 23) { 
          const primes = ALL_PRIMES.filter(p => p <= maxPrime || (maxPrime === 3 && p === 2));
          return primes[Math.floor(Math.random() * primes.length)];
        }
        function randValDifferent(currentVal, maxPrime = 23) {
          const primes = ALL_PRIMES.filter(p => p <= maxPrime || (maxPrime === 3 && p === 2));
          const availablePrimes = primes.filter(p => p !== currentVal);
          return availablePrimes[Math.floor(Math.random() * availablePrimes.length)];
        }
        function adj(a, b) { return Math.abs(a.x - b.x) <= 1 && Math.abs(a.y - b.y) <= 1 && (Math.abs(a.x - b.x) + Math.abs(a.y - b.y) > 0); }

        function isComposite(n) {
          if (n < 4) return false;
          return !isPrime(n);
        }

        function canAchieveTarget(board, target, maxPrime) {
          const availablePrimes = ALL_PRIMES.filter(p => p <= maxPrime);
          const aliveCells = Object.values(board).filter(c => !c.dead);
          
          if (aliveCells.length < (target.min || 3)) return false;
          
          // For sum targets, do a quick mathematical check first
          if (target.type === "sum") {
            // Check if target sum can be achieved with available primes in any combination
            const minPossible = (target.min || 3) * Math.min(...availablePrimes);
            const maxPossible = Math.min(8, aliveCells.length) * Math.max(...availablePrimes);
            
            if (target.val < minPossible || target.val > maxPossible) {
              return false;
            }
            
            // For small targets, do a more thorough check
            if (target.val <= 50) {
              return canSumToTarget(availablePrimes, target.val, target.min || 3, Math.min(8, aliveCells.length));
            }
          }
          
          // For other target types, assume they're achievable if we have enough cells
          return true;
        }

        function canSumToTarget(primes, target, minLength, maxLength) {
          // Dynamic programming to check if we can sum to target with given constraints
          function canMakeSum(remaining, lengthLeft, startIndex) {
            if (lengthLeft === 0) {
              return remaining === 0;
            }
            if (remaining < 0) return false;
            
            for (let i = startIndex; i < primes.length; i++) {
              if (canMakeSum(remaining - primes[i], lengthLeft - 1, 0)) {
                return true;
              }
            }
            return false;
          }
          
          // Try all possible lengths from minLength to maxLength
          for (let len = minLength; len <= maxLength; len++) {
            if (canMakeSum(target, len, 0)) {
              return true;
            }
          }
          return false;
        }

        // Helper function to generate random achievable sums
        function randAchievableSum(maxPrime, maxValue) {
          const availablePrimes = ALL_PRIMES.filter(p => p <= maxPrime);
          let attempts = 0;
          while (attempts < 50) {
            // Generate a random sum that could be achieved with available primes
            const targetSum = Math.floor(Math.random() * maxValue) + 2;
            // Quick check: can this sum be made with available primes?
            if (canSumToTarget(availablePrimes, targetSum, 2, 8)) {
              return targetSum;
            }
            attempts++;
          }
          return Math.min(maxValue, maxPrime * 2); // Fallback
        }

        // Helper function to generate random composite numbers
        function randComposite(maxValue) {
          let attempts = 0;
          while (attempts < 50) {
            const num = Math.floor(Math.random() * maxValue) + 4; // Start from 4
            if (isComposite(num)) return num;
            attempts++;
          }
          return 4; // Fallback to 4 (smallest composite)
        }

        function genTargets(maxPrime = 23, board = null) {
          const t = [];
          for (let i = 0; i < ROUNDS; i++) {
            const diff = i;
            const types = [
              () => {
                const sum = randAchievableSum(maxPrime, Math.min(20, maxPrime * 2));
                return { label: `Σ = ${sum}`, type: "sum", val: sum };
              },
              () => {
                const sum = randAchievableSum(maxPrime, Math.min(40, maxPrime * 3));
                return { label: `Σ = ${sum}`, type: "sum", val: sum };
              },
              () => {
                const sum = randAchievableSum(maxPrime, Math.min(60, maxPrime * 4));
                return { label: `Σ = ${sum}`, type: "sum", val: sum };
              },
            ];
            
            let attempts = 0;
            let validTarget = null;
            
            // Try to find a valid target (max 20 attempts to avoid infinite loop)
            while (attempts < 20 && !validTarget) {
              const pick = diff < 2 ? types[Math.floor(Math.random() * 2)]()
                : diff < 5 ? types[Math.floor(Math.random() * 3)]()
                : types[Math.floor(Math.random() * types.length)]();
              
              // Check if this target is identical to the previous one
              const isIdenticalToPrevious = t.length > 0 && t[t.length - 1].val === pick.val;
              
              // If we have a board, validate the target is achievable and not identical to previous
              if (!board || (canAchieveTarget(board, pick, maxPrime) && !isIdenticalToPrevious)) {
                validTarget = pick;
              }
              attempts++;
            }
            
            // Fallback to a simple composite target if validation fails
            if (!validTarget) {
              let fallbackAttempts = 0;
              while (fallbackAttempts < 10) {
                const sum = randAchievableSum(maxPrime, 20);
                const fallbackTarget = { label: `Σ = ${sum}`, type: "sum", val: sum };
                const isIdenticalToPrevious = t.length > 0 && t[t.length - 1].val === fallbackTarget.val;
                
                if (!isIdenticalToPrevious && (!board || canAchieveTarget(board, fallbackTarget, maxPrime))) {
                  validTarget = fallbackTarget;
                  break;
                }
                fallbackAttempts++;
              }
            }
            
            t.push(validTarget);
          }
          return t;
        }

        function checkTarget(tgt, values) {
          const s = values.reduce((a, b) => a + b, 0);
          if (tgt.type === "sum") return s === tgt.val;
          return false;
        }

        function initBoard(maxPrime = 23) {
          const b = {};
          for (let y = 0; y < H; y++)
            for (let x = 0; x < W; x++)
              b[k(x, y)] = { val: randVal(maxPrime), life: MAX_LIFE, dead: false };
          return b;
        }

        const LBL = { fontSize: 9, letterSpacing: 3, color: "#c8c8e0", textTransform: "uppercase", marginBottom: 3 };

        const CONTROL_ITEMS = [
          {
            title: "DRAG",
            body: "Click and hold on a cell, then drag through adjacent cells (diagonals allowed) to draw a connected path."
          },
          {
            title: "RELEASE",
            body: "Release the mouse button to submit the path. The path must satisfy the target condition shown on the right."
          },
          {
            title: "ESC",
            body: "Press the Escape key to cancel the current path selection and start over."
          }
        ];

        const RULE_ITEMS = [
          {
            title: "PRIME BOARD",
            body: "Board contains only prime numbers. Each cell starts with 10 life that drains every turn. Cells die at 0 life."
          },
          {
            title: "PATH DRAWING",
            body: "Drag through adjacent cells (diagonals allowed) to draw a connected path. Release to submit the path."
          },
          {
            title: "TARGET CONDITIONS",
            body: "Path must satisfy the target condition shown on the right. Common targets: sum equals composite number, sum is composite, or sum divisible by a number."
          },
          {
            title: "CELL REFRESH",
            body: "Used cells refresh with new prime values and full life. Strategic path selection is key to survival."
          },
          {
            title: "SURVIVAL",
            body: "Survive 10 rounds to win. Each round gets faster with less turn time. Balance speed and accuracy."
          }
        ];

        function RuleCard({ item }) {
          return (
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                gap: 4,
                padding: "10px 14px",
                backgroundColor: "rgba(15,23,42,0.6)",
                borderRadius: 6,
                borderLeft: "3px solid #9b5de5"
              }}
            >
              <span style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0", fontFamily: "'Georgia', serif" }}>
                {item.title}
              </span>
              <span style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.5, fontFamily: "'Georgia', serif" }}>
                {item.body}
              </span>
            </div>
          );
        }

        function RulesPanel({ items, maxWidth = 480 }) {
          return (
            <div
              style={{
                maxWidth,
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                gap: 14,
                width: "100%"
              }}
            >
              {items.map((item) => (
                <RuleCard key={item.title} item={item} />
              ))}
            </div>
          );
        }

        function SigmaPrime() {
          const [, bump] = React.useState(0);
          const re = () => bump(c => c + 1);
          const [showRules, setShowRules] = React.useState(false);
          const [showControls, setShowControls] = React.useState(false);

          const g = React.useRef({
            board: {}, sel: [], score: 0, round: 0, turn: 0,
            targets: [], gameOver: false, won: false, started: false,
            flash: null, combo: 0, totalPaths: 0, lastTurn: 0, timeLeft: BASE_TURN,
            dragging: false, shakeUntil: 0, clearAnim: [], turnTime: BASE_TURN,
            deadCount: 0, maxPrime: 3, turnInProgress: false,
            paused: false, showQuitConfirmation: false, quitMode: false, pauseStartTime: 0, totalPausedTime: 0,
          }).current;

          const timerRef = React.useRef(null);
          const boardRef = React.useRef(null);
          const animationRef = React.useRef(null);

          function turnTime() { return Math.max(4000, BASE_TURN - g.round * 700); }

  
        function doTurn() {
            if (g.turnInProgress) return; // Prevent double execution
            g.turnInProgress = true;
            
            let died = 0;
            for (const ky in g.board) {
              const c = g.board[ky];
              if (!c.dead) { c.life -= 1; if (c.life <= 0) { c.dead = true; c.life = 0; died++; } }
            }
            g.deadCount += died;
            g.turn += 1; g.sel = []; g.dragging = false;
            let alive = false;
            for (const ky in g.board) if (!g.board[ky].dead) { alive = true; break; }
            if (!alive) { g.gameOver = true; stopTimer(); }
            
            // Timer runs out - stay in same round, just advance turn
            if (g.round >= ROUNDS) { g.gameOver = true; stopTimer(); }
            
            g.lastTurn = Date.now(); g.turnTime = turnTime(); g.timeLeft = g.turnTime; g.totalPausedTime = 0; g.pauseStartTime = 0;
            g.turnInProgress = false; // Reset flag
            re();
          }

          function startTimer() {
            stopTimer();
            g.lastTurn = Date.now(); g.turnTime = turnTime(); g.timeLeft = g.turnTime; g.totalPausedTime = 0; g.pauseStartTime = 0;
            timerRef.current = setInterval(() => {
              if (g.paused) return; // Don't update timer when paused
              const el = Date.now() - g.lastTurn - g.totalPausedTime;
              if (el >= g.turnTime && !g.turnInProgress) {
                g.shakeUntil = Date.now() + 600; // Light rumble for 600ms when time is up
                g.flash = { text: "TIME'S UP", bad: true };
                setTimeout(() => { g.flash = null; re(); }, 400);
                doTurn();
              }
              g.timeLeft = Math.max(0, g.turnTime - el);
              re();
            }, 80);
          }

          function stopTimer() { if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; } }

          function isPath(sel) {
            if (sel.length < 2) return false; // Allow 2-cell paths
            // Check adjacency between consecutive cells
            for (let i = 0; i < sel.length - 1; i++) {
              if (!adj(sel[i], sel[i + 1])) return false;
            }
            return true;
          }

          function tryClose() {
            const sel = g.sel;
            if (!isPath(sel)) return false;
            const vals = sel.map(s => g.board[k(s.x, s.y)].val);
            const tgt = g.targets[g.round];
            if (!checkTarget(tgt, vals)) {
              g.flash = { text: "NOT SATISFIED", bad: true };
              g.shakeUntil = Date.now() + 400;
              g.combo = 0; g.dragging = false;
              setTimeout(() => { 
                g.flash = null; 
                g.sel = []; 
                re(); 
              }, 400); // Clear selection after rumble finishes
              re(); return false;
            }
            const pathSum = vals.reduce((a, b) => a + b, 0);
            const cellCount = sel.length;
            const efficiencyBonus = Math.max(0, (8 - cellCount) * 50); // Bonus for using fewer cells (8 is max)
            g.combo += 1;
            const pts = Math.min(999999, sel.length * 40 + Math.abs(pathSum) * 8 + g.combo * 25 + g.round * 15 + efficiencyBonus);
            g.score = Math.min(9999999, g.score + pts); g.totalPaths += 1;
            g.clearAnim = sel.map(s => ({ x: s.x, y: s.y, t: Date.now() }));
            setTimeout(() => { g.clearAnim = []; re(); }, 400); // Shorter duration for glow effect
            for (const s of sel) {
              const c = g.board[k(s.x, s.y)];
              c.val = randValDifferent(c.val, g.maxPrime); c.life = MAX_LIFE; c.dead = false;
            }
            g.deadCount = Object.values(g.board).filter(c => c.dead).length;
            g.flash = { text: `+${pts}${g.combo > 1 ? ` ×${g.combo}` : ""}${efficiencyBonus > 0 ? ` EFFICIENCY +${efficiencyBonus}` : ""} [Σ=${pathSum}]`, bad: false, success: true };
            g.shakeUntil = Date.now() + 400;
            setTimeout(() => { g.flash = null; re(); }, 1800); // Longer duration for success animation
            g.sel = []; g.dragging = false;
            g.round += 1;
            if (g.round >= ROUNDS) { g.won = true; g.gameOver = true; stopTimer(); re(); return true; }
            
            // Validate next round target is still achievable, regenerate if needed
            if (g.round < ROUNDS && g.targets[g.round]) {
              if (!canAchieveTarget(g.board, g.targets[g.round], g.maxPrime)) {
                // Regenerate remaining targets
                const newTargets = [...g.targets.slice(0, g.round)];
                const remainingTargets = genTargets(g.maxPrime, g.board);
                newTargets.push(...remainingTargets.slice(0, ROUNDS - g.round));
                g.targets = newTargets;
              }
            }
            
            g.lastTurn = Date.now(); g.turnTime = turnTime(); g.timeLeft = g.turnTime; g.totalPausedTime = 0; g.pauseStartTime = 0;
            re(); return true;
          }

          function cellFromEvent(e) {
            const el = boardRef.current;
            if (!el) return null;
            const rect = el.getBoundingClientRect();
            const cellW = rect.width / W, cellH = rect.height / H;
            const mx = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
            const my = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
            const cx = Math.floor(mx / cellW), cy = Math.floor(my / cellH);
            if (cx < 0 || cx >= W || cy < 0 || cy >= H) return null;
            return { x: cx, y: cy };
          }

          function addToSel(x, y) {
            const c = g.board[k(x, y)];
            if (!c || c.dead) return;
            const sel = g.sel;
            const idx = sel.findIndex(s => s.x === x && s.y === y);
            if (idx > 0) { g.sel = sel.slice(0, idx + 1); re(); return; }
            if (sel.length === 0 || adj(sel[sel.length - 1], { x, y })) {
              // Don't add duplicates
              if (!sel.find(s => s.x === x && s.y === y)) {
                g.sel = [...sel, { x, y }]; re();
              }
            }
          }

          function onPointerDown(e) {
            if (g.gameOver || g.paused || g.showQuitConfirmation) return;
            e.preventDefault();
            const c = cellFromEvent(e);
            if (!c) return;
            g.sel = []; g.combo = Math.max(0, g.combo);
            g.dragging = true;
            addToSel(c.x, c.y);
          }

          function onPointerMove(e) {
            if (!g.dragging || g.gameOver || g.paused || g.showQuitConfirmation) return;
            e.preventDefault();
            const c = cellFromEvent(e);
            if (!c) return;
            const last = g.sel[g.sel.length - 1];
            if (last && last.x === c.x && last.y === c.y) return;
            // Allow backtracking
            if (g.sel.length >= 2) {
              const prev = g.sel[g.sel.length - 2];
              if (prev.x === c.x && prev.y === c.y) {
                g.sel = g.sel.slice(0, -1); re(); return;
              }
            }
            addToSel(c.x, c.y);
          }

          function onPointerUp(e) {
            if (!g.dragging) return;
            g.dragging = false;
            // Check if path is valid and satisfies target
            const sel = g.sel;
            if (sel.length >= 2 && isPath(sel)) {
              tryClose();
            } else {
              g.sel = []; re();
            }
          }

          function startGame() {
            g.board = initBoard(g.maxPrime); g.sel = []; g.score = 0; g.round = 0; g.turn = 0;
            g.targets = genTargets(g.maxPrime, g.board); g.gameOver = false; g.won = false; g.started = true;
            g.flash = null; g.combo = 0; g.totalPaths = 0; g.dragging = false;
            g.shakeUntil = 0; g.clearAnim = []; g.deadCount = 0;
            startTimer(); re();
          }

          React.useEffect(() => {
            const h = (e) => {
              if (e.key === "Escape") { g.sel = []; g.combo = 0; g.dragging = false; re(); }
            };
            window.addEventListener("keydown", h);
            return () => window.removeEventListener("keydown", h);
          }, []);
          React.useEffect(() => () => stopTimer(), []);

          // Animation loop for rotating balls
          React.useEffect(() => {
            function animate() {
              re(); // Force re-render to update ball positions
              animationRef.current = requestAnimationFrame(animate);
            }
            
            if (g.sel.length > 0) {
              animationRef.current = requestAnimationFrame(animate);
            }
            
            return () => {
              if (animationRef.current) {
                cancelAnimationFrame(animationRef.current);
              }
            };
          }, [g.sel.length]);

          const selKeys = new Set(g.sel.map(s => k(s.x, s.y)));
          const canClose = g.sel.length >= 2 && isPath(g.sel);
          const selSum = g.sel.reduce((s, p) => s + (g.board[k(p.x, p.y)]?.val || 0), 0);
          const target = g.targets[g.round] || { label: "—", min: 3 };
          const timePct = g.timeLeft / g.turnTime;
          const shaking = Date.now() < g.shakeUntil;
          const clearKeys = new Set(g.clearAnim.map(c => k(c.x, c.y)));
          const boardDarkness = Math.min(0.4, g.deadCount / (W * H) * 0.6);


          // Board pixel calc
          const CELL_CSS = `min(calc((100vh - 200px) / ${H}), calc((100vw - 400px) / ${W}), 68px)`;
          const BOARD_WIDTH = `calc(${CELL_CSS} * ${W})`;

          if (!g.started) {
            return (
              <div style={{
                width: "calc(100vw - 12px)", height: "100vh", overflow: "hidden",
                background: "linear-gradient(160deg, #04040c 0%, #08081a 50%, #100818 100%)",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                fontFamily: "Georgia, 'Times New Roman', serif", color: "#c8c8e0",
                padding: "0 6px",
              }}>
                <h1 style={{
                  fontSize: "clamp(36px, 7vw, 56px)", fontWeight: 400, margin: "0 0 4px 0",
                  background: "linear-gradient(90deg, #00f5d4, #9b5de5, #f15bb5)",
                  WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", letterSpacing: 5,
                }}>Σ PRIME</h1>
                <div style={{ fontSize: 11, color: "#c8c8e0", letterSpacing: 7, marginBottom: 28, textTransform: "uppercase" }}>Sigma Prime</div>
                
                <div style={{ maxWidth: 420, textAlign: "center", lineHeight: 1.9, fontSize: 13, color: "#c8c8e0", marginBottom: 20 }}>
                  <strong>There are 9 prime numbers between 1 and 25:</strong><br/>
                  2, 3, 5, 7, 11, 13, 17, 19, 23
                </div>

                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 12, color: "#9b5de5", marginBottom: 8, letterSpacing: 2, textTransform: "uppercase", textAlign: "center" }}>SELECT MAXIMUM PRIME</div>
                  <div style={{
                    display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center",

                      <h2 style={{

                      <RulesPanel items={CONTROL_ITEMS} maxWidth={400} />
                      
                      <div onClick={() => setShowControls(false)} style={{

          }

          return (
            <div style={{
              width: "100vw", height: "100vh", overflow: "hidden",
              background: g.flash?.bad 
                ? "rgba(255,68,68,0.05)"
                : g.flash?.success
                ? "rgba(0,255,68,0.05)"
                : "#04040c",
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between",
              fontFamily: "Georgia, serif", color: "#c8c8e0", userSelect: "none", padding: 8,
              boxSizing: "border-box",
              transition: "background 0.2s ease-in-out"
            }} className={(g.paused || g.showQuitConfirmation) ? "paused-game" : ""}>
              {/* Top Menu Bar - Centered */}
              <div style={{
                width: BOARD_WIDTH,
                display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center",
                padding: "12px 12px 50px 12px", background: "rgba(8,8,26,0.6)", borderRadius: 8,
                border: "1px solid rgba(155,93,229,0.2)", backdropFilter: "blur(8px)",
                gap: "8px",
                position: "relative",
                overflow: "hidden"
              }}>
                <div className={`marquee ${g.flash?.success ? 'success' : ''} ${(g.flash?.bad || g.flash?.success) ? 'flash' : ''}`} style={{
                  color: g.flash?.bad ? "#ff4444" : g.flash?.success ? "#00ff44" : undefined,
                  WebkitTextFillColor: g.flash?.bad ? "#ff4444" : g.flash?.success ? "#00ff44" : undefined,
                  background: g.flash?.bad ? "none" : g.flash?.success ? "none" : undefined,
                  WebkitBackgroundClip: g.flash?.bad ? "text" : g.flash?.success ? "text" : undefined,

                  animationPlayState: g.flash?.bad ? "running" : g.flash?.success ? "running" : (g.paused || g.showQuitConfirmation) ? "paused" : "running",
                  transform: (g.flash?.bad || g.flash?.success) ? "translateX(0)" : undefined,
                  justifyContent: (g.flash?.bad || g.flash?.success) ? "center" : undefined,
                  display: (g.flash?.bad || g.flash?.success) ? "flex" : undefined,
                  alignItems: (g.flash?.bad || g.flash?.success) ? "center" : undefined
                }}>
                  {g.flash?.bad ? (g.flash.text === "TIME'S UP" ? "TIME'S UP" : "NOT SATISFIED") : g.flash?.success ? g.flash.text : (() => {
                    const upcomingTargets = g.targets.slice(g.round + 1, g.round + 4);
                    return `QUEUE: ${upcomingTargets.length > 0 ? upcomingTargets.map(t => `Σ = ${t.val}`).join(' → ') : 'EMPTY'}`;
                  })()}

                {/* Score Row: Goal, Sum, Score */}
                <div style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  width: "100%"
                }}>
                  {/* Left Section: Goal */}
                  <div style={{ display: "flex", gap: "clamp(12px, 2vw, 20px)", alignItems: "center", flex: 1 }}>

                      display: "flex",
                      alignItems: "center",
                      background: "rgba(254,228,64,0.05)",

                        fontSize: "clamp(8px, 1vw, 10px)",

                        fontFamily: "'Georgia', serif",

                        fontWeight: 700,

                      }}>GOAL:</span>
                      <div style={{
                        flex: 1,
                        display: "flex",
                        justifyContent: "center",

                          whiteSpace: "nowrap"
                        }}>
                          {target.label}
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* Center Section: Current Sum with Orbiting Balls */}
                  <div style={{ 
                    position: "relative",
                    display: "flex", 
                    gap: "clamp(12px, 2vw, 20px)", 
                    alignItems: "center", 
                    flex: 1, 
                    justifyContent: "center"
                  }}>
                    {/* Orbiting Balls Container - positioned relative to sum display */}
                    <div style={{
                      position: "absolute",
                      left: "50%",
                      top: "50%",
                      transform: "translate(-50%, -50%)",
                      pointerEvents: "none"
                    }}>
                      {/* Orbiting Balls */}
                      {g.sel.length > 0 && Array.from({ length: g.sel.length }, (_, i) => {
                        const time = Date.now() / 1000;
                        const delay = (i / g.sel.length) * 3; // Distribute balls evenly around the rectangle
                        const progress = (time + delay) % 3; // 3-second orbit cycle
                        const rectWidth = 56 * 1.05;
                        const rectHeight = 32 * 1.05 + 2;
                        const totalPerimeter = 2 * (rectWidth + rectHeight);
                        const distance = (progress / 3) * totalPerimeter;
                        
                        let x, y;
                        if (distance < rectWidth) { // Top edge
                          const t = distance / rectWidth;
                          x = -rectWidth/2 + t * rectWidth;
                          y = -rectHeight/2;
                        } else if (distance < rectWidth + rectHeight) { // Right edge
                          const t = (distance - rectWidth) / rectHeight;
                          x = rectWidth/2;
                          y = -rectHeight/2 + t * rectHeight;
                        } else if (distance < 2 * rectWidth + rectHeight) { // Bottom edge
                          const t = (distance - rectWidth - rectHeight) / rectWidth;
                          x = rectWidth/2 - t * rectWidth;
                          y = rectHeight/2;
                        } else { // Left edge
                          const t = (distance - 2 * rectWidth - rectHeight) / rectHeight;
                          x = -rectWidth/2;
                          y = rectHeight/2 - t * rectHeight;
                        }
                        
                        const colors = ["#9b5de5"];
                        const color = colors[i % colors.length];
                        
                        return (
                          <div
                            key={i}
                            style={{
                              position: "absolute",
                              width: 4,
                              height: 4,
                              backgroundColor: color,
                              borderRadius: "50%",
                              boxShadow: `0 0 6px ${color}`,
                              transform: `translate(${x-2}px, ${y - 2}px)`,
                              zIndex: 10,
                              opacity: 0.8
                            }}
                          />
                        );
                      })}
                    </div>
                    
                    <div style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "clamp(4px, 0.5vw, 8px)",
                      background: "rgba(155,93,229,0.05)",
                      borderRadius: 8,
                      border: "none",
                      padding: "6px 12px",

                        : "none"
                    }}>
                      <span style={{
                        fontSize: "clamp(8px, 1vw, 10px)",
                        color: "#c8c8e0",
                        fontFamily: "'Georgia', serif",
                        textTransform: "uppercase",

                        fontWeight: 700
                      }}>Σ:</span>
                      <span style={{
                        fontSize: "clamp(16px, 2.5vw, 22px)",
                        fontFamily: "'Courier New', monospace",
                        color: g.sel.length > 0 ? "#ffffff" : "#888",

                        textShadow: g.sel.length > 0 ? "0 0 20px rgba(0,245,212,0.4), 0 0 40px rgba(0,245,212,0.2), 0 0 60px rgba(155,93,229,0.1)" : "none",
                        animation: g.sel.length > 0 ? "electricGlow 2s ease-in-out infinite" : "none",
                        filter: g.sel.length > 0 ? "brightness(1.2) contrast(1.1)" : "none"

                  </div>

                    <div style={{
                      display: "flex",
                      alignItems: "center",
                      gap: "clamp(4px, 0.5vw, 8px)",
                      background: "rgba(0,245,212,0.05)",

                        fontSize: "clamp(8px, 1vw, 10px)",
                        color: "#c8c8e0",
                        fontFamily: "'Georgia', serif",
                        textTransform: "uppercase",
                        letterSpacing: 1,
                        fontWeight: 700
                      }}>SCORE:</span>
                      <span style={{
                        fontSize: "clamp(14px, 2vw, 20px)",
                        fontFamily: "'Courier New', monospace",
                        color: "#00f5d4",
                        fontWeight: 700,
                        textShadow: "0 0 8px rgba(0,245,212,0.3)"
                      }}>
                        {g.score}
                      </span>
                    </div>
                    
                  </div>
                </div>
                
                {/* Timer Row */}
                <div style={{
                  width: "100%", height: 6, background: "#151522", borderRadius: 3,
                  position: "relative",
                  boxShadow: timePct < 0.2 ? "0 0 8px #ff6b6b44" : "none",
                }}>
                  <div style={{
                    width: `${timePct * 100}%`, height: "100%",
                    background: timePct < 0.2 ? "#ff6b6b" : timePct < 0.4 ? "#fee440" : "#00f5d4",
                    borderRadius: 3, transition: "width 0.08s linear",
                  }} />
                </div>
              </div>
              
              
              {/* Main game container - Centered */}
              <div style={{
                display: "flex",
                flexDirection: "column",
                alignItems: "center",
                justifyContent: "center",
                position: "relative",
                flex: 1
              }}>
                
                {/* Board rendering */}
                <div style={{
                  position: "relative", flexShrink: 1,
                  filter: `brightness(${1 - boardDarkness})`,
                  transition: "filter 0.5s",
                  display: "grid",
                  gridTemplateColumns: `repeat(${W}, ${CELL_CSS})`,
                  gridTemplateRows: `repeat(${H}, ${CELL_CSS})`,
                  gap: 0, touchAction: "none",
                  borderRadius: 8,
                  boxShadow: "0 0 40px rgba(0,0,0,0.5)",
                }}
                  ref={boardRef}
                  onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp}
                  onMouseLeave={() => { if (g.dragging) { g.dragging = false; g.sel = []; g.combo = 0; re(); } }}
                  onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
                >
                  {Array.from({ length: H }, (_, y) =>
                    Array.from({ length: W }, (_, x) => {
                      const ky = k(x, y);
                      const cell = g.board[ky];
                      if (!cell) return <div key={ky} />;

                      const isSel = selKeys.has(ky);
                      const isClearing = clearKeys.has(ky);
                      const lifePct = cell.life / MAX_LIFE;
                      const isLow = cell.life <= 3 && !cell.dead;

                      return (
                        <div key={ky} style={{
                          position: "relative", width: "100%", height: "100%",
                          cursor: cell.dead ? "default" : "pointer",
                          transition: shaking && (isSel || isClearing) ? "none" : "all 0.12s",
                          transform: shaking && (isSel || isClearing) ? `translate(${Math.sin(Date.now() * 0.05) * 2}px, ${Math.cos(Date.now() * 0.05) * 2}px)` : "translate(0,0)",
                        }}>
                          {/* Background */}
                          <div style={{
                            position: "absolute", inset: "7%", borderRadius: "16%",
                            background: isClearing ? "rgba(0,255,68,0.6)"
                              : cell.dead ? "#08080f"
                              : isSel ? "rgba(155,93,229,0.3)"
                              : "rgba(12,12,25,0.85)",
                            border: isClearing ? "3px solid #00ff44"
                              : cell.dead ? "1px solid #0c0c18"
                              : isSel ? "2px solid #9b5de5aa"
                              : `1px solid rgba(80,80,130,${0.06 + lifePct * 0.1})`,
                            boxShadow: isClearing ? "0 0 30px #00ff4488, 0 0 60px #00ff4444, inset 0 0 20px #00ff4433"
                              : isSel ? "0 0 10px rgba(155,93,229,0.2)"
                              : "none",
                            transition: "all 0.12s",
                            animation: isClearing ? "successGlow 0.4s ease-out forwards" : isLow ? "lowPulse 1.5s ease-in-out infinite" : "none",
                          }} />

                          {/* Life indicators */}
                          {!cell.dead && Array.from({ length: MAX_LIFE }, (_, i) => {
                            const angle = (i / MAX_LIFE) * Math.PI * 2 - Math.PI / 2;
                            const alive = i < cell.life;
                            return (
                              <div key={i} style={{
                                position: "absolute",
                                left: `${50 + Math.cos(angle) * 38}%`,
                                top: `${50 + Math.sin(angle) * 38}%`,
                                width: "7%", height: "7%", borderRadius: "50%",
                                transform: "translate(-50%,-50%)",
                                background: alive
                                  ? (cell.life <= 2 ? "#ff4444" : cell.life <= 4 ? "#ffaa33" : "#00f5d455")
                                  : "#12121f",
                                transition: "background 0.3s",
                              }} />
                            );
                          })}

                          {/* Dead X */}
                          {cell.dead && (
                            <div style={{
                              position: "absolute", inset: 0,
                              display: "flex", alignItems: "center", justifyContent: "center",
                              fontSize: "clamp(10px, 1.4vw, 16px)", color: "#1a1a28",
                              fontFamily: "'Courier New', monospace",
                            }}>✕</div>
                          )}

                          {/* Number */}
                          {!cell.dead && (
                            <div style={{
                              position: "absolute", inset: 0,
                              display: "flex", alignItems: "center", justifyContent: "center",
                              fontSize: "clamp(12px, 1.8vw, 18px)", fontWeight: 700,
                              color: isSel ? "#ffffff" : `rgba(255,255,255,${0.35 + lifePct * 0.55})`,
                              fontFamily: "'Courier New', monospace",
                              textShadow: isSel ? "0 0 8px rgba(155,93,229,0.6)" : "none",
                              transition: "color 0.15s",
                            }}>
                              {cell.val}
                            </div>
                          )}

                          {/* Smoke puff effect when clearing */}
                          {isClearing && (
                            <div style={{
                              position: "absolute",
                              inset: 0,
                              display: "flex",
                              alignItems: "center",
                              justifyContent: "center",
                              pointerEvents: "none",
                            }}>
                              <div style={{
                                width: "60%",
                                height: "60%",
                                borderRadius: "50%",
                                background: "radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 30%, rgba(255,255,255,0.1) 60%, transparent 100%)",
                                animation: "smokePuff 0.8s ease-out forwards",
                                filter: "blur(2px)",
                              }} />
                            </div>
                          )}
                        </div>
                      );
                    })
                  ).flat()}
                </div>

                
                {/* Game over overlay */}
                {g.gameOver && (
                  <div style={{
                    position: "absolute", inset: 0, background: "rgba(4,4,12,0.95)", borderRadius: 8,

                    animation: "fadeIn 0.6s ease-out",
                  }}>
                    <div style={{ fontSize: "clamp(18px, 3vw, 28px)", letterSpacing: 5, color: g.won ? "#00f5d4" : "#f15bb5" }}>
                      {g.won ? "SUMMATION COMPLETE" : "SUMMATION FAILED"}
                    </div>
                    <div style={{ fontSize: 13, color: "#555", fontFamily: "monospace", textAlign: "center", lineHeight: 1.8 }}>
                      {g.score} pts · {g.round}/{ROUNDS} rounds · {g.turn} turns · Primes ≤ {g.maxPrime}
                    </div>
                    <div onClick={() => { g.started = false; re(); }} style={{
                      marginTop: 6, padding: "10px 30px", fontSize: 12,
                      border: "1px solid #9b5de5", color: "#9b5de5", cursor: "pointer",
                      borderRadius: 2, letterSpacing: 4, textTransform: "uppercase", fontFamily: "Georgia, serif",
                    }}>NEW GAME</div>
                  </div>
                )}
              </div>
              
              {/* Bottom Progress Bars - Centered */}
              <div style={{
                width: BOARD_WIDTH,
                display: "flex",
                flexDirection: "column",
                gap: "clamp(4px, 0.5vw, 8px)"
              }}>
                {/* Control Buttons */}
                <div style={{
                  display: "flex",
                  justifyContent: "space-between",
                  marginBottom: 4,
                }}>
                  <button
                    onClick={() => { 
                      if (!g.paused) {
                        g.pauseStartTime = Date.now();
                        g.paused = true; 
                        g.quitMode = false;
                        g.showQuitConfirmation = true; // Show popup
                      }
                      re(); 
                    }}
                    style={{
                      padding: "8px 16px",
                      fontSize: "clamp(10px, 1.2vw, 12px)",
                      fontWeight: 700,
                      fontFamily: "'Georgia', serif",
                      letterSpacing: 1,
                      textTransform: "uppercase",
                      background: g.paused ? "rgba(0,245,212,0.2)" : "rgba(155,93,229,0.2)",
                      color: g.paused ? "#00f5d4" : "#9b5de5",
                      border: g.paused ? "1px solid #00f5d4" : "1px solid #9b5de5",
                      borderRadius: 6,
                      cursor: "pointer",
                      transition: "all 0.2s ease"
                    }}
                  >
                    ⏸ PAUSE
                  </button>
                  <button
                    onClick={() => { 
                      if (!g.paused) {
                        g.pauseStartTime = Date.now();
                        g.paused = true;
                      }
                      g.quitMode = true;
                      g.showQuitConfirmation = true; re(); 
                    }}
                    style={{
                      padding: "8px 16px",
                      fontSize: "clamp(10px, 1.2vw, 12px)",
                      fontWeight: 700,
                      fontFamily: "'Georgia', serif",
                      letterSpacing: 1,
                      textTransform: "uppercase",
                      background: "rgba(241,91,181,0.2)",
                      color: "#f15bb5",
                      border: "1px solid #f15bb5",
                      borderRadius: 6,
                      cursor: "pointer",
                      transition: "all 0.2s ease"
                    }}
                  >
                    ↺ QUIT
                  </button>
                </div>
                {/* Turn bars at bottom */}
                <div style={{
                  width: "100%",
                  display: "flex",
                  justifyContent: "space-between",
                  gap: 0,
                  padding: "0 2px",
                  position: "relative"
                }}>
                  {Array.from({ length: MAX_LIFE }, (_, i) => (
                    <div key={i} style={{
                      height: 6, borderRadius: 3,
                      background: i <= g.turn ? "#f15bb5" : "#2a2a3e",
                      border: "none",
                      flex: 1,
                      margin: "0 1px"
                    }} />
                  ))}
                  <div style={{
                    position: "absolute",
                    top: "50%",
                    left: "50%",
                    transform: "translate(-50%, -50%)",
                    fontSize: "clamp(6px, 0.8vw, 8px)",
                    color: "#c8c8e0",
                    fontFamily: "'Georgia', serif",
                    letterSpacing: 1,
                    textTransform: "uppercase",
                    fontWeight: 700,
                    textShadow: "0 0 4px rgba(0,0,0,0.8)"
                  }}>TURN THIS ROUND</div>
                </div>
                
                {/* Progress bars at bottom */}
                <div style={{
                  width: "100%",
                  display: "flex",
                  justifyContent: "space-between",
                  gap: 0,
                  padding: "0 2px",
                  position: "relative"
                }}>
                  {Array.from({ length: ROUNDS }, (_, i) => (
                    <div key={i} style={{
                      height: 8, borderRadius: 4,
                      background: i < g.round ? "#00f5d4" : i === g.round ? "#9b5de5" : "#1a1a2e",
                      border: i === g.round ? "1px solid #9b5de5" : "none",
                      flex: 1,
                      margin: "0 1px"
                    }} />
                  ))}
                  <div style={{
                    position: "absolute",
                    top: "50%",
                    left: "50%",
                    transform: "translate(-50%, -50%)",
                    fontSize: "clamp(8px, 1vw, 10px)",
                    color: "#c8c8e0",
                    fontFamily: "'Georgia', serif",
                    letterSpacing: 2,
                    textTransform: "uppercase",
                    fontWeight: 700,
                    textShadow: "0 0 4px rgba(0,0,0,0.8)"
                  }}>ROUND</div>
                </div>

              </div>
              
                            
              {/* Rules Popup */}
              {showRules && (
                <div style={{
                  position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
                  background: "rgba(4,4,12,0.95)", backdropFilter: "blur(8px)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  zIndex: 1000, padding: 20
                }}>
                  <div style={{
                    maxWidth: 500, width: "100%", maxHeight: "80vh", overflowY: "auto",
                    background: "rgba(8,8,26,0.95)", borderRadius: 12, border: "1px solid rgba(0,245,212,0.3)",
                    padding: 24, position: "relative"
                  }}>
                    <div style={{
                      position: "absolute", top: 12, right: 12,
                      width: 32, height: 32, borderRadius: "50%",
                      background: "rgba(0,245,212,0.2)", border: "1px solid rgba(0,245,212,0.4)",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      cursor: "pointer", color: "#00f5d4", fontSize: 18, fontWeight: 700,
                      fontFamily: "'Georgia', serif"
                    }} onClick={() => setShowRules(false)}>
                      ×
                    </div>
                    
                    <h2 style={{
                      fontSize: "clamp(20px, 3vw, 28px)", letterSpacing: 4, color: "#00f5d4",
                      textAlign: "center", margin: "0 0 20px 0", fontFamily: "Georgia, serif",
                      fontWeight: 400
                    }}>RULES</h2>
                    
                    <RulesPanel items={RULE_ITEMS} maxWidth={400} />
                    
                    <div onClick={() => setShowRules(false)} style={{
                      marginTop: 20, padding: "10px 24px", fontSize: 12, letterSpacing: 4,
                      border: "1px solid #00f5d4", color: "#00f5d4", cursor: "pointer",
                      borderRadius: 2, textTransform: "uppercase", fontFamily: "Georgia, serif",
                      margin: "20px auto 0 auto", textAlign: "center", width: "fit-content"
                    }}>CLOSE</div>
                  </div>
                </div>
              )}

              {/* Controls Popup */}
              {showControls && (
                <div style={{
                  position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
                  background: "rgba(4,4,12,0.95)", backdropFilter: "blur(8px)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  zIndex: 1000, padding: 20
                }}>
                  <div style={{
                    maxWidth: 500, width: "100%", maxHeight: "80vh", overflowY: "auto",
                    background: "rgba(8,8,26,0.95)", borderRadius: 12, border: "1px solid rgba(155,93,229,0.3)",
                    padding: 24, position: "relative"
                  }}>
                    <div style={{
                      position: "absolute", top: 12, right: 12,
                      width: 32, height: 32, borderRadius: "50%",
                      background: "rgba(155,93,229,0.2)", border: "1px solid rgba(155,93,229,0.4)",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      cursor: "pointer", color: "#9b5de5", fontSize: 18, fontWeight: 700,
                      fontFamily: "'Georgia', serif"
                    }} onClick={() => setShowControls(false)}>
                      ×
                    </div>
                    
                    <h2 style={{
                      fontSize: "clamp(20px, 3vw, 28px)", letterSpacing: 4, color: "#9b5de5",
                      textAlign: "center", margin: "0 0 20px 0", fontFamily: "Georgia, serif",
                      fontWeight: 400
                    }}>CONTROLS</h2>
                    
                    <RulesPanel items={CONTROL_ITEMS} maxWidth={400} />
                    
                    <div onClick={() => setShowControls(false)} style={{
                      marginTop: 20, padding: "10px 24px", fontSize: 12, letterSpacing: 4,
                      border: "1px solid #9b5de5", color: "#9b5de5", cursor: "pointer",
                      borderRadius: 2, textTransform: "uppercase", fontFamily: "Georgia, serif",
                      margin: "20px auto 0 auto", textAlign: "center", width: "fit-content"
                    }}>CLOSE</div>
                  </div>
                </div>
              )}

              {/* Quit Confirmation Popup */}
              {g.showQuitConfirmation && (
                <div style={{
                  position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
                  background: "rgba(4,4,12,0.95)", backdropFilter: "blur(8px)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  zIndex: 1000, padding: 20
                }}>
                  <div style={{
                    background: "rgba(15,23,42,0.6)",
                    border: "1px solid rgba(155,93,229,0.2)",
                    borderRadius: 12,
                    padding: "32px",
                    maxWidth: 400,
                    width: "100%",
                    textAlign: "center",
                    position: "relative"
                  }}>
                                        
                    <h2 style={{
                      fontSize: "clamp(24px, 4vw, 32px)", letterSpacing: 6, color: "#f8fafc",
                      textAlign: "center", margin: "0 0 16px 0", fontFamily: "Georgia, serif",
                      fontWeight: 900
                    }}>{!g.quitMode ? "GAME PAUSED" : "ARE YOU SURE?"}</h2>
                    
                    <p style={{
                      fontSize: "clamp(14px, 2vw, 16px)", color: "#94a3b8",
                      fontFamily: "Georgia, serif", textAlign: "center",
                      maxWidth: 320, lineHeight: 1.5, margin: "0 0 24px 0"
                    }}>
                      {!g.quitMode ? "" : "All progress will be lost and you'll return to the main menu"}
                    </p>
                    
                    <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                      {!g.quitMode ? (
                        <button
                          onClick={() => {
                            g.totalPausedTime += Date.now() - g.pauseStartTime;
                            g.paused = false; 
                            g.quitMode = false;
                            g.showQuitConfirmation = false;
                            re();
                          }}
                          style={{
                            padding: "12px 24px",
                            fontSize: "clamp(12px, 1.5vw, 14px)",
                            fontWeight: 700,
                            fontFamily: "Georgia, serif",
                            letterSpacing: 2,
                            textTransform: "uppercase",
                            background: "rgba(0,245,212,0.2)",
                            color: "#00f5d4",
                            border: "1px solid #00f5d4",
                            borderRadius: 6,
                            cursor: "pointer",
                            transition: "all 0.2s ease"
                          }}
                        >
                          ▶ RESUME
                        </button>
                      ) : (
                        <>
                          <button
                            onClick={() => {
                              g.gameOver = false; g.won = false; g.started = false;
                              g.paused = false; g.quitMode = false; g.showQuitConfirmation = false;
                              re();
                            }}
                            style={{
                              padding: "12px 24px",
                              fontSize: "clamp(12px, 1.5vw, 14px)",
                              fontWeight: 700,
                              fontFamily: "Georgia, serif",
                              letterSpacing: 2,
                              textTransform: "uppercase",
                              background: "rgba(241,91,181,0.2)",
                              color: "#f15bb5",
                              border: "1px solid #f15bb5",
                              borderRadius: 6,
                              cursor: "pointer",
                              transition: "all 0.2s ease"
                            }}
                          >
                            QUIT TO MENU
                          </button>
                          <button
                            onClick={() => { 
                            g.totalPausedTime += Date.now() - g.pauseStartTime;
                            g.paused = false; 
                            g.quitMode = false;
                            g.showQuitConfirmation = false; re(); 
                          }}
                            style={{
                              padding: "12px 24px",
                              fontSize: "clamp(12px, 1.5vw, 14px)",
                              fontWeight: 700,
                              fontFamily: "Georgia, serif",
                              letterSpacing: 2,
                              textTransform: "uppercase",
                              background: "rgba(155,93,229,0.2)",
                              color: "#9b5de5",
                              border: "1px solid #9b5de5",
                              borderRadius: 6,
                              cursor: "pointer",
                              transition: "all 0.2s ease"
                            }}
                          >
                            KEEP PLAYING
                          </button>
                        </>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );

          // Add CSS animations
          const style = document.createElement('style');
          style.textContent = `
            @keyframes electricGlow{0%,100%{opacity:1}50%{opacity:0.6}}
            @keyframes fu{0%{opacity:1;transform:translate(-50%,-50%) scale(.85)}50%{opacity:1;transform:translate(-50%,-65%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-85%) scale(1)}}
            @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.15);background:rgba(254,228,64,0.5)}100%{transform:scale(1);background:transparent}}
            @keyframes smokePuff{0%{opacity:0;transform:scale(0.5);filter:blur(4px)}20%{opacity:0.8;transform:scale(1.2);filter:blur(2px)}40%{opacity:1;transform:scale(1.5);filter:blur(1px)}60%{opacity:0.6;transform:scale(2.5);filter:blur(3px)}100%{opacity:0;transform:scale(4);filter:blur(8px)}}
            .paused-game * { animation-play-state: paused !important; }
            @keyframes successGlow{0%{background:rgba(0,255,68,0);box-shadow:0 0 0px transparent;border:1px solid rgba(0,255,68,0);transform:scale(1)}25%{background:rgba(0,255,68,0.5);box-shadow:0 0 20px #00ff4433;border:2px solid #00ff44;transform:scale(1.03)}50%{background:rgba(0,255,68,0.8);box-shadow:0 0 40px #00ff44,0 0 80px #00ff4444,inset 0 0 30px #00ff4433;border:3px solid #00ff44;transform:scale(1.06)}75%{background:rgba(0,255,68,0.4);box-shadow:0 0 20px #00ff4466,0 0 40px #00ff4433,inset 0 0 15px #00ff4444;border:2px solid #00ff44;transform:scale(1.03)}100%{background:rgba(12,12,25,0.85);box-shadow:none;border:1px solid rgba(80,80,130,0.1);transform:scale(1)}}
            @keyframes successFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2);color:#00ff44;text-shadow:0 0 30px #00ff44,0 0 60px #00ff4466,0 0 90px #00ff4444}40%{opacity:1;transform:translate(-50%,-55%) scale(1.4);color:#00ff44;text-shadow:0 0 40px #00ff44,0 0 80px #00ff4466,0 0 120px #00ff4444}60%{opacity:0.8;transform:translate(-50%,-60%) scale(1.2);color:#00ff44;text-shadow:0 0 20px #00ff4444}100%{opacity:0;transform:translate(-50%,-70%) scale(0.8);color:#00ff44;text-shadow:none}}
            @keyframes lowPulse{0%,100%{border-color:rgba(255,68,68,0.15)}50%{border-color:rgba(255,68,68,0.35)}}
            @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
            @keyframes glowPulse{0%,100%{opacity:0.7}50%{opacity:1}}
            @keyframes rumble{0%,100%{transform:translate(0,0)}10%{transform:translate(-4px,2px)}20%{transform:translate(4px,-2px)}30%{transform:translate(-2px,4px)}40%{transform:translate(2px,-4px)}50%{transform:translate(-4px,4px)}60%{transform:translate(4px,2px)}70%{transform:translate(-2px,-2px)}80%{transform:translate(2px,4px)}90%{transform:translate(-4px,-4px)}}
            @keyframes sumPulse{0%{opacity:0.04;transform:translate(-50%,-50%) scale(0.95)}50%{opacity:0.16;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:0.12;transform:translate(-50%,-50%) scale(1)}}
            @keyframes ballPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.7}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}
            
                      `;
          document.head.appendChild(style);
        }

        ReactDOM.render(React.createElement(SigmaPrime), document.getElementById('root'));
    </script>
</body>
</html>

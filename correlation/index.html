<body>

    <div id="root"></div>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Viewport Sync Script -->
    <script>
      function syncAppHeight() {
        const vv = window.visualViewport;
        const h = vv ? vv.height : window.innerHeight;
        const top = vv ? vv.offsetTop : 0;

        document.documentElement.style.setProperty('--app-height', `${h}px`);
        document.documentElement.style.setProperty('--app-top', `${top}px`);
      }

      syncAppHeight();

      window.addEventListener('resize', syncAppHeight);
      window.addEventListener('orientationchange', syncAppHeight);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncAppHeight);
        window.visualViewport.addEventListener('scroll', syncAppHeight);
      }
    </script>
    
    <!-- Game Component -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo, memo } = React;

        const COLS = 8, ROWS = 10, MAX_E = 5, K = 1;
        const DECAY_BASE = 14000, DECAY_MIN = 4500, SPAWN_BASE = 2400, SPAWN_MIN = 800;
        const ECHO_DUR = 2500, ECHO_BOOST = 0.25, CIRC = 100.53;

        const DIFFICULTY_OPTIONS = ["EASY", "MEDIUM", "HARD", "EXPERT"];
        const DIFFICULTY_SPAWN_MULTIPLIER = {
          EASY: 1.5,
          MEDIUM: 1.25,
          HARD: 1.00,
          EXPERT: 0.5
        };

        // Sound Management System
        const SoundManager = {
            sounds: {},
            audioContext: null,
            volume: 0.5,
            musicVolume: 0.3,
            enabled: true,
            backgroundMusic: null,
            activeSounds: new Set(),
            weldingSound: null,
            weldingPlayers: [],
            weldingCrossfadeTimer: null,
            weldingCrossfadeMs: 1000,
            
            async init() {
                // Initialize Web Audio API
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Initialize background music
                this.backgroundMusic = new Audio('sfx/mixkit-pulsating-bass-transition-2295.wav');
                this.backgroundMusic.loop = true;
                this.backgroundMusic.volume = this.musicVolume;
                this.backgroundMusic.preload = 'auto';
                
                // Predefined sound file paths
                this.soundFiles = {
                    select: 'sfx/select_click.mp3',
                    correlate: 'sfx/mixkit-laser-weapon-shot-1681.wav',
                    decorrelate: 'sfx/decorrelation_fail.mp3',
                    recoil: 'sfx/recoil_cascade.mp3',
                    spawn: 'sfx/spawn_cell.mp3',
                    gameOver: 'sfx/game_over.mp3',
                    levelUp: 'sfx/level_up.mp3',
                    combo: 'sfx/combo_multiplier.mp3',
                    menu: 'sfx/menu_navigate.mp3',
                    pause: 'sfx/pause_sound.mp3',
                    countdown: 'sfx/mixkit-electronic-lock-success-beeps-2852.wav',
                    startSound: 'sfx/mixkit-arcade-mechanical-bling-210.wav',
                    welding: 'sfx/mixkit-electric-welding-and-sparkles-2603.wav',
                    deselect: 'sfx/mixkit-cybernetic-technology-affirmation-3116.wav'
                };
                
                                
                // Create audio objects for all sounds
                Object.keys(this.soundFiles).forEach(key => {
                    const audio = new Audio(this.soundFiles[key]);
                    audio.preload = 'auto';
                    audio.volume = this.volume;
                    this.sounds[key] = audio;
                });
                
                            },
            
            play(soundName, volume = 1.0, options = {}) {
                if (!this.enabled || !this.sounds[soundName]) return null;
                
                const { loop = false } = options;
                
                try {
                    const sound = this.sounds[soundName].cloneNode();
                    sound.volume = this.volume * volume;
                    sound.loop = loop;
                    sound.currentTime = 0;
                    sound.play().catch(e => console.log('Sound play failed:', e));
                    
                    // Track the sound for stopping later
                    this.activeSounds.add(sound);
                    sound.addEventListener('ended', () => {
                        if (!sound.loop) {
                            this.activeSounds.delete(sound);
                        }
                    });
                    
                    return sound;
                } catch (error) {
                    console.log('Sound system error:', error);
                    return null;
                }
            },
            
            stopSound(sound) {
                if (sound) {
                    sound.pause();
                    sound.currentTime = 0;
                    this.activeSounds.delete(sound);
                }
            },
            
            stopAllSounds() {
                this.activeSounds.forEach(sound => {
                    sound.pause();
                    sound.currentTime = 0;
                });
                this.activeSounds.clear();
            },
            
            startWeldingLoop(volume = 0.25) {
                if (!this.enabled || !this.sounds.welding) return;

                this.stopWeldingLoop();

                const a = this.sounds.welding.cloneNode();
                const b = this.sounds.welding.cloneNode();

                a.volume = this.volume * volume;
                b.volume = this.volume * volume;

                a.currentTime = 0;
                b.currentTime = 0;

                this.weldingPlayers = [a, b];

                const startPlayer = (player) => {
                    player.currentTime = 0;
                    player.play().catch(e => console.log('Welding play failed:', e));
                    this.activeSounds.add(player);
                };

                const scheduleNext = (currentIndex) => {
                    const current = this.weldingPlayers[currentIndex];
                    const nextIndex = currentIndex === 0 ? 1 : 0;
                    const next = this.weldingPlayers[nextIndex];

                    const loopOnceReady = () => {
                        if (!current.duration || !isFinite(current.duration)) {
                            this.weldingCrossfadeTimer = setTimeout(() => loopOnceReady(), 50);
                            return;
                        }

                        const overlapSeconds = this.weldingCrossfadeMs / 1000;
                        const delayMs = Math.max(0, (current.duration - overlapSeconds) * 1000);

                        this.weldingCrossfadeTimer = setTimeout(() => {
                            if (!this.weldingPlayers.length) return;

                            next.volume = this.volume * volume;
                            next.currentTime = 0;
                            next.play().catch(e => console.log('Welding overlap play failed:', e));
                            this.activeSounds.add(next);

                            scheduleNext(nextIndex);
                        }, delayMs);
                    };

                    loopOnceReady();
                };

                startPlayer(a);
                scheduleNext(0);
            },

            stopWeldingLoop() {
                if (this.weldingCrossfadeTimer) {
                    clearTimeout(this.weldingCrossfadeTimer);
                    this.weldingCrossfadeTimer = null;
                }

                this.weldingPlayers.forEach(player => {
                    try {
                        player.pause();
                        player.currentTime = 0;
                        this.activeSounds.delete(player);
                    } catch (error) {
                        console.log('Welding stop failed:', error);
                    }
                });

                this.weldingPlayers = [];
                this.weldingSound = null;
            },
            
            setVolume(vol) {
                this.volume = Math.max(0, Math.min(1, vol));
                Object.values(this.sounds).forEach(audio => {
                    audio.volume = this.volume;
                });
            },
            
                        
            toggle() {
                this.enabled = !this.enabled;
                if (!this.enabled) {
                    this.pauseBackgroundMusic();
                } else {
                    this.playBackgroundMusic();
                }
                return this.enabled;
            },
            
            setEnabled(enabled) {
                this.enabled = enabled;
                if (!enabled) {
                    this.pauseBackgroundMusic();
                } else {
                    this.playBackgroundMusic();
                }
            },
            
            async playBackgroundMusic() {
                if (!this.enabled || !this.backgroundMusic) {
                    // Ensure background music is paused if sound is disabled
                    if (this.backgroundMusic && !this.enabled) {
                        this.backgroundMusic.pause();
                    }
                    return;
                }
                
                try {
                    // Handle autoplay policies
                    if (this.audioContext && this.audioContext.state === 'suspended') {
                        await this.audioContext.resume();
                    }
                    
                    console.log('Attempting to play background music...');
                    await this.backgroundMusic.play();
                    console.log('Background music started successfully');
                } catch (error) {
                    console.log('Background music play failed:', error);
                    
                    // Try alternative approach for PC browsers
                    try {
                        // Create a new audio element with different format
                        const fallbackMusic = new Audio('sfx/mixkit-pulsating-bass-transition-2295.wav');
                        fallbackMusic.loop = true;
                        fallbackMusic.volume = this.musicVolume;
                        await fallbackMusic.play();
                        this.backgroundMusic = fallbackMusic;
                        console.log('Background music started with fallback');
                    } catch (fallbackError) {
                        console.log('Fallback also failed:', fallbackError);
                    }
                }
            },
            
            pauseBackgroundMusic() {
                if (this.backgroundMusic) {
                    this.backgroundMusic.pause();
                }
            },
            
            setMusicVolume(vol) {
                this.musicVolume = Math.max(0, Math.min(1, vol));
                if (this.backgroundMusic) {
                    this.backgroundMusic.volume = this.musicVolume;
                }
            },
            
            pause() {
                this.pauseBackgroundMusic();
            },
            
            resume() {
                this.playBackgroundMusic();
            }
        };

        const GAME_VERSION = "v0.2";
        const COPYRIGHT_TEXT = "© MisterMarx.com, 2026";
        const GAME_TITLE = "CORRELATION";

        const RULE_ITEMS = [
          {
            title: "QUANTUM LEAP",
            body: "Click a node, then a second node with matching or greater energy. The first node transitions — its energy correlates with the second node's energy."
          },
          {

            body: "Closer nodes have higher correlation probability. Distant transitions may decorrelate."
          },
          {
            title: "RECOIL CASCADE",
            body: "High-energy transitions generate recoil momentum, clearing neighboring nodes. Chain transitions for combo multipliers."
          },
          {
            title: "VOID EQUILIBRIUM",
            body: "The board fills with nodes. Clear them through correlated transitions before the grid saturates."
          }
        ];

        const CONTROL_ITEMS = [
          {
            title: "CLICK & DRAG",
            body: "Click and hold on a node, then drag to a target node. Release to attempt correlation."
          },
          {
            title: "CLICK ONLY", 
            body: "Click and release a source node, then click and release a target node. The two clicked nodes attempt to correlate."
          }
        ];

        function RuleCard({ item, font }) {
          return (
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                gap: 4,
                padding: "10px 14px",
                backgroundColor: "rgba(15,23,42,0.6)",
                borderRadius: 6,
                borderLeft: "3px solid #0e7490"
              }}
            >
              <span style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0", fontFamily: font }}>
                {item.title}
              </span>
              <span style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.5, fontFamily: font }}>
                {item.body}
              </span>
            </div>
          );
        }

        const EC = ["transparent","#1e40af","#0e7490","#047857","#b45309","#b91c1c"];
        const EG = ["transparent","rgba(30,64,175,0.5)","rgba(14,116,144,0.5)","rgba(4,120,87,0.5)","rgba(180,83,9,0.6)","rgba(185,28,28,0.7)"];
        const EB = ["transparent","#93c5fd","#67e8f9","#6ee7b7","#fcd34d","#e879f9"];

        const RGBA_MAP={"#93c5fd":[147,197,253],"#67e8f9":[103,232,249],"#6ee7b7":[110,231,183],
          "#fcd34d":[252,211,77],"#e879f9":[232,121,249],"#b91c1c":[185,28,28],"#fca5a5":[252,165,165],"#f87171":[248,113,113],"#60a5fa":[96,165,250],
          "rgb(147,197,253)":[147,197,253],"rgb(103,232,249)":[103,232,249],
          "rgb(110,231,183)":[110,231,183],"rgb(252,211,77)":[252,211,77],
          "rgb(252,165,165)":[252,165,165],"rgb(248,113,113)":[248,113,113]};
        function toRGB(c){return RGBA_MAP[c]||[255,255,255]}

        function recoilP(M,dE){return Math.sqrt(2*M*dE+dE*dE)/K}
        function corrProb(r){
          if(r<0.5)return 0.98;  // Adjacent: 98%
          if(r<1.0)return 0.90;  // 1 cell: 90%
          if(r<1.5)return 0.80;  // diagonal: 80%
          if(r<2.0)return 0.70;  // 2 cells: 70%
          if(r<3.0)return 0.55;  // 3 cells: 55%
          return Math.max(0.25, 0.70 - r*0.05);  // Long range: minimum 25%
        }
        function empty(){return{e:0,mass:0,born:0,decay:0,locked:false}}
        function mkGrid(){return Array.from({length:ROWS},()=>Array.from({length:COLS},empty))}
        function mkCell(lvl,now){
          const maxE=Math.min(2+Math.floor(lvl/2),MAX_E);
          return{e:1+Math.floor(Math.random()*maxE),mass:1+Math.floor(Math.random()*3),born:now,decay:now+Math.max(DECAY_MIN,DECAY_BASE-lvl*500),locked:false}
        }

        function genBolt(x1,y1,x2,y2,d=0){
          const segs=[];const dx=x2-x1,dy=y2-y1,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<8||d>3){segs.push(x1,y1,x2,y2,Math.max(0.5,3-d*0.8),Math.max(0.3,1-d*0.25));return segs}
          const jit=(Math.random()-0.5)*dist*0.35,nx=-dy/dist,ny=dx/dist;
          const jx=x1+dx*0.5+nx*jit,jy=y1+dy*0.5+ny*jit;
          segs.push(...genBolt(x1,y1,jx,jy,d),...genBolt(jx,jy,x2,y2,d));
          if(d<2&&Math.random()<0.4){
            const a=Math.atan2(dy,dx)+(Math.random()-0.5)*1.2,l=dist*(0.2+Math.random()*0.3);
            segs.push(...genBolt(jx,jy,jx+Math.cos(a)*l,jy+Math.sin(a)*l,d+1));
          }
          return segs;
        }
        function mkParticles(cx,cy,n,col){
          const rgb=toRGB(col),out=[],now=Date.now();
          // Reduce particle count for performance
          const adjustedN = Math.max(1, Math.floor(n * 0.6));
          for(let i=0;i<adjustedN;i++){const a=Math.random()*6.283,sp=20+Math.random()*40;
            out.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:300+Math.random()*500,born:now,r:rgb[0],g:rgb[1],b:rgb[2],size:1.5+Math.random()*2.5})}
          return out;
        }

        const Cell=memo(function Cell({e,mass,isSel,isDet,detProb,echoB,dp,isNew,locked,onMouseDown,onMouseEnter,onMouseUp,onMouseLeave,onTouchStart,onTouchMove,onTouchEnd,x,y,dragStart,dragHover}) {
          // Create conic gradient that sweeps clockwise
          const getGradient = (decayProgress, energy, isLocked) => {
            const baseColor = isLocked ? "rgba(128,128,128,0.6)" : (EC[energy] || "rgba(15,23,42,0.3)");
            const darkColor = isLocked ? "rgba(64,64,64,0.8)" : "rgba(15,23,42,0.8)";
            // Show decay progress even for locked cells
            // Sweep from top (12 o'clock) clockwise
            return `conic-gradient(from 0deg at 50% 50%, ${baseColor} 0deg ${(1-decayProgress)*360}deg, ${darkColor} ${(1-decayProgress)*360}deg 360deg)`;
          };
          
          // Check if this cell is the drag source or hover target
          const isDragSource = dragStart && dragStart.x === x && dragStart.y === y;
          const isDragHover = dragHover && dragHover.x === x && dragHover.y === y;
          
          return(
            <div 
                 onMouseDown={locked?null:onMouseDown}
                 onMouseEnter={locked?null:onMouseEnter}
                 onMouseUp={locked?null:onMouseUp}
                 onMouseLeave={locked?null:onMouseLeave}
                 onTouchStart={locked?null:onTouchStart}
                 onTouchMove={locked?null:onTouchMove}
                 onTouchEnd={locked?null:onTouchEnd}
                 className={`${isNew&&e>0?"n3-spawn":""} ${echoB>0.05&&e>0?"n3-echo":""} ${e>0&&!locked?"interactive-cell":""}`}
              style={{borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",
                userSelect:"none",WebkitUserSelect:"none",position:"relative",overflow:"hidden",
                background:e>0?getGradient(dp, e, locked):"rgba(15,23,42,0.3)",
                border:isSel?"2px solid #fff":isDragSource?"2px solid #fff":isDragHover?"2px solid #fff":isDet?`2px solid ${EB[e]}77`:locked?"2px solid rgba(128,128,128,0.5)":e>0?"none":"1px solid rgba(255,255,255,0.03)",
                boxShadow:isSel?`0 0 20px ${EG[e]},inset 0 0 12px rgba(255,255,255,0.15)`:isDragSource?`0 0 20px ${EG[e]},inset 0 0 12px rgba(255,255,255,0.15)`:isDragHover?`0 0 20px rgba(255,255,255,0.35),inset 0 0 12px rgba(255,255,255,0.12)`:e>0&&!locked?`0 0 6px ${EG[e]}`:locked?"0 0 6px rgba(128,128,128,0.3)":"none",
                transform:isSel?"scale(1.08)":isDragSource?"scale(1.05)":isDragHover?"scale(1.03)":"scale(1)",cursor:locked?"not-allowed":e>0?"pointer":"default",
                filter:locked?"grayscale(100%)":"none",
                opacity:locked?0.7:isDragHover?0.9:1,
                transition:"background 0.3s,border 0.15s,box-shadow 0.25s,transform 0.1s ease-out",
                touchAction:"none"}}>
              {e>0&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",zIndex:2,position:"relative"}}>
                <div style={{position:"relative",width:40,height:40}}>
                  <span style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:13,fontWeight:800,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.5)",zIndex:2}}>{e}</span>
                  {mass>=1&&<div style={{
                    position:"absolute",width:3,height:3,backgroundColor:"#fff",borderRadius:"50%",
                    animation:"orbit1 2s linear infinite",
                    boxShadow:"0 0 3px rgba(255,255,255,0.8)"
                  }}/>}
                  {mass>=2&&<div style={{
                    position:"absolute",width:3,height:3,backgroundColor:"#fff",borderRadius:"50%",
                    animation:"orbit2 2s linear infinite",
                    animationDelay:"0.5s",
                    boxShadow:"0 0 3px rgba(255,255,255,0.8)"
                  }}/>}
                  {mass>=3&&<div style={{
                    position:"absolute",width:3,height:3,backgroundColor:"#fff",borderRadius:"50%",
                    animation:"orbit3 2s linear infinite",
                    animationDelay:"1s",
                    boxShadow:"0 0 3px rgba(255,255,255,0.8)"
                  }}/>}
                </div>
              </div>}
              {isDet&&<div style={{position:"absolute",top:-3,right:-3,fontSize:7,fontWeight:700,color:"#fff",
                padding:"1px 3px",borderRadius:3,zIndex:5,
                backgroundColor:detProb>0.6?"#047857":detProb>0.3?"#b45309":"#b91c1c"}}>{Math.round(detProb*100)}%</div>}
            </div>);
        });

                    <button

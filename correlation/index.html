<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORRELATION</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Allow text selection for inputs and buttons */
        input, textarea, button, select {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }

        /* Keep pointer cursor for interactive elements */
        button, [role="button"], a {
            cursor: pointer;
        }

        /* Ensure pointer cursor for interactive game cells */
        .interactive-cell {
            cursor: pointer !important;
        }

        #root {
            width: 100%;
            height: var(--app-height, 100dvh);
            min-height: var(--app-height, 100dvh);
            max-height: var(--app-height, 100dvh);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Viewport Sync Script -->
    <script>
      function syncAppHeight() {
        const vv = window.visualViewport;
        const h = vv ? vv.height : window.innerHeight;
        const top = vv ? vv.offsetTop : 0;

        document.documentElement.style.setProperty('--app-height', `${h}px`);
        document.documentElement.style.setProperty('--app-top', `${top}px`);
      }

      syncAppHeight();

      window.addEventListener('resize', syncAppHeight);
      window.addEventListener('orientationchange', syncAppHeight);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncAppHeight);
        window.visualViewport.addEventListener('scroll', syncAppHeight);
      }
    </script>
    
    <!-- Game Component -->
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo, memo } = React;

        const COLS = 8, ROWS = 10, MAX_E = 5, K = 1;
        const DECAY_BASE = 14000, DECAY_MIN = 4500, SPAWN_BASE = 2400, SPAWN_MIN = 800;
        const ECHO_DUR = 2500, ECHO_BOOST = 0.25, CIRC = 100.53;

        // Sound Management System
        const SoundManager = {
            sounds: {},
            audioContext: null,
            volume: 0.5,
            musicVolume: 0.3,
            enabled: true,
            backgroundMusic: null,
            
            async init() {
                // Initialize Web Audio API
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Initialize background music
                this.backgroundMusic = new Audio('sfx/mixkit-pulsating-bass-transition-2295.wav');
                this.backgroundMusic.loop = true;
                this.backgroundMusic.volume = this.musicVolume;
                this.backgroundMusic.preload = 'auto';
                
                // Predefined sound file paths
                this.soundFiles = {
                    select: 'sfx/select_click.mp3',
                    correlate: 'sfx/correlation_success.mp3',
                    decorrelate: 'sfx/decorrelation_fail.mp3',
                    recoil: 'sfx/recoil_cascade.mp3',
                    spawn: 'sfx/spawn_cell.mp3',
                    gameOver: 'sfx/game_over.mp3',
                    levelUp: 'sfx/level_up.mp3',
                    combo: 'sfx/combo_multiplier.mp3',
                    menu: 'sfx/menu_navigate.mp3',
                    pause: 'sfx/pause_sound.mp3',
                    countdown: 'sfx/mixkit-electronic-lock-success-beeps-2852.wav',
                    startSound: 'sfx/mixkit-arcade-mechanical-bling-210.wav'
                };
                
                                
                // Create audio objects for all sounds
                Object.keys(this.soundFiles).forEach(key => {
                    const audio = new Audio(this.soundFiles[key]);
                    audio.preload = 'auto';
                    audio.volume = this.volume;
                    this.sounds[key] = audio;
                });
                
                            },
            
            play(soundName, volume = 1.0) {
                if (!this.enabled || !this.sounds[soundName]) return;
                
                try {
                    const sound = this.sounds[soundName].cloneNode();
                    sound.volume = this.volume * volume;
                    sound.currentTime = 0;
                    sound.play().catch(e => console.log('Sound play failed:', e));
                } catch (error) {
                    console.log('Sound system error:', error);
                }
            },
            
            setVolume(vol) {
                this.volume = Math.max(0, Math.min(1, vol));
                Object.values(this.sounds).forEach(audio => {
                    audio.volume = this.volume;
                });
            },
            
                        
            toggle() {
                this.enabled = !this.enabled;
                if (!this.enabled) {
                    this.pauseBackgroundMusic();
                } else {
                    this.playBackgroundMusic();
                }
                return this.enabled;
            },
            
            setEnabled(enabled) {
                this.enabled = enabled;
                if (!enabled) {
                    this.pauseBackgroundMusic();
                } else {
                    this.playBackgroundMusic();
                }
            },
            
            async playBackgroundMusic() {
                if (!this.enabled || !this.backgroundMusic) return;
                
                try {
                    // Handle autoplay policies
                    if (this.audioContext && this.audioContext.state === 'suspended') {
                        await this.audioContext.resume();
                    }
                    
                    console.log('Attempting to play background music...');
                    await this.backgroundMusic.play();
                    console.log('Background music started successfully');
                } catch (error) {
                    console.log('Background music play failed:', error);
                    
                    // Try alternative approach for PC browsers
                    try {
                        // Create a new audio element with different format
                        const fallbackMusic = new Audio('sfx/mixkit-pulsating-bass-transition-2295.wav');
                        fallbackMusic.loop = true;
                        fallbackMusic.volume = this.musicVolume;
                        await fallbackMusic.play();
                        this.backgroundMusic = fallbackMusic;
                        console.log('Background music started with fallback');
                    } catch (fallbackError) {
                        console.log('Fallback also failed:', fallbackError);
                    }
                }
            },
            
            pauseBackgroundMusic() {
                if (this.backgroundMusic) {
                    this.backgroundMusic.pause();
                }
            },
            
            setMusicVolume(vol) {
                this.musicVolume = Math.max(0, Math.min(1, vol));
                if (this.backgroundMusic) {
                    this.backgroundMusic.volume = this.musicVolume;
                }
            },
            
            pause() {
                this.pauseBackgroundMusic();
            },
            
            resume() {
                this.playBackgroundMusic();
            }
        };

        const EC = ["transparent","#1e40af","#0e7490","#047857","#b45309","#b91c1c"];
        const EG = ["transparent","rgba(30,64,175,0.5)","rgba(14,116,144,0.5)","rgba(4,120,87,0.5)","rgba(180,83,9,0.6)","rgba(185,28,28,0.7)"];
        const EB = ["transparent","#93c5fd","#67e8f9","#6ee7b7","#fcd34d","#e879f9"];

        const RGBA_MAP={"#93c5fd":[147,197,253],"#67e8f9":[103,232,249],"#6ee7b7":[110,231,183],
          "#fcd34d":[252,211,77],"#e879f9":[232,121,249],"#b91c1c":[185,28,28],"#fca5a5":[252,165,165],"#f87171":[248,113,113],"#60a5fa":[96,165,250],
          "rgb(147,197,253)":[147,197,253],"rgb(103,232,249)":[103,232,249],
          "rgb(110,231,183)":[110,231,183],"rgb(252,211,77)":[252,211,77],
          "rgb(252,165,165)":[252,165,165],"rgb(248,113,113)":[248,113,113]};
        function toRGB(c){return RGBA_MAP[c]||[255,255,255]}

        function recoilP(M,dE){return Math.sqrt(2*M*dE+dE*dE)/K}
        function corrProb(r){
          if(r<0.5)return 0.98;  // Adjacent: 98%
          if(r<1.0)return 0.90;  // 1 cell: 90%
          if(r<1.5)return 0.80;  // diagonal: 80%
          if(r<2.0)return 0.70;  // 2 cells: 70%
          if(r<3.0)return 0.55;  // 3 cells: 55%
          return Math.max(0.25, 0.70 - r*0.05);  // Long range: minimum 25%
        }
        function empty(){return{e:0,mass:0,born:0,decay:0,locked:false}}
        function mkGrid(){return Array.from({length:ROWS},()=>Array.from({length:COLS},empty))}
        function mkCell(lvl,now){
          const maxE=Math.min(2+Math.floor(lvl/2),MAX_E);
          return{e:1+Math.floor(Math.random()*maxE),mass:1+Math.floor(Math.random()*3),born:now,decay:now+Math.max(DECAY_MIN,DECAY_BASE-lvl*500),locked:false}
        }

        function genBolt(x1,y1,x2,y2,d=0){
          const segs=[];const dx=x2-x1,dy=y2-y1,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<8||d>3){segs.push(x1,y1,x2,y2,Math.max(0.5,3-d*0.8),Math.max(0.3,1-d*0.25));return segs}
          const jit=(Math.random()-0.5)*dist*0.35,nx=-dy/dist,ny=dx/dist;
          const jx=x1+dx*0.5+nx*jit,jy=y1+dy*0.5+ny*jit;
          segs.push(...genBolt(x1,y1,jx,jy,d),...genBolt(jx,jy,x2,y2,d));
          if(d<2&&Math.random()<0.4){
            const a=Math.atan2(dy,dx)+(Math.random()-0.5)*1.2,l=dist*(0.2+Math.random()*0.3);
            segs.push(...genBolt(jx,jy,jx+Math.cos(a)*l,jy+Math.sin(a)*l,d+1));
          }
          return segs;
        }
        function mkParticles(cx,cy,n,col){
          const rgb=toRGB(col),out=[],now=Date.now();
          for(let i=0;i<n;i++){const a=Math.random()*6.283,sp=20+Math.random()*40;
            out.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:300+Math.random()*500,born:now,r:rgb[0],g:rgb[1],b:rgb[2],size:1.5+Math.random()*2.5})}
          return out;
        }

        const Cell=memo(function Cell({e,mass,isSel,isDet,detProb,echoB,dp,isNew,locked,onMouseDown,onMouseEnter,onMouseUp,onMouseLeave,onTouchStart,onTouchMove,onTouchEnd,x,y,dragStart,dragHover}) {
          // Create conic gradient that sweeps clockwise
          const getGradient = (decayProgress, energy, isLocked) => {
            const baseColor = isLocked ? "rgba(128,128,128,0.6)" : (EC[energy] || "rgba(15,23,42,0.3)");
            const darkColor = isLocked ? "rgba(64,64,64,0.8)" : "rgba(15,23,42,0.8)";
            // Show decay progress even for locked cells
            // Sweep from top (12 o'clock) clockwise
            return `conic-gradient(from 0deg at 50% 50%, ${baseColor} 0deg ${(1-decayProgress)*360}deg, ${darkColor} ${(1-decayProgress)*360}deg 360deg)`;
          };
          
          // Check if this cell is the drag source or hover target
          const isDragSource = dragStart && dragStart.x === x && dragStart.y === y;
          const isDragHover = dragHover && dragHover.x === x && dragHover.y === y;
          
          return(
            <div 
                 onMouseDown={locked?null:onMouseDown}
                 onMouseEnter={locked?null:onMouseEnter}
                 onMouseUp={locked?null:onMouseUp}
                 onMouseLeave={locked?null:onMouseLeave}
                 onTouchStart={locked?null:onTouchStart}
                 onTouchMove={locked?null:onTouchMove}
                 onTouchEnd={locked?null:onTouchEnd}
                 className={`${isNew&&e>0?"n3-spawn":""} ${echoB>0.05&&e>0?"n3-echo":""} ${e>0&&!locked?"interactive-cell":""}`}
              style={{borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",
                userSelect:"none",WebkitUserSelect:"none",position:"relative",overflow:"hidden",
                background:e>0?getGradient(dp, e, locked):"rgba(15,23,42,0.3)",
                border:isSel?"2px solid #fff":isDet?`2px solid ${EB[e]}77`:isDragSource?"2px solid #fff":isDragHover?`2px solid ${EB[e]}77`:locked?"2px solid rgba(128,128,128,0.5)":e>0?"none":"1px solid rgba(255,255,255,0.03)",
                boxShadow:isSel?`0 0 20px ${EG[e]},inset 0 0 12px rgba(255,255,255,0.15)`:isDragSource?`0 0 20px ${EG[e]},inset 0 0 12px rgba(255,255,255,0.15)`:isDragHover?`0 0 12px ${EG[e]},inset 0 0 8px rgba(255,255,255,0.1)`:e>0&&!locked?`0 0 6px ${EG[e]}`:locked?"0 0 6px rgba(128,128,128,0.3)":"none",
                transform:isSel?"scale(1.08)":isDragSource?"scale(1.05)":isDragHover?"scale(1.03)":"scale(1)",cursor:locked?"not-allowed":e>0?"pointer":"default",
                filter:locked?"grayscale(100%)":"none",
                opacity:locked?0.7:isDragHover?0.9:1,
                transition:"background 0.3s,border 0.15s,box-shadow 0.25s,transform 0.1s ease-out",
                touchAction:"none"}}>
              {e>0&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",zIndex:2,position:"relative"}}>
                <div style={{position:"relative",width:40,height:40}}>
                  <span style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:13,fontWeight:800,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.5)",zIndex:2}}>{e}</span>
                  {mass>=1&&<div style={{
                    position:"absolute",width:3,height:3,backgroundColor:"#fff",borderRadius:"50%",
                    animation:"orbit1 2s linear infinite",
                    boxShadow:"0 0 3px rgba(255,255,255,0.8)"
                  }}/>}
                  {mass>=2&&<div style={{
                    position:"absolute",width:3,height:3,backgroundColor:"#fff",borderRadius:"50%",
                    animation:"orbit2 2s linear infinite",
                    animationDelay:"0.5s",
                    boxShadow:"0 0 3px rgba(255,255,255,0.8)"
                  }}/>}
                  {mass>=3&&<div style={{
                    position:"absolute",width:3,height:3,backgroundColor:"#fff",borderRadius:"50%",
                    animation:"orbit3 2s linear infinite",
                    animationDelay:"1s",
                    boxShadow:"0 0 3px rgba(255,255,255,0.8)"
                  }}/>}
                </div>
              </div>}
              {isDet&&<div style={{position:"absolute",top:-3,right:-3,fontSize:7,fontWeight:700,color:"#fff",
                padding:"1px 3px",borderRadius:3,zIndex:5,
                backgroundColor:detProb>0.6?"#047857":detProb>0.3?"#b45309":"#b91c1c"}}>{Math.round(detProb*100)}%</div>}
            </div>);
        });

        function NullV3(){
          const[grid,setGrid]=useState(mkGrid);
          const[score,setScore]=useState(0);
          const[level,setLevel]=useState(1);
          const[sel,setSel]=useState(null);
          const[phase,setPhase]=useState("menu");
          const[echoes,setEchoes]=useState([]);
          const[cascTxt,setCascTxt]=useState(null);
          const[cascTxtColor,setCascTxtColor]=useState("#10b981");
          const[fillPct,setFillPct]=useState(0);
          const[paused,setPaused]=useState(false);
          const[totalT,setTotalT]=useState(0);
          const[combo,setCombo]=useState(0);
          const[transitionHistory,setTransitionHistory]=useState([]);
          const[isLevelingUp,setIsLevelingUp]=useState(false);
          const[isDragging,setIsDragging]=useState(false);
          const[dragStart,setDragStart]=useState(null);
          const[dragEnd,setDragEnd]=useState(null);
          const[dragHover,setDragHover]=useState(null);
          const[comboT,setComboT]=useState(0);
          const[info,setInfo]=useState(null);
  const[overlayMsg,setOverlayMsg]=useState(null);
          const[overlayMsgColor,setOverlayMsgColor]=useState("#6ee7b7");
  const[bgParticles,setBgParticles]=useState([]);
  const[showTutorial,setShowTutorial]=useState(false);
  const[showMenu,setShowMenu]=useState(true);
  const[showPauseRules,setShowPauseRules]=useState(false);
  const[showMenuRules,setShowMenuRules]=useState(false);
  const[showQuitConfirmation,setShowQuitConfirmation]=useState(false);
          const[showOverRules,setShowOverRules]=useState(false);
          const[shake,setShake]=useState(false);
          const[screenFlash,setScreenFlash]=useState(null);
          const[tick,setTick]=useState(0);
          const[soundEnabled,setSoundEnabled]=useState(true);
          const[countdown,setCountdown]=useState(null);
          const[hasTouchInteraction,setHasTouchInteraction]=useState(false);
          const[lastComboExpire,setLastComboExpire]=useState(0);
          const[lastTickTime,setLastTickTime]=useState(Date.now());
          const[pauseTime,setPauseTime]=useState(null);

          const gridRef=useRef(null);const canvasRef=useRef(null);
          const particlesRef=useRef([]);const boltsRef=useRef([]);
          const animRef=useRef(null);const dimsRef=useRef({cw:0,ch:0});

          const updateDims=useCallback(()=>{
            const g=gridRef.current;if(!g)return;
            const r=g.getBoundingClientRect();dimsRef.current={cw:r.width/COLS,ch:r.height/ROWS};
          },[]);
          const cellPos=useCallback((x,y)=>{const{cw,ch}=dimsRef.current;return{px:x*cw+cw/2,py:y*ch+ch/2}},[]);

          useEffect(()=>{
            const cv=canvasRef.current;if(!cv)return;const ctx=cv.getContext("2d");let on=true;
            const draw=()=>{if(!on)return;const now=Date.now(),W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
              ctx.lineCap="round";
              
              // Draw animated white lightning if dragging or when selected and hovering
              if((dragStart && dragEnd) || (sel && dragHover)){
                let sp, dp;
                if(dragStart && dragEnd){
                    // Drag mode
                    sp = cellPos(dragStart.x,dragStart.y);
                    dp = cellPos(dragEnd.x,dragEnd.y);
                } else {
                    // Selected mode with hover
                    sp = cellPos(sel.x,sel.y);
                    dp = cellPos(dragHover.x,dragHover.y);
                }
                
                const lightningSegs = genBolt(sp.px,sp.py,dp.px,dp.py,0);
                const now = Date.now();
                const frame = Math.floor((now % 3000) / 1000); // 3 frames cycling every 3000ms
                
                for(let i=0;i<lightningSegs.length;i+=6){
                    ctx.beginPath();ctx.moveTo(lightningSegs[i],lightningSegs[i+1]);ctx.lineTo(lightningSegs[i+2],lightningSegs[i+3]);
                    
                    // Calculate distance from both ends for fade effect
                    const segDist = i / lightningSegs.length;
                    const fadeFromStart = Math.pow(1 - segDist, 2);
                    const fadeFromEnd = Math.pow(segDist, 2);
                    const fadeOpacity = Math.max(0.05, fadeFromStart * fadeFromEnd);
                    
                    // Animate opacity based on frame
                    let opacity = 0.6;
                    if(frame === 0 && i % 12 === 0) opacity = 0.8;
                    else if(frame === 1 && i % 12 === 6) opacity = 0.8;
                    else if(frame === 2 && i % 12 === 0) opacity = 0.8;
                    
                    const finalOpacity = opacity * fadeOpacity;
                    
                    ctx.strokeStyle=`rgba(255,255,255,${finalOpacity*0.8})`;
                    ctx.lineWidth=lightningSegs[i+4]*2;
                    ctx.stroke();
                    
                    ctx.strokeStyle=`rgba(255,255,255,${finalOpacity})`;
                    ctx.lineWidth=lightningSegs[i+4]*1;
                    ctx.stroke();
                }
              }
              
              const ab=[];
              for(const b of boltsRef.current){const age=now-b.born;if(age>b.dur)continue;ab.push(b);
                const t=age/b.dur,a=b.op*(1-t)*(1-t),s=b.segs,[r,g,bl]=b.rgb;
                for(let i=0;i<s.length;i+=6){ctx.beginPath();ctx.moveTo(s[i],s[i+1]);ctx.lineTo(s[i+2],s[i+3]);
                  ctx.strokeStyle=`rgba(${r},${g},${bl},${a*s[i+5]*0.2})`;ctx.lineWidth=s[i+4]*5;ctx.stroke()}
                for(let i=0;i<s.length;i+=6){ctx.beginPath();ctx.moveTo(s[i],s[i+1]);ctx.lineTo(s[i+2],s[i+3]);
                  ctx.strokeStyle=`rgba(${r},${g},${bl},${a*s[i+5]})`;ctx.lineWidth=s[i+4];ctx.stroke()}
              }
              boltsRef.current=ab;
              const ap=[];
              for(const p of particlesRef.current){const age=now-p.born;if(age>p.life)continue;ap.push(p);
                const t=age/p.life,px=p.x+p.vx*t,py=p.y+p.vy*t,al=1-t*t,sz=p.size*(1-t*0.5);
                ctx.beginPath();ctx.arc(px,py,sz,0,6.283);ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${al})`;ctx.fill();
                if(sz>1.5){ctx.beginPath();ctx.arc(px,py,sz*2.5,0,6.283);ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${al*0.12})`;ctx.fill()}}
              particlesRef.current=ap;
              animRef.current=requestAnimationFrame(draw)};
            animRef.current=requestAnimationFrame(draw);
            return()=>{on=false;cancelAnimationFrame(animRef.current)};
          },[showMenu,showTutorial,dragStart,dragEnd,cellPos,sel,dragHover]);

          useEffect(()=>{
            let raf=null;
            const resize=()=>{const c=canvasRef.current,g=gridRef.current;if(!c||!g)return;
              const r=g.getBoundingClientRect();
              if(r.width===0||r.height===0){
                if(raf)cancelAnimationFrame(raf);
                raf=requestAnimationFrame(resize);
                return;
              }
              c.width=r.width;c.height=r.height;c.style.width=r.width+"px";c.style.height=r.height+"px";updateDims();
            };
            resize();
            raf=requestAnimationFrame(resize);
            window.addEventListener("resize",resize);
            return()=>{window.removeEventListener("resize",resize);if(raf)cancelAnimationFrame(raf)};
          },[phase,updateDims,showMenu,showTutorial]);

          const fireBolt=useCallback((x1,y1,x2,y2,col,dur=700,op=1)=>{
            boltsRef.current.push({segs:genBolt(x1,y1,x2,y2),rgb:toRGB(col),op,born:Date.now(),dur})
            // Play sound for each bolt - use correlation sound for energy bolts, recoil for secondary bolts
            const soundType = (col.includes("#60a5fa") || col.includes("96,165,250")) ? 'recoil' : 'correlate';
            SoundManager.play(soundType, 0.3);
          },[]);
          const firePart=useCallback((x,y,n,col)=>{particlesRef.current.push(...mkParticles(x,y,n,col))},[]);

          const spawnTick=useCallback(()=>{
            if(phase!=="play"||paused||showQuitConfirmation)return;const now=Date.now();
            setGrid(prev=>{const ng=prev.map(r=>r.map(c=>({...c})));
              let f=0;let allFives=true;
              for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
                if(ng[y][x].e>0)f++;
                if(ng[y][x].e!==MAX_E&&ng[y][x].e>0)allFives=false;
              }
              if(f>=ROWS*COLS&&allFives){
                for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(ng[y][x].e===MAX_E)ng[y][x].locked=true;
                setPhase("over");
                SoundManager.play('gameOver');
                return ng;

                  <div style={{display:"flex",flexDirection:"column",gap:4,padding:"10px 14px",backgroundColor:"rgba(15,23,42,0.6)",borderRadius:6,borderLeft:"3px solid #0e7490"}}>
                    <span style={{fontSize:15,fontWeight:700,color:"#e2e8f0",fontFamily:font}}>RECOIL CASCADE</span>
                    <span style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,fontFamily:font}}>High-energy transitions generate recoil momentum, clearing neighboring nodes. Chain transitions for combo multipliers.</span>
                  </div>
                  
                  <div style={{display:"flex",flexDirection:"column",gap:4,padding:"10px 14px",backgroundColor:"rgba(15,23,42,0.6)",borderRadius:6,borderLeft:"3px solid #0e7490"}}>
                    <span style={{fontSize:15,fontWeight:700,color:"#e2e8f0",fontFamily:font}}>VOID EQUILIBRIUM</span>
                    <span style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,fontFamily:font}}>The board fills with nodes. Clear them through correlated transitions before the grid saturates.</span>
                  </div>
                </div>}

                <div style={{display:"flex",flexDirection:"column",gap:12,alignItems:"center"}}>
                  <button style={S.btn} onClick={startGame}>PLAY AGAIN</button>
                  <button style={{padding:"12px 32px",backgroundColor:"#b91c1c",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:700,letterSpacing:"0.12em",cursor:"pointer",fontFamily:"inherit",boxShadow:"0 0 25px rgba(185,28,28,0.25)"}} onClick={restart}>QUIT TO MENU</button>
                  <button style={{padding:"10px 24px",backgroundColor:"transparent",color:"#94a3b8",border:"none",borderRadius:6,fontSize:11,fontWeight:500,letterSpacing:"0.05em",cursor:"pointer",fontFamily:font,transition:"all 0.15s"}} onClick={()=>setShowOverRules(p=>!p)}>
                    {showOverRules?"HIDE RULES":"VIEW RULES"}
                  </button>
                </div></div>}

              {paused&&<div style={{position:"fixed",top:"var(--app-top, 0px)",left:0,right:0,height:"var(--app-height, 100dvh)",backgroundColor:"rgba(3,7,18,0.92)",
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,zIndex:100}}>
                <span style={{fontSize:32,fontWeight:900,letterSpacing:"0.3em",color:"#f8fafc",fontFamily:tFont}}>PAUSED</span>
                
                {showPauseRules&&<div style={{maxWidth:480,display:"flex",flexDirection:"column",alignItems:"center",gap:14,width:"100%"}}>
                  <div style={{display:"flex",flexDirection:"column",gap:4,padding:"10px 14px",backgroundColor:"rgba(15,23,42,0.6)",borderRadius:6,borderLeft:"3px solid #0e7490"}}>
                    <span style={{fontSize:15,fontWeight:700,color:"#e2e8f0",fontFamily:font}}>QUANTUM LEAP</span>
                    <span style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,fontFamily:font}}>Click a source node, then a detector node with matching or greater energy. The source transitions — its energy correlates with the detector.</span>
                  </div>
                  
                  <div style={{display:"flex",flexDirection:"column",gap:4,padding:"10px 14px",backgroundColor:"rgba(15,23,42,0.6)",borderRadius:6,borderLeft:"3px solid #0e7490"}}>
                    <span style={{fontSize:15,fontWeight:700,color:"#e2e8f0",fontFamily:font}}>DISTANCE DECAY</span>
                    <span style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,fontFamily:font}}>Closer detectors have higher correlation probability. Distant transitions may decorrelate.</span>
                  </div>
                  
                  <div style={{display:"flex",flexDirection:"column",gap:4,padding:"10px 14px",backgroundColor:"rgba(15,23,42,0.6)",borderRadius:6,borderLeft:"3px solid #0e7490"}}>
                    <span style={{fontSize:15,fontWeight:700,color:"#e2e8f0",fontFamily:font}}>RECOIL CASCADE</span>
                    <span style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,fontFamily:font}}>High-energy transitions generate recoil momentum, clearing neighboring nodes. Chain transitions for combo multipliers.</span>
                  </div>
                  
                  <div style={{display:"flex",flexDirection:"column",gap:4,padding:"10px 14px",backgroundColor:"rgba(15,23,42,0.6)",borderRadius:6,borderLeft:"3px solid #0e7490"}}>
                    <span style={{fontSize:15,fontWeight:700,color:"#e2e8f0",fontFamily:font}}>VOID EQUILIBRIUM</span>
                    <span style={{fontSize:12,color:"#94a3b8",lineHeight:1.5,fontFamily:font}}>The board fills with matter nodes. Clear them through correlated transitions before the grid saturates.</span>
                  </div>
                </div>}
                
                <button style={S.btn} onClick={()=>setPaused(false)}>RESUME</button>
                <button style={{padding:"10px 24px",backgroundColor:"transparent",color:"#94a3b8",border:"none",borderRadius:6,fontSize:11,fontWeight:500,letterSpacing:"0.05em",cursor:"pointer",fontFamily:font,transition:"all 0.15s"}} onClick={()=>setShowPauseRules(p=>!p)}>
                    {showPauseRules?"HIDE RULES":"VIEW RULES"}
                  </button></div>}
            </div>);
          }

        const S={
          ctn:{width:"100%",height:"var(--app-height, 100dvh)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",
            paddingTop:"max(12px, env(safe-area-inset-top))",paddingBottom:"max(12px, env(safe-area-inset-bottom))",paddingLeft:"max(12px, env(safe-area-inset-left))",paddingRight:"max(12px, env(safe-area-inset-right))",
            boxSizing:"border-box",color:"#e2e8f0",position:"relative",overflow:"hidden"},
          btn:{padding:"12px 32px",backgroundColor:"#0e7490",color:"#fff",border:"none",borderRadius:6,
            fontSize:13,fontWeight:700,letterSpacing:"0.12em",cursor:"pointer",fontFamily:"inherit",
            boxShadow:"0 0 25px rgba(14,116,144,0.3)"},
          ctrl:{flex:1,padding:"7px 10px",backgroundColor:"rgba(30,41,59,0.7)",color:"#94a3b8",
            border:"1px solid rgba(255,255,255,0.06)",borderRadius:4,fontSize:10,fontWeight:600,
            letterSpacing:"0.08em",cursor:"pointer",fontFamily:"inherit"},
        };

        ReactDOM.render(<NullV3 />, document.getElementById('root'));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Globe v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #050a18;
    font-family: 'Outfit', sans-serif;
  }
  canvas { display: block; width: 100%; height: 100%; }

  .hud {
    position: absolute; top: 24px; left: 24px;
    background: rgba(5,10,24,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 12px;
    padding: 20px 24px;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-width: 220px;
  }
  .hud h2 {
    font-family: 'Outfit', sans-serif;
    font-weight: 600; font-size: 18px;
    color: #00ff88; margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .hud .row { display: flex; justify-content: space-between; margin: 6px 0; }
  .hud .label { color: #6a8a7a; }
  .hud .val { color: #00ff88; font-weight: 700; }
  .hud .checkbox-row { display: flex; align-items: center; margin: 8px 0; }
  .hud .checkbox-row input[type="checkbox"] { 
    margin-right: 8px; 
    accent-color: #00ff88;
    cursor: pointer;
  }
  .hud .checkbox-row label { 
    color: #6a8a7a; 
    cursor: pointer;
    font-size: 12px;
    flex: 1;
  }
  .hud .divider {
    height: 1px;
    background: rgba(0,255,136,0.2);
    margin: 12px 0;
  }

  .country-selector {
    margin-top: 12px;
  }
  .country-selector select {
    width: 100%; 
    padding: 6px; 
    background: rgba(0,255,136,0.1); 
    border: 1px solid rgba(0,255,136,0.3); 
    color: #00ff88; 
    font-family: 'JetBrains Mono', monospace; 
    font-size: 12px; 
    border-radius: 4px; 
    margin-bottom: 8px;
  }
  .country-selector .buttons {
    display: flex; gap: 8px;
  }
  .country-selector button {
    flex: 1; 
    padding: 6px; 
    background: rgba(0,255,136,0.2); 
    border: 1px solid rgba(0,255,136,0.4); 
    color: #00ff88; 
    font-family: 'JetBrains Mono', monospace; 
    font-size: 11px; 
    border-radius: 4px; 
    cursor: pointer;
  }
  .country-selector button:hover {
    background: rgba(0,255,136,0.3);
  }

  .controls-bar {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(5,10,24,0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 10px;
    padding: 10px 28px;
    color: #6a8a7a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  .loading-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #050a18; z-index: 100;
    color: #00ff88;
    font-family: 'JetBrains Mono', monospace;
    transition: opacity 0.6s, backdrop-filter 0.6s;
    backdrop-filter: blur(0px);
  }
  .loading-screen.hidden { 
    opacity: 0; 
    pointer-events: none; 
    backdrop-filter: blur(10px);
  }
  .loading-screen.loading-complete {
    backdrop-filter: blur(10px);
  }
  .loading-progress {
    margin-top: 20px;
    font-size: 12px;
    color: #6a8a7a;
  }
  .loading-bar {
    width: 200px;
    height: 4px;
    background: rgba(0,255,136,0.1);
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
  }
  .loading-bar-fill {
    height: 100%;
    background: #00ff88;
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(0,255,136,0.15);
    border-top-color: #00ff88;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-screen" id="loader">
  <div class="spinner"></div>
  <div>Loading globe...</div>
  <div class="loading-progress" id="loadingProgress">Initializing...</div>
  <div class="loading-bar">
    <div class="loading-bar-fill" id="loadingBarFill"></div>
  </div>
</div>

<div class="hud">
  <h2>EARTH v2</h2>
  <div class="row"><span class="label">Status</span><span class="val" id="statStatus">Ready</span></div>
  
  <div class="divider"></div>
  
  <div class="country-selector">
    <select id="countrySelect">
      <option value="">Select a country...</option>
    </select>
    <div class="buttons">
      <button id="btnNormalSize">Normal Size</button>
      <button id="btnDoubleSize">Double Size</button>
    </div>
  </div>
</div>

<div class="controls-bar">
  drag to rotate · scroll to zoom · double-click to reset
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){

/* Scene */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0, 0, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x050a18);
document.body.appendChild(renderer.domElement);

/* Lights */
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(5, 3, 4);
scene.add(sun);
const backLight = new THREE.DirectionalLight(0x4488cc, 0.3);
backLight.position.set(-4, -2, -3);
scene.add(backLight);

/* Globe group */
const globeGroup = new THREE.Group();
scene.add(globeGroup);

/* STEP 2: SINGLE GLOBAL SPHERE */
const RES = 180;

const sphereGeo = new THREE.SphereGeometry(1.008, RES, RES);
const sphereMat = new THREE.MeshPhongMaterial({
  color: 0x2d8a4e,
  flatShading: true
});

const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
scene.add(sphereMesh);

/* Stars */
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for(let i=0;i<4000;i++){
  const r = 30 + Math.random()*70;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  starVerts.push(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff, size:0.15, sizeAttenuation:true})));

/* Interaction */
let isDrag = false, prevMouse = {x:0,y:0};
let rotTarget = {x:0.3, y:-0.5};
let rotCurrent = {x:0.3, y:-0.5};
let zoomTarget = 3, zoomCurrent = 3;

renderer.domElement.addEventListener('pointerdown', e => { isDrag=true; prevMouse={x:e.clientX,y:e.clientY}; });
window.addEventListener('pointermove', e => {
  if(!isDrag) return;
  rotTarget.y += (e.clientX - prevMouse.x)*0.004;
  rotTarget.x += (e.clientY - prevMouse.y)*0.004;
  rotTarget.x = Math.max(-1.2, Math.min(1.2, rotTarget.x));
  prevMouse = {x:e.clientX, y:e.clientY};
});
window.addEventListener('pointerup', ()=>{ isDrag=false; });
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  zoomTarget += e.deltaY*0.001;
  zoomTarget = Math.max(1.6, Math.min(6, zoomTarget));
}, {passive:false});
renderer.domElement.addEventListener('dblclick', ()=>{ rotTarget={x:0.3,y:-0.5}; zoomTarget=3; });

/* Animate */
function animate() {
  requestAnimationFrame(animate);
  rotCurrent.x += (rotTarget.x - rotCurrent.x) * 0.08;
  rotCurrent.y += (rotTarget.y - rotCurrent.y) * 0.08;
  zoomCurrent += (zoomTarget - zoomCurrent) * 0.08;
  globeGroup.rotation.x = rotCurrent.x;
  globeGroup.rotation.y = rotCurrent.y;
  camera.position.z = zoomCurrent;
  if (!isDrag) rotTarget.y += 0.0008;
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* Start */
document.getElementById('statStatus').textContent = 'Step 1 Complete';
document.getElementById('loader').classList.add('hidden');
animate();

})();
</script>
</body>
</html>
